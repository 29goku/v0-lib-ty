<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – Leben in Deutschland Test</title>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; box-sizing: border-box; }
    h1 { font-size: 2rem; margin-bottom: 8px; }
    p { color: #9ca3af; margin-bottom: 24px; }
    button { background: #fff; color: #000; border: none; padding: 12px 28px; font-size: 1rem; font-weight: 600; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <div>
    <div style="font-size:3rem;margin-bottom:16px">📶</div>
    <h1>You're offline</h1>
    <p>No internet connection. Please check your network and try again.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
