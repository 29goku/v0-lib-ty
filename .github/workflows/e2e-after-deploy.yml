name: E2E Tests After Vercel Deploy

on:
  deployment_status:

jobs:
  e2e-tests:
    if: github.event.deployment_status.state == 'success' && github.event.deployment_status.environment == 'production'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests against production
        run: npm run test:e2e
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ github.event.deployment_status.environment_url }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/playwright-report/
          retention-days: 30

      - name: Comment test results on PR
        if: always() && github.event.pull_request
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'test-results/playwright-report/index.html';

            let comment = '## E2E Test Results\n\n';
            if (fs.existsSync(reportPath)) {
              comment += '✅ Tests completed. [View detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})';
            } else {
              comment += '❌ Tests failed or no report generated.';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
