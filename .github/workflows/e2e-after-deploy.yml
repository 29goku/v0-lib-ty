name: E2E Tests After Vercel Deploy

on:
  deployment_status:
  workflow_dispatch:
  schedule:
    # Run tests every 6 hours to catch any deployment issues
    - cron: '0 */6 * * *'

jobs:
  e2e-tests:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event.deployment_status.state == 'success' && github.event.deployment_status.environment == 'production')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests against production
        run: npm run test:e2e
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ github.event.deployment_status.environment_url || 'https://www.lebeninde.com' }}

      - name: Commit test report to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add report files
          git add test-results/ test-results.json junit.xml || true

          # Check if there are changes
          if git diff --cached --quiet; then
            echo "No test result changes to commit"
          else
            git commit -m "test: Update E2E test results from workflow run ${{ github.run_id }}"
            git push origin main || git push upstream main
          fi

      - name: Upload test results as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/playwright-report/
          retention-days: 7
