- generic [ref=e2]: "[ { \"id\": 1, \"question\": \"In Deutschland dürfen Menschen offen etwas gegen die Regierung sagen, weil …\", \"options\": [ \"hier Religionsfreiheit gilt.\", \"die Menschen Steuern zahlen.\", \"die Menschen das Wahlrecht haben.\", \"hier Meinungsfreiheit gilt.\" ], \"answer\": \"hier Meinungsfreiheit gilt.\", \"explanation\": \"In Deutschland ist die Meinungsfreiheit ein Grundrecht, das im Grundgesetz verankert ist. Es erlaubt den Menschen, ihre Meinungen und Überzeugungen offen zu äußern, ohne Angst vor Repressalien durch den Staat.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 2, \"question\": \"In Deutschland können Eltern bis zum 14. Lebensjahr ihres Kindes entscheiden, ob es in der Schule am …\", \"options\": [ \"Geschichtsunterricht teilnimmt.\", \"Religionsunterricht teilnimmt.\", \"Politikunterricht teilnimmt.\", \"Sprachunterricht teilnimmt.\" ], \"answer\": \"Religionsunterricht teilnimmt.\", \"explanation\": \"Die Eltern in Deutschland haben das Recht, für ihre Kinder bis zum 14. Lebensjahr zu entscheiden, ob sie am Religionsunterricht teilnehmen. Diese Regelung berücksichtigt die elterliche Verantwortung für die religiöse Erziehung ihrer Kinder.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 3, \"question\": \"Deutschland ist ein Rechtsstaat. Was ist damit gemeint?\", \"options\": [ \"Alle Einwohnerinnen/Einwohner und der Staat müssen sich an die Gesetze halten.\", \"Der Staat muss sich nicht an die Gesetze halten.\", \"Nur Deutsche müssen die Gesetze befolgen.\", \"Die Gerichte machen die Gesetze.\" ], \"answer\": \"Alle Einwohnerinnen/Einwohner und der Staat müssen sich an die Gesetze halten.\", \"explanation\": \"Der Begriff 'Rechtsstaat' beschreibt ein System, in dem alle Bürger und der Staat selbst dem Gesetz unterworfen sind. Das bedeutet, dass Willkür ausgeschlossen ist und die Rechte der Bürger durch die Gerichte geschützt werden.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 4, \"question\": \"Welches Recht gehört zu den Grundrechten in Deutschland?\", \"options\": [ \"Waffenbesitz\", \"Faustrecht\", \"Meinungsfreiheit\", \"Selbstjustiz\" ], \"answer\": \"Meinungsfreiheit\", \"explanation\": \"Die Meinungsfreiheit ist ein fundamentales Grundrecht in Deutschland, das in Artikel 5 des Grundgesetzes verankert ist. Es schützt das Recht jeder Person, ihre Meinung zu äußern und Informationen frei zu empfangen und zu verbreiten.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 5, \"question\": \"Wahlen in Deutschland sind frei. Was bedeutet das?\", \"options\": [ \"Man darf Geld annehmen, wenn man dafür eine bestimmte Kandidatin/einen bestimmten Kandidaten wählt.\", \"Nur Personen, die noch nie im Gefängnis waren, dürfen wählen.\", \"Die Wählerin/der Wähler darf bei der Wahl weder beeinflusst noch zu einer bestimmten Stimmabgabe gezwungen werden und keine Nachteile durch die Wahl haben.\", \"Alle wahlberechtigten Personen müssen wählen.\" ], \"answer\": \"Die Wählerin/der Wähler darf bei der Wahl weder beeinflusst noch zu einer bestimmten Stimmabgabe gezwungen werden und keine Nachteile durch die Wahl haben.\", \"explanation\": \"Die Freiheit der Wahlen ist ein zentraler Aspekt der Demokratie in Deutschland. Sie stellt sicher, dass Wählerinnen und Wähler ohne Zwang oder Druck entscheiden können, und dass Wahlprozesse fair und transparent sind.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 6, \"question\": \"Wie heißt die deutsche Verfassung?\", \"options\": [ \"Volksgesetz\", \"Bundesgesetz\", \"Deutsches Gesetz\", \"Grundgesetz\" ], \"answer\": \"Grundgesetz\", \"explanation\": \"Das Grundgesetz ist die Verfassung der Bundesrepublik Deutschland, die am 23. Mai 1949 in Kraft trat. Es enthält die grundlegenden Prinzipien und Rechte, die die Ordnung des Staates und die Rechte der Bürger schützen.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 7, \"question\": \"Welches Recht gehört zu den Grundrechten, die nach der deutschen Verfassung garantiert werden? Das Recht auf …\", \"options\": [ \"Glaubens- und Gewissensfreiheit\", \"Unterhaltung\", \"Arbeit\", \"Wohnung\" ], \"answer\": \"Glaubens- und Gewissensfreiheit\", \"explanation\": \"Das Recht auf Glaubens- und Gewissensfreiheit ist ein fundamental garantiertes Recht im deutschen Grundgesetz. Es schützt das Recht jedes Einzelnen, seine Religion und seinen Glauben frei zu wählen und auszuüben.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 8, \"question\": \"Was steht nicht im Grundgesetz von Deutschland?\", \"options\": [ \"Die Würde des Menschen ist unantastbar.\", \"Alle sollen gleich viel Geld haben.\", \"Jeder Mensch darf seine Meinung sagen.\", \"Alle sind vor dem Gesetz gleich.\" ], \"answer\": \"Alle sollen gleich viel Geld haben.\", \"explanation\": \"Das Grundgesetz garantiert die Menschenwürde und Gleichheit vor dem Gesetz, aber es fordert nicht, dass alle gleich viel Geld besitzen. Wirtschaftliche Ungleichheit ist in einer freien Marktwirtschaft nicht ausgeschlossen.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 9, \"question\": \"Welches Grundrecht gilt in Deutschland nur für Ausländerinnen/Ausländer? Das Grundrecht auf …\", \"options\": [ \"Schutz der Familie\", \"Menschenwürde\", \"Asyl\", \"Meinungsfreiheit\" ], \"answer\": \"Asyl\", \"explanation\": \"Das Asylrecht ist ein spezielles Grundrecht in Deutschland, das Ausländerinnen und Ausländer schützt, die in ihrem Heimatland verfolgt werden. Es ermöglicht ihnen, in Deutschland Schutz und Zuflucht zu suchen.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 10, \"question\": \"Was ist mit dem deutschen Grundgesetz vereinbar?\", \"options\": [ \"die Prügelstrafe\", \"die Folter\", \"die Todesstrafe\", \"die Geldstrafe\" ], \"answer\": \"die Geldstrafe\", \"explanation\": \"Das Grundgesetz stellt die Menschenwürde und die Freiheit der Menschen in den Vordergrund und verbietet grausame Strafen wie Folter oder die Todesstrafe. Geldstrafen sind hingegen eine legale Maßnahme im Rechtssystem.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 11, \"question\": \"Wie wird die Verfassung der Bundesrepublik Deutschland genannt?\", \"options\": [ \"Grundgesetz\", \"Bundesverfassung\", \"Gesetzbuch\", \"Verfassungsvertrag\" ], \"answer\": \"Grundgesetz\", \"explanation\": \"Die Verfassung der Bundesrepublik Deutschland wird als Grundgesetz bezeichnet. Es regelt die Grundlagen des deutschen Staates und seiner politischen Ordnung und wurde 1949 verabschiedet, um die demokratischen Prinzipien nach dem Zweiten Weltkrieg zu sichern.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 12, \"question\": \"Eine Partei im Deutschen Bundestag will die Pressefreiheit abschaffen. Ist das möglich?\", \"options\": [ \"Ja, wenn mehr als die Hälfte der Abgeordneten im Bundestag dafür sind.\", \"Ja, aber dazu müssen zwei Drittel der Abgeordneten im Bundestag dafür sein.\", \"Nein, denn die Pressefreiheit ist ein Grundrecht. Sie kann nicht abgeschafft werden.\", \"Nein, denn nur der Bundesrat kann die Pressefreiheit abschaffen.\" ], \"answer\": \"Nein, denn die Pressefreiheit ist ein Grundrecht. Sie kann nicht abgeschafft werden.\", \"explanation\": \"Die Pressefreiheit ist in Deutschland ein geschütztes Grundrecht, das im Grundgesetz verankert ist. Dieses Grundrecht kann nicht einfach durch eine Mehrheit im Bundestag aufgehoben werden, sondern ist ein fundamentales Element der Demokratie, das den freien Austausch von Informationen sicherstellen soll.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 13, \"question\": \"Im Parlament steht der Begriff 'Opposition' für …\", \"options\": [ \"die regierenden Parteien.\", \"die Fraktion mit den meisten Abgeordneten.\", \"alle Parteien, die bei der letzten Wahl die 5%-Hürde erreichen konnten.\", \"alle Abgeordneten, die nicht zu der Regierungspartei/den Regierungsparteien gehören.\" ], \"answer\": \"alle Abgeordneten, die nicht zu der Regierungspartei/den Regierungsparteien gehören.\", \"explanation\": \"Die Opposition im Parlament besteht aus den Parteien, die nicht Teil der Regierungskoalition sind. Sie spielt eine wichtige Rolle in der politischen Kontrolle und kritischen Auseinandersetzung mit der Regierung, um sicherzustellen, dass verschiedene Meinungen und Perspektiven berücksichtigt werden.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 14, \"question\": \"Meinungsfreiheit in Deutschland heißt, dass ich …\", \"options\": [ \"Passanten auf der Straße beschimpfen darf.\", \"meine Meinung in Leserbriefen äußern kann.\", \"Nazi-, Hamas- oder Islamischer Staat-Symbole öffentlich tragen darf.\", \"meine Meinung nur dann äußern darf, solange ich der Regierung nicht widerspreche.\" ], \"answer\": \"meine Meinung in Leserbriefen äußern kann.\", \"explanation\": \"Die Meinungsfreiheit schützt das Recht, die eigene Meinung zu äußern und zu verbreiten. Es gibt jedoch Grenzen, insbesondere wenn die Meinungsäußerung die Rechte anderer verletzt oder gegen das Gesetz verstößt, wie zum Beispiel bei äusserungen, die zur Gewalt aufrufen oder diskriminierend sind.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 15, \"question\": \"Was verbietet das deutsche Grundgesetz?\", \"options\": [ \"Militärdienst\", \"Zwangsarbeit\", \"freie Berufswahl\", \"Arbeit im Ausland\" ], \"answer\": \"Zwangsarbeit\", \"explanation\": \"Das Grundgesetz der Bundesrepublik Deutschland verbietet Zwangsarbeit und stellt sicher, dass jede Person das Recht hat, zu arbeiten und ihre Arbeitskraft selbst zu bestimmen. Dies dient dem Schutz der Menschenwürde und der individuellen Freiheit von Zwang und Missbrauch.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 16, \"question\": \"Wann ist die Meinungsfreiheit in Deutschland eingeschränkt?\", \"options\": [ \"bei der öffentlichen Verbreitung falscher Behauptungen über einzelne Personen\", \"bei Meinungsäußerungen über die Bundesregierung\", \"bei Diskussionen über Religionen\", \"bei Kritik am Staat\" ], \"answer\": \"bei der öffentlichen Verbreitung falscher Behauptungen über einzelne Personen\", \"explanation\": \"Die Meinungsfreiheit kennt Grenzwerte, insbesondere wenn es um die Verbreitung von Unwahrheiten geht, die den Ruf und die Privatsphäre von Einzelpersonen schädigen können. Solche Falschaussagen können rechtliche Konsequenzen nach sich ziehen, um die Rechte anderer zu schützen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 17, \"question\": \"Die deutschen Gesetze verbieten …\", \"options\": [ \"Meinungsfreiheit der Einwohnerinnen und Einwohner.\", \"Petitionen der Bürgerinnen und Bürger.\", \"Versammlungsfreiheit der Einwohnerinnen und Einwohner.\", \"Ungleichbehandlung der Bürgerinnen und Bürger durch den Staat.\" ], \"answer\": \"Ungleichbehandlung der Bürgerinnen und Bürger durch den Staat.\", \"explanation\": \"Das deutsche Rechtssystem ist darauf ausgerichtet, Gleichheit vor dem Gesetz zu gewährleisten. Diskriminierung oder Ungleichbehandlung von Bürgern durch den Staat ist nicht nur unerwünscht, sondern auch gesetzlich verboten, um die Grundrechte aller zu schützen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 18, \"question\": \"Welches Grundrecht ist in Artikel 1 des Grundgesetzes der Bundesrepublik Deutschland garantiert?\", \"options\": [ \"die Unantastbarkeit der Menschenwürde\", \"das Recht auf Leben\", \"Religionsfreiheit\", \"Meinungsfreiheit\" ], \"answer\": \"die Unantastbarkeit der Menschenwürde\", \"explanation\": \"Artikel 1 des Grundgesetzes stellt die Unantastbarkeit der Menschenwürde in den Mittelpunkt der deutschen Verfassung. Dies bildet die Grundlage für alle weiteren Grundrechte und unterstreicht die Wichtigkeit der Menschenwürde als höchstes Gut in einer demokratischen Gesellschaft.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 19, \"question\": \"Was versteht man unter dem Recht der 'Freizügigkeit' in Deutschland?\", \"options\": [ \"Man darf sich seinen Wohnort selbst aussuchen.\", \"Man kann seinen Beruf wechseln.\", \"Man darf sich für eine andere Religion entscheiden.\", \"Man darf sich in der Öffentlichkeit nur leicht bekleidet bewegen.\" ], \"answer\": \"Man darf sich seinen Wohnort selbst aussuchen.\", \"explanation\": \"Das Recht auf Freizügigkeit bedeutet in Deutschland, dass jeder Bürger das Recht hat, seinen Wohnort frei zu wählen. Dies ist ein wichtiger Aspekt der persönlichen Freiheit und der Mobilität innerhalb des Landes, der auch in vielen internationalen Menschenrechtsabkommen verankert ist.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 20, \"question\": \"Eine Partei in Deutschland verfolgt das Ziel, eine Diktatur zu errichten. Sie ist dann …\", \"options\": [ \"tolerant.\", \"rechtsstaatlich orientiert.\", \"gesetzestreu.\", \"verfassungswidrig.\" ], \"answer\": \"verfassungswidrig.\", \"explanation\": \"Eine Partei, die aktiv eine Diktatur anstrebt, verstößt gegen die Prinzipien der deutschen Verfassung, die auf Demokratie und Rechtsstaatlichkeit basieren. Solche Bestrebungen sind verfassungswidrig und können rechtliche Schritte nach sich ziehen, um die Demokratie zu schützen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 21, \"question\": \"Welches ist das Wappen der Bundesrepublik Deutschland?\", \"options\": [\"Bild 1\", \"Bild 2\", \"Bild 3\", \"Bild 4\"], \"answer\": \"Bild 1\", \"explanation\": \"Das Wappen der Bundesrepublik Deutschland zeigt einen Schwarz-Roten-Goldenen Adler. Es symbolisiert die Einheit und Souveränität des Landes.\", \"state\": \"general\", \"type\": \"image\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 22, \"question\": \"Was für eine Staatsform hat Deutschland?\", \"options\": [\"Monarchie\", \"Diktatur\", \"Republik\", \"Fürstentum\"], \"answer\": \"Republik\", \"explanation\": \"Deutschland ist eine parlamentarische Republik, was bedeutet, dass die Staatsgewalt vom Volk ausgeht und durch gewählte Vertreter ausgeübt wird. In einer Republik ist die Regierung für ihre Handlungen gegenüber dem Volk rechenschaftspflichtig.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 23, \"question\": \"In Deutschland sind die meisten Erwerbstätigen …\", \"options\": [ \"in kleinen Familienunternehmen beschäftigt.\", \"ehrenamtlich für ein Bundesland tätig.\", \"selbstständig mit einer eigenen Firma tätig.\", \"bei einer Firma oder Behörde beschäftigt.\" ], \"answer\": \"bei einer Firma oder Behörde beschäftigt.\", \"explanation\": \"Die deutsche Wirtschaft ist stark von Unternehmen geprägt, in denen viele Erwerbstätige angestellt sind. Der öffentliche Sektor spielt ebenfalls eine wichtige Rolle und bietet viele Arbeitsplätze.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 24, \"question\": \"Wie viele Bundesländer hat die Bundesrepublik Deutschland?\", \"options\": [\"14\", \"15\", \"16\", \"17\"], \"answer\": \"16\", \"explanation\": \"Deutschland besteht aus 16 Bundesländern, die jeweils eigene Regierungen und Gesetze haben. Diese föderale Struktur ermöglicht eine politische Dezentralisierung und regionale Selbstverwaltung.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 25, \"question\": \"Was ist kein Bundesland der Bundesrepublik Deutschland?\", \"options\": [ \"Elsass-Lothringen\", \"Nordrhein-Westfalen\", \"Mecklenburg-Vorpommern\", \"Sachsen-Anhalt\" ], \"answer\": \"Elsass-Lothringen\", \"explanation\": \"Elsass-Lothringen ist ein historisches Gebiet, das nicht zu Deutschland gehört, sondern zu Frankreich. Deutschland hat 16 Bundesländer, die unterschiedliche Geografien und Kulturen repräsentieren.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 26, \"question\": \"Deutschland ist …\", \"options\": [ \"eine kommunistische Republik.\", \"ein demokratischer und sozialer Bundesstaat.\", \"eine kapitalistische und soziale Monarchie.\", \"ein sozialer und sozialistischer Bundesstaat.\" ], \"answer\": \"ein demokratischer und sozialer Bundesstaat.\", \"explanation\": \"Deutschland hat sich als demokratischer und sozialer Bundesstaat konstituiert, was bedeutet, dass Bürgerrechte und soziale Gerechtigkeit im Vordergrund stehen. Die Verfassung sichert die Rechte des Einzelnen und fördert soziale Maßnahmen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 27, \"question\": \"Deutschland ist …\", \"options\": [ \"ein sozialistischer Staat.\", \"ein Bundesstaat.\", \"eine Diktatur.\", \"eine Monarchie.\" ], \"answer\": \"ein Bundesstaat.\", \"explanation\": \"Als Bundesstaat hat Deutschland mehrere eigenständige Bundesländer, die jeweils eigene Gesetzgebungen haben, jedoch Teil des Gesamtstaates sind. Diese Struktur ermöglicht eine regionale Selbstverwaltung und Vielfalt.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 28, \"question\": \"Wer wählt in Deutschland die Abgeordneten zum Bundestag?\", \"options\": [ \"das Militär\", \"die Wirtschaft\", \"das wahlberechtigte Volk\", \"die Verwaltung\" ], \"answer\": \"das wahlberechtigte Volk\", \"explanation\": \"In Deutschland wählt das wahlberechtigte Volk die Abgeordneten zum Bundestag alle vier Jahre in allgemeinen, freien, gleichen und geheimen Wahlen. Diese Wahlen sind ein zentraler Bestandteil der demokratischen Teilhabe.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 29, \"question\": \"Welches Tier ist das Wappentier der Bundesrepublik Deutschland?\", \"options\": [\"Löwe\", \"Adler\", \"Bär\", \"Pferd\"], \"answer\": \"Adler\", \"explanation\": \"Der Adler ist das Wappentier der Bundesrepublik Deutschland und repräsentiert Stärke, Macht und Unabhängigkeit. Er hat eine lange Tradition in der deutschen Heraldik und wird häufig als Symbol für die Nation verwendet.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 30, \"question\": \"Was ist kein Merkmal unserer Demokratie?\", \"options\": [ \"regelmäßige Wahlen\", \"Pressezensur\", \"Meinungsfreiheit\", \"verschiedene Parteien\" ], \"answer\": \"Pressezensur\", \"explanation\": \"Ein wesentliches Merkmal einer Demokratie ist die Meinungsfreiheit, die es den Bürgern ermöglicht, ihre Ansichten ohne Einschränkung zu äußern. Pressezensur widerspricht den Grundprinzipien einer demokratischen Gesellschaft, in der ein freier Informationsaustausch essentiell ist.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-1\", \"category\": \"Grundlagen der Demokratie\" }, { \"id\": 31, \"question\": \"Die Zusammenarbeit von Parteien zur Bildung einer Regierung nennt man in Deutschland …\", \"options\": [\"Einheit.\", \"Koalition.\", \"Ministerium.\", \"Fraktion.\"], \"answer\": \"Koalition.\", \"explanation\": \"In Deutschland bezieht sich der Begriff 'Koalition' auf eine Zusammenarbeit mehrerer politischer Parteien, um gemeinsam eine Regierung zu bilden. Dies ist oft notwendig, wenn keine Partei allein die Mehrheit der Sitze im Parlament hat, und zeigt die Kompromissbereitschaft der Parteien.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 32, \"question\": \"Was ist keine staatliche Gewalt in Deutschland?\", \"options\": [\"Gesetzgebung\", \"Regierung\", \"Presse\", \"Rechtsprechung\"], \"answer\": \"Presse\", \"explanation\": \"In Deutschland gibt es drei klassische Gewaltenteilungen: Legislative (Gesetzgebung), Exekutive (Regierung) und Judikative (Rechtsprechung). Die Presse hingegen ist ein Teil der Zivilgesellschaft und hat eine kontrollierende Funktion, ist aber keine staatliche Gewalt.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 33, \"question\": \"Welche Aussage ist richtig? In Deutschland …\", \"options\": [ \"sind Staat und Religionsgemeinschaften voneinander getrennt.\", \"bilden die Religionsgemeinschaften den Staat.\", \"ist der Staat abhängig von den Religionsgemeinschaften.\", \"bilden Staat und Religionsgemeinschaften eine Einheit.\" ], \"answer\": \"sind Staat und Religionsgemeinschaften voneinander getrennt.\", \"explanation\": \"In Deutschland ist die Trennung von Staat und Religionsgemeinschaften ein wichtiges Prinzip, das durch das Grundgesetz festgelegt ist. Dies bedeutet, dass der Staat neutral gegenüber verschiedenen Religionen agiert und keine Religion bevorzugt oder benachteiligt.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 34, \"question\": \"Was ist Deutschland nicht?\", \"options\": [ \"eine Demokratie\", \"ein Rechtsstaat\", \"eine Monarchie\", \"ein Sozialstaat\" ], \"answer\": \"eine Monarchie\", \"explanation\": \"Deutschland ist eine parlamentarische Demokratie und ein Rechtsstaat. Das heißt, die Macht geht vom Volk aus und wird durch gewählte Vertreter in einem parlamentarischen System ausgeübt, während Monarchien in der Regel von einem König oder einer Königin regiert werden.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 35, \"question\": \"Womit finanziert der deutsche Staat die Sozialversicherung?\", \"options\": [ \"Kirchensteuer\", \"Sozialabgaben\", \"Spendengeldern\", \"Vereinsbeiträgen\" ], \"answer\": \"Sozialabgaben\", \"explanation\": \"Die Sozialversicherung in Deutschland wird hauptsächlich durch Sozialabgaben finanziert, die von Arbeitnehmern und Arbeitgebern gezahlt werden. Diese Abgaben umfassen Beiträge zur Kranken-, Pflege-, Renten- und Arbeitslosenversicherung und sind wichtig für das soziale Sicherungssystem.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 36, \"question\": \"Welche Maßnahme schafft in Deutschland soziale Sicherheit?\", \"options\": [ \"die Krankenversicherung\", \"die Autoversicherung\", \"die Gebäudeversicherung\", \"die Haftpflichtversicherung\" ], \"answer\": \"die Krankenversicherung\", \"explanation\": \"Die Krankenversicherung ist ein zentraler Bestandteil des deutschen Sozialsystems und gewährleistet, dass alle Bürger im Krankheitsfall medizinisch versorgt werden. Sie bietet finanziellen Schutz und sorgt dafür, dass der Zugang zu Gesundheitsleistungen erleichtert wird.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 37, \"question\": \"Wie werden die Regierungschefinnen/Regierungschefs der meisten Bundesländer in Deutschland genannt?\", \"options\": [ \"Erste Ministerin/Erster Minister\", \"Premierministerin/Premierminister\", \"Senatorin/Senator\", \"Ministerpräsidentin/Ministerpräsident\" ], \"answer\": \"Ministerpräsidentin/Ministerpräsident\", \"explanation\": \"In Deutschland wird der Regierungschef eines Bundeslandes als Ministerpräsident oder Ministerpräsidentin bezeichnet. Diese Position ist verantwortlich für die Leitung der Landesregierung und die Umsetzung von Landespolitik.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 38, \"question\": \"Die Bundesrepublik Deutschland ist ein demokratischer und sozialer …\", \"options\": [ \"Staatenverbund.\", \"Bundesstaat.\", \"Staatenbund.\", \"Zentralstaat.\" ], \"answer\": \"Bundesstaat.\", \"explanation\": \"Deutschland ist ein Bundesstaat, was bedeutet, dass es aus mehreren Bundesländern besteht, die jeweils eigene Regierungen und Parlamente haben. Diese Struktur erlaubt es den Bundesländern, bestimmte Angelegenheiten selbstständig zu regeln, während der Bund für nationale Belange zuständig ist.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 39, \"question\": \"Was hat jedes deutsche Bundesland?\", \"options\": [ \"eine eigene Außenministerin/einen eigenen Außenminister\", \"eine eigene Währung\", \"eine eigene Armee\", \"eine eigene Regierung\" ], \"answer\": \"eine eigene Regierung\", \"explanation\": \"Jedes deutsche Bundesland hat eine eigene Regierung, die für die Verwaltung und Gesetzgebung auf Landesebene zuständig ist. Diese Regierungen sind wichtig für die lokale Politik und tragen zur Autonomie der Bundesländer innerhalb des föderalen Systems Deutschlands bei.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 40, \"question\": \"Mit welchen Worten beginnt die deutsche Nationalhymne?\", \"options\": [ \"Völker, hört die Signale …\", \"Einigkeit und Recht und Freiheit …\", \"Freude schöner Götterfunken …\", \"Deutschland einig Vaterland …\" ], \"answer\": \"Einigkeit und Recht und Freiheit …\", \"explanation\": \"Die deutsche Nationalhymne beginnt mit den Worten 'Einigkeit und Recht und Freiheit', die idealistisch für die Werte stehen, die das Land vereinen. Diese Hymne spiegelt die Bedeutung von Freiheit und Einheit in der deutschen Geschichte und gegenwärtigen Identität wider.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 41, \"question\": \"Warum gibt es in einer Demokratie mehr als eine Partei?\", \"options\": [ \"weil dadurch die unterschiedlichen Meinungen der Bürgerinnen und Bürger vertreten werden\", \"damit Bestechung in der Politik begrenzt wird\", \"um politische Demonstrationen zu verhindern\", \"um wirtschaftlichen Wettbewerb anzuregen\" ], \"answer\": \"weil dadurch die unterschiedlichen Meinungen der Bürgerinnen und Bürger vertreten werden\", \"explanation\": \"In einer Demokratie ist es wichtig, dass verschiedene Meinungen und Interessen der Bevölkerung Gehör finden. Mehrere Parteien ermöglichen es den Bürgerinnen und Bürgern, unterschiedliche Perspektiven zu wählen und tragen so zu einer lebendigen politischen Diskussion bei.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 42, \"question\": \"Wer beschließt in Deutschland ein neues Gesetz?\", \"options\": [ \"die Regierung\", \"das Parlament\", \"die Gerichte\", \"die Polizei\" ], \"answer\": \"das Parlament\", \"explanation\": \"Das Parlament, bestehend aus dem Bundestag und dem Bundesrat, ist die gesetzgebende Gewalt in Deutschland. Es hat die Aufgabe, Gesetze zu beraten und zu beschließen, was für die demokratische Mitbestimmung der Bürger von zentraler Bedeutung ist.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 43, \"question\": \"Wann kann in Deutschland eine Partei verboten werden?\", \"options\": [ \"wenn ihr Wahlkampf zu teuer ist\", \"wenn sie gegen die Verfassung kämpft\", \"wenn sie Kritik am Staatsoberhaupt äußert\", \"wenn ihr Programm eine neue Richtung vorschlägt\" ], \"answer\": \"wenn sie gegen die Verfassung kämpft\", \"explanation\": \"In Deutschland kann eine Partei verboten werden, wenn sie die verfassungsmäßige Ordnung gefährdet oder gegen die Grundsätze der Verfassung verstößt. Dies dient dem Schutz der Demokratie und der freiheitlichen Grundordnung.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 44, \"question\": \"Wen kann man als Bürgerin/Bürger in Deutschland nicht direkt wählen?\", \"options\": [ \"Abgeordnete des EU-Parlaments\", \"Die Bundespräsidentin/den Bundespräsidenten\", \"Landtagsabgeordnete\", \"Bundestagsabgeordnete\" ], \"answer\": \"Die Bundespräsidentin/den Bundespräsidenten\", \"explanation\": \"Die Bundespräsidentin oder der Bundespräsident wird nicht direkt von den Bürgerinnen und Bürgern gewählt, sondern von der Bundesversammlung, die aus Mitgliedern des Bundestages und Vertretern der Bundesländer besteht. Diese Indirektwahl hat eine symbolische Bedeutung für die Stabilität und Einheit des Staates.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 45, \"question\": \"Zu welcher Versicherung gehört die Pflegeversicherung?\", \"options\": [ \"Sozialversicherung\", \"Unfallversicherung\", \"Hausratsversicherung\", \"Haftpflicht- und Feuerversicherung\" ], \"answer\": \"Sozialversicherung\", \"explanation\": \"Die Pflegeversicherung ist Teil der Sozialversicherung in Deutschland und soll die finanziellen Risiken der Pflegebedürftigkeit abdecken. Sie unterstützt Menschen, die aufgrund von Krankheit oder Alter Hilfe benötigen, und entlastet die Angehörigen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 46, \"question\": \"Der deutsche Staat hat viele Aufgaben. Welche Aufgabe gehört dazu?\", \"options\": [ \"Er baut Straßen und Schulen.\", \"Er verkauft Lebensmittel und Kleidung.\", \"Er versorgt alle Einwohnerinnen und Einwohner kostenlos mit Zeitungen.\", \"Er produziert Autos und Busse.\" ], \"answer\": \"Er baut Straßen und Schulen.\", \"explanation\": \"Zu den Aufgaben des deutschen Staates gehören unter anderem der Bau von Infrastruktur wie Straßen und Schulen, da diese für das Gemeinwohl wichtig sind. Der Staat sorgt dafür, dass die Bedürfnisse der Bürgerinnen und Bürger in diesen Bereichen erfüllt werden.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 47, \"question\": \"Der deutsche Staat hat viele Aufgaben. Welche Aufgabe gehört nicht dazu?\", \"options\": [ \"Er bezahlt für alle Staatsangehörigen Urlaubsreisen.\", \"Er zahlt Kindergeld.\", \"Er unterstützt Museen.\", \"Er fördert Sportlerinnen und Sportler.\" ], \"answer\": \"Er bezahlt für alle Staatsangehörigen Urlaubsreisen.\", \"explanation\": \"Der deutsche Staat hat keine Aufgabe, die die Finanzierung von Urlaubsreisen für alle Staatsangehörigen umfasst. Stattdessen kümmert er sich um die sozialen und kulturellen Belange, indem er beispielsweise Kindergeld zahlt oder Museen unterstützt.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 48, \"question\": \"Welches Organ gehört nicht zu den Verfassungsorganen Deutschlands?\", \"options\": [ \"der Bundesrat\", \"die Bundespräsidentin/der Bundespräsident\", \"die Bürgerversammlung\", \"die Regierung\" ], \"answer\": \"die Bürgerversammlung\", \"explanation\": \"Die Verfassungsorgane in Deutschland umfassen den Bundestag, den Bundesrat, die Bundesregierung und den Bundespräsidenten. Eine Bürgerversammlung gehört nicht zu diesen Organen, da sie in Deutschland nicht als offizielles Organ der politischen Willensbildung anerkannt ist.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 49, \"question\": \"Wer bestimmt in Deutschland die Schulpolitik?\", \"options\": [ \"die Lehrer und Lehrerinnen\", \"die Bundesländer\", \"das Familienministerium\", \"die Universitäten\" ], \"answer\": \"die Bundesländer\", \"explanation\": \"In Deutschland ist die Schulpolitik Sache der Bundesländer, die für das Bildungssystem verantwortlich sind. Diese Föderalismusstruktur ermöglicht es den Ländern, Bildungskonzepte zu entwickeln, die auf die spezifischen Bedürfnisse ihrer Bevölkerung zugeschnitten sind.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 50, \"question\": \"Die Wirtschaftsform in Deutschland nennt man …\", \"options\": [ \"freie Zentralwirtschaft.\", \"soziale Marktwirtschaft.\", \"gelenkte Zentralwirtschaft.\", \"Planwirtschaft.\" ], \"answer\": \"soziale Marktwirtschaft.\", \"explanation\": \"Die soziale Marktwirtschaft beschreibt ein Wirtschaftssystem, das Elemente der Marktwirtschaft mit sozialen Aspekten kombiniert. Diese Form zielt darauf ab, wirtschaftliche Effizienz zu fördern, während gleichzeitig soziale Gerechtigkeit und Chancengleichheit gewährleistet werden.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 51, \"question\": \"Zu einem demokratischen Rechtsstaat gehört es nicht, dass …\", \"options\": [ \"Menschen sich kritisch über die Regierung äußern können.\", \"Bürger friedlich demonstrieren gehen dürfen.\", \"Menschen von einer Privatpolizei ohne Grund verhaftet werden.\", \"jemand ein Verbrechen begeht und deshalb verhaftet wird.\" ], \"answer\": \"Menschen von einer Privatpolizei ohne Grund verhaftet werden.\", \"explanation\": \"Ein demokratischer Rechtsstaat gewährleistet die Rechte seiner Bürger, einschließlich der Meinungsfreiheit und des Rechts auf friedliche Versammlung. Die willkürliche Verhaftung durch nichtstaatliche Institutionen widerspricht den Grundprinzipien eines Rechtsstaates und gefährdet die individuelle Freiheit.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 52, \"question\": \"Was bedeutet 'Volkssouveränität'? Alle Staatsgewalt geht vom ...\", \"options\": [ \"Volke aus.\", \"Bundestag aus.\", \"preußischen König aus.\", \"Bundesverfassungsgericht aus.\" ], \"answer\": \"Volke aus.\", \"explanation\": \"Der Begriff 'Volkssouveränität' beschreibt das Prinzip, dass die Macht und Autorität des Staates letztlich vom Volk ausgeht. In einer Demokratie sind es die Bürger, die durch Wahlen und politische Beteiligung Einfluss auf die Regierung und Gesetzgebung nehmen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 53, \"question\": \"Was bedeutet 'Rechtsstaat' in Deutschland?\", \"options\": [ \"Der Staat hat Recht.\", \"Es gibt nur rechte Parteien.\", \"Die Bürgerinnen und Bürger entscheiden über Gesetze.\", \"Der Staat muss die Gesetze einhalten.\" ], \"answer\": \"Der Staat muss die Gesetze einhalten.\", \"explanation\": \"Ein Rechtsstaat bedeutet, dass die öffentliche Gewalt an das Recht gebunden ist und Gesetze für alle gelten, einschließlich der staatlichen Institutionen. Dies schützt die Bürger vor willkürlichen Entscheidungen und garantiert ihre Grundrechte.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 54, \"question\": \"Was ist keine staatliche Gewalt in Deutschland?\", \"options\": [\"Legislative\", \"Judikative\", \"Exekutive\", \"Direktive\"], \"answer\": \"Direktive\", \"explanation\": \"Die drei staatlichen Gewalten in Deutschland sind Legislative (Gesetzgebung), Judikative (Rechtsprechung) und Exekutive (Ausführung der Gesetze). 'Direktive' ist kein Begriff für eine staatliche Gewalt, sondern bezeichnet eher Anweisungen oder Richtlinien innerhalb eines bestimmten Bereichs.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 55, \"question\": \"Was zeigt dieses Bild?\", \"options\": [ \"den Bundestagssitz in Berlin\", \"das Bundesverfassungsgericht in Karlsruhe\", \"das Bundesratsgebäude in Berlin\", \"das Bundeskanzleramt in Berlin\" ], \"answer\": \"den Bundestagssitz in Berlin\", \"explanation\": \"Der Bundestag ist das Hauptorgan der Legislative in Deutschland, wo Gesetze erlassen und debattiert werden. Der Sitz des Bundestags befindet sich im Reichstagsgebäude in Berlin und ist ein Symbol für die deutsche Demokratie.\", \"state\": \"general\", \"type\": \"image\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 56, \"question\": \"Welches Amt gehört in Deutschland zur Gemeindeverwaltung?\", \"options\": [\"Pfarramt\", \"Ordnungsamt\", \"Finanzamt\", \"Auswärtiges Amt\"], \"answer\": \"Ordnungsamt\", \"explanation\": \"Das Ordnungsamt ist eine Funktion innerhalb der Gemeindeverwaltung, die für die öffentliche Sicherheit und Ordnung zuständig ist. Im Gegensatz dazu sind das Pfarramt, das Finanzamt und das Auswärtige Amt anderen Verwaltungsbereichen zugeordnet.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 57, \"question\": \"Wer wird meistens zur Präsidentin/zum Präsidenten des Deutschen Bundestages gewählt?\", \"options\": [ \"die/der älteste Abgeordnete im Parlament\", \"die Ministerpräsidentin/der Ministerpräsident des größten Bundeslandes\", \"eine ehemalige Bundeskanzlerin/ein ehemaliger Bundeskanzler\", \"eine Abgeordnete/ein Abgeordneter der stärksten Fraktion\" ], \"answer\": \"eine Abgeordnete/ein Abgeordneter der stärksten Fraktion\", \"explanation\": \"Die Wahl des Bundestagspräsidenten erfolgt in der Regel aus den Reihen der stärksten Fraktion im Bundestag, um die Interessen dieser Fraktion im Parlament zu repräsentieren. Der Präsident hat die Aufgabe, die Sitzungen zu leiten und die Ordnung im Parlament zu wahren.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 58, \"question\": \"Wer ernennt in Deutschland die Ministerinnen/die Minister der Bundesregierung?\", \"options\": [ \"die Präsidentin/der Präsident des Bundesverfassungsgerichtes\", \"die Bundespräsidentin/der Bundespräsident\", \"die Bundesratspräsidentin/der Bundesratspräsident\", \"die Bundestagspräsidentin/der Bundestagspräsident\" ], \"answer\": \"die Bundespräsidentin/der Bundespräsident\", \"explanation\": \"In Deutschland ernennt die Bundespräsidentin oder der Bundespräsident die Mitglieder der Bundesregierung auf Vorschlag des Bundeskanzlers. Dies ist ein zentraler Teil der Exekutive und sorgt für die politische Leitung des Landes.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 59, \"question\": \"Vor wie vielen Jahren gab es erstmals eine jüdische Gemeinde auf dem Gebiet des heutigen Deutschlands?\", \"options\": [ \"vor etwa 300 Jahren\", \"vor etwa 700 Jahren\", \"vor etwa 1150 Jahren\", \"vor etwa 1700 Jahren\" ], \"answer\": \"vor etwa 1700 Jahren\", \"explanation\": \"Die jüdische Gemeinde in Deutschland hat eine lange Geschichte, die bis in die Antike zurückreicht. Die ersten Aufzeichnungen über jüdisches Leben auf dem heutigen deutschen Gebiet stammen aus der Römerzeit, was die kulturelle Vielfalt und die historische Tiefe der jüdischen Diaspora verdeutlicht.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 60, \"question\": \"In Deutschland gehören der Bundestag und der Bundesrat zur …\", \"options\": [\"Exekutive.\", \"Legislative.\", \"Direktive.\", \"Judikative.\"], \"answer\": \"Legislative.\", \"explanation\": \"Der Bundestag und der Bundesrat sind beide Organe der Legislative in Deutschland, zuständig für die Gesetzgebung. Diese Gewalt ist verantwortlich für die Schaffung und Überprüfung von Gesetzen und spielt eine entscheidende Rolle im politischen System.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-2\", \"category\": \"Recht und Verfassung\" }, { \"id\": 61, \"question\": \"Was bedeutet 'Volkssouveränität'?\", \"options\": [ \"Die Königin/der König herrscht über das Volk.\", \"Das Bundesverfassungsgericht steht über der Verfassung.\", \"Die Interessenverbände üben die Souveränität zusammen mit der Regierung aus.\", \"Die Staatsgewalt geht vom Volke aus.\" ], \"answer\": \"Die Staatsgewalt geht vom Volke aus.\", \"explanation\": \"Volkssouveränität ist ein grundlegendes Prinzip der Demokratie, das besagt, dass die Macht im Staat vom Volk ausgeht. In einer demokratischen Gesellschaft haben die Bürger das Recht, durch Wahlen und andere Formen der Beteiligung ihre Vertreter zu wählen und somit Einfluss auf die staatliche Macht zu nehmen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 62, \"question\": \"Wenn das Parlament eines deutschen Bundeslandes gewählt wird, nennt man das …\", \"options\": [\"Kommunalwahl\", \"Landtagswahl\", \"Europawahl\", \"Bundestagswahl\"], \"answer\": \"Landtagswahl\", \"explanation\": \"Die Landtagswahl ist der Prozess, durch den die Abgeordneten des Landtags in einem deutschen Bundesland gewählt werden. Jedes Bundesland hat ein eigenes Parlament, dessen Mitglieder für regionale politische Entscheidungen verantwortlich sind.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 63, \"question\": \"Was gehört in Deutschland nicht zur Exekutive?\", \"options\": [ \"die Polizei\", \"die Gerichte\", \"das Finanzamt\", \"die Ministerien\" ], \"answer\": \"die Gerichte\", \"explanation\": \"Die Exekutive umfasst die ausführende Gewalt im Staat, insbesondere die Regierung und die Verwaltungsbehörden wie die Polizei oder die Ministerien. Die Gerichte hingegen gehören zur Judikative, die für die Rechtsprechung verantwortlich ist.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 64, \"question\": \"Die Bundesrepublik Deutschland ist heute gegliedert in …\", \"options\": [ \"vier Besatzungszonen.\", \"einen Oststaat und einen Weststaat.\", \"16 Kantone.\", \"Bund, Länder und Kommunen.\" ], \"answer\": \"Bund, Länder und Kommunen.\", \"explanation\": \"Die Bundesrepublik Deutschland ist ein föderalistischer Staat, der aus dem Bund, den 16 Bundesländern und den Kommunen besteht. Diese Gliederung ermöglicht es, dass verschiedene politische Ebenen unterschiedliche Aufgaben und Verantwortlichkeiten haben.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 65, \"question\": \"Es gehört nicht zu den Aufgaben des Deutschen Bundestages, …\", \"options\": [ \"Gesetze zu entwerfen.\", \"die Bundesregierung zu kontrollieren.\", \"die Bundeskanzlerin/den Bundeskanzler zu wählen.\", \"das Bundeskabinett zu bilden.\" ], \"answer\": \"das Bundeskabinett zu bilden.\", \"explanation\": \"Der Deutsche Bundestag hat verschiedene Aufgaben, darunter die Gesetzgebung und die Kontrolle der Bundesregierung. Die Bildung des Bundeskabinetts liegt jedoch in der Verantwortung der Bundeskanzlerin bzw. des Bundeskanzlers.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 66, \"question\": \"Welche Städte haben die größten jüdischen Gemeinden in Deutschland?\", \"options\": [ \"Berlin und München\", \"Hamburg und Essen\", \"Nürnberg und Stuttgart\", \"Worms und Speyer\" ], \"answer\": \"Berlin und München\", \"explanation\": \"Berlin und München sind zwei der größten Städte Deutschlands und haben daher auch bedeutende jüdische Gemeinden. Diese Gemeinden tragen zur kulturellen und sozialen Vielfalt in Deutschland bei und haben eine wichtige historische Bedeutung.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 67, \"question\": \"Was ist in Deutschland vor allem eine Aufgabe der Bundesländer?\", \"options\": [ \"Verteidigungspolitik\", \"Außenpolitik\", \"Wirtschaftspolitik\", \"Schulpolitik\" ], \"answer\": \"Schulpolitik\", \"explanation\": \"In Deutschland sind die Bundesländer verantwortlich für die Bildungspolitik, einschließlich Schulpolitik. Jedes Bundesland kann eigene Gesetze und Regelungen für Schulen und das Bildungssystem festlegen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 68, \"question\": \"Warum kontrolliert der Staat in Deutschland das Schulwesen?\", \"options\": [ \"weil es in Deutschland nur staatliche Schulen gibt\", \"weil alle Schülerinnen und Schüler einen Schulabschluss haben müssen\", \"weil es in den Bundesländern verschiedene Schulen gibt\", \"weil es nach dem Grundgesetz seine Aufgabe ist\" ], \"answer\": \"weil es nach dem Grundgesetz seine Aufgabe ist\", \"explanation\": \"Nach dem Grundgesetz hat der Staat die Verantwortung für das Bildungswesen. Dies umfasst sowohl die Gewährleistung eines bestimmten Bildungsstandards als auch die Sicherstellung, dass alle Kinder Zugang zu einer Schulbildung haben.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 69, \"question\": \"Die Bundesrepublik Deutschland hat einen dreistufigen Verwaltungsaufbau. Wie heißt die unterste politische Stufe?\", \"options\": [\"Stadträte\", \"Landräte\", \"Gemeinden\", \"Bezirksämter\"], \"answer\": \"Gemeinden\", \"explanation\": \"Die Gemeinden sind die kleinste und unterste politische Einheit im deutschen Verwaltungsaufbau. Sie sind für viele alltägliche Aufgaben der Bürger zuständig, wie Wasser- und Abfallwirtschaft, Bauwesen und öffentliche Sicherheit.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 70, \"type\": \"image\", \"question\": \"Der deutsche Bundespräsident Gustav Heinemann gibt Helmut Schmidt 1974 die Ernennungsurkunde zum deutschen Bundeskanzler. Was gehört zu den Aufgaben der deutschen Bundespräsidentin/des deutschen Bundespräsidenten?\", \"options\": [ \"Sie/Er führt die Regierungsgeschäfte.\", \"Sie/Er kontrolliert die Regierungspartei.\", \"Sie/Er wählt die Ministerinnen/Minister aus.\", \"Sie/Er schlägt die Kanzlerin/den Kanzler zur Wahl vor.\" ], \"answer\": \"Sie/Er schlägt die Kanzlerin/den Kanzler zur Wahl vor.\", \"explanation\": \"Der Bundespräsident hat in Deutschland eine repräsentative Funktion und spielt eine zentrale Rolle im politischen System. Eine seiner Aufgaben ist es, die Kanzlerin oder den Kanzler zur Wahl vorzuschlagen, was symbolisch die Leitung der Regierung darstellt.\", \"state\": \"general\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 71, \"question\": \"Wo hält sich die deutsche Bundeskanzlerin/der deutsche Bundeskanzler am häufigsten auf? Am häufigsten ist sie/er …\", \"options\": [ \"in Bonn, weil sich dort das Bundeskanzleramt und der Bundestag befinden.\", \"auf Schloss Meseberg, dem Gästehaus der Bundesregierung, um Staatsgäste zu empfangen.\", \"auf Schloss Bellevue, dem Amtssitz der Bundespräsidentin/des Bundespräsidenten, um Staatsgäste zu empfangen.\", \"in Berlin, weil sich dort das Bundeskanzleramt und der Bundestag befinden.\" ], \"answer\": \"in Berlin, weil sich dort das Bundeskanzleramt und der Bundestag befinden.\", \"explanation\": \"Die Bundeskanzlerin oder der Bundeskanzler ist der Regierungschef Deutschlands und hat ihren/seinen Hauptsitz im Bundeskanzleramt in Berlin. Diese Stadt ist auch Sitz des Bundestages, was sie zu einem wichtigen politischen Zentrum macht.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 72, \"question\": \"Wie heißt die jetzige Bundeskanzlerin/der jetzige Bundeskanzler von Deutschland?\", \"options\": [ \"Gerhard Schröder\", \"Angela Merkel\", \"Ursula von der Leyen\", \"Friedrich Merz\" ], \"answer\": \"Friedrich Merz\", \"explanation\": \"Die aktuelle Bundeskanzlerin oder der Bundeskanzler ist die Person, die die Exekutive leitet und die Regierung vertritt. Friedrich Merz trat sein Amt im Dezember 2021 an und führt die Bundesregierung.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 73, \"question\": \"Die beiden größten Fraktionen im Deutschen Bundestag heißen zurzeit …\", \"options\": [ \"CDU/CSU und SPD.\", \"Die Linke und Bündnis 90/Die Grünen.\", \"FDP und SPD.\", \"Die Linke und FDP.\" ], \"answer\": \"CDU/CSU und SPD.\", \"explanation\": \"Im Deutschen Bundestag bilden die Fraktionen eine wichtige Grundlage für die parlamentarische Arbeit. Die CDU/CSU und die SPD sind die beiden größten politischen Parteien in Deutschland und prägen die politische Landschaft erheblich.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 74, \"question\": \"Wie heißt das Parlament für ganz Deutschland?\", \"options\": [ \"Bundesversammlung\", \"Volkskammer\", \"Bundestag\", \"Bundesgerichtshof\" ], \"answer\": \"Bundestag\", \"explanation\": \"Der Bundestag ist das Hauptparlament der Bundesrepublik Deutschland und hat die Aufgabe, Gesetze zu erlassen und die Regierung zu kontrollieren. Er besteht aus Abgeordneten, die in allgemeiner, unmittelbarer, freier, gleicher Wahl gewählt werden.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 75, \"question\": \"Wie heißt Deutschlands heutiges Staatsoberhaupt?\", \"options\": [ \"Frank-Walter Steinmeier\", \"Bärbel Bas\", \"Bodo Ramelow\", \"Joachim Gauck\" ], \"answer\": \"Frank-Walter Steinmeier\", \"explanation\": \"Das Staatsoberhaupt Deutschlands ist der Bundespräsident, dessen Aufgaben hauptsächlich repräsentativer Natur sind. Frank-Walter Steinmeier wurde 2017 gewählt und ist als Symbol der Einheit und Integrität des Staates wichtig.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 76, \"question\": \"Was bedeutet die Abkürzung CDU in Deutschland?\", \"options\": [ \"Christliche Deutsche Union\", \"Club Deutscher Unternehmer\", \"Christlicher Deutscher Umweltschutz\", \"Christlich Demokratische Union\" ], \"answer\": \"Christlich Demokratische Union\", \"explanation\": \"Die CDU ist eine der großen politischen Parteien in Deutschland und vertritt eine christlich-soziale und konservative politische Ausrichtung. Ihre Gründung geht zurück auf die Nachkriegszeit, um den Einfluss der Kirche in die Politik einzubringen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 77, \"question\": \"Was ist die Bundeswehr?\", \"options\": [ \"die deutsche Polizei\", \"ein deutscher Hafen\", \"eine deutsche Bürgerinitiative\", \"die deutsche Armee\" ], \"answer\": \"die deutsche Armee\", \"explanation\": \"Die Bundeswehr ist die Gesamtorganisation der deutschen Streitkräfte und hat die Aufgabe, die Landesverteidigung zu gewährleisten. Sie spielt auch eine Rolle in internationalen Einsätzen und der Krisenbewältigung.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 78, \"question\": \"Was bedeutet die Abkürzung SPD?\", \"options\": [ \"Sozialistische Partei Deutschlands\", \"Sozialpolitische Partei Deutschlands\", \"Sozialdemokratische Partei Deutschlands\", \"Sozialgerechte Partei Deutschlands\" ], \"answer\": \"Sozialdemokratische Partei Deutschlands\", \"explanation\": \"Die SPD ist eine der ältesten politischen Parteien in Deutschland und vertritt sozialdemokratische Werte wie soziale Gerechtigkeit und Chancengleichheit. Sie spielt eine wichtige Rolle in der deutschen Sozialpolitik.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 79, \"question\": \"Was bedeutet die Abkürzung FDP in Deutschland?\", \"options\": [ \"Friedliche Demonstrative Partei\", \"Freie Deutschland Partei\", \"Führende Demokratische Partei\", \"Freie Demokratische Partei\" ], \"answer\": \"Freie Demokratische Partei\", \"explanation\": \"Die FDP ist eine liberale Partei in Deutschland, die Freiheit und Eigenverantwortung in den Vordergrund stellt. Sie setzt sich für die Förderung von Marktwirtschaft und individuellen Rechten ein.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 80, \"question\": \"Welches Gericht in Deutschland ist zuständig für die Auslegung des Grundgesetzes?\", \"options\": [ \"Oberlandesgericht\", \"Amtsgericht\", \"Bundesverfassungsgericht\", \"Verwaltungsgericht\" ], \"answer\": \"Bundesverfassungsgericht\", \"explanation\": \"Das Bundesverfassungsgericht ist das höchste Gericht in Deutschland, das für die Wahrung der Verfassung zuständig ist. Es überprüft Gesetze auf ihre Vereinbarkeit mit dem Grundgesetz und schützt die Rechte der Bürger.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 81, \"question\": \"Wer wählt die Bundeskanzlerin/den Bundeskanzler in Deutschland?\", \"options\": [ \"der Bundesrat\", \"die Bundesversammlung\", \"das Volk\", \"der Bundestag\" ], \"answer\": \"der Bundestag\", \"explanation\": \"In Deutschland wird die Bundeskanzlerin oder der Bundeskanzler vom Bundestag gewählt. Dies geschieht nach der Bundestagswahl, wenn die Abgeordneten ihre Stimmen abgeben, um den Regierungschef zu bestimmen. Die Wahl ist ein zentraler Bestandteil des parlamentarischen Systems.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 82, \"question\": \"Wer leitet das deutsche Bundeskabinett?\", \"options\": [ \"die Bundestagspräsidentin/der Bundestagspräsident\", \"die Bundespräsidentin/der Bundespräsident\", \"die Bundesratspräsidentin/der Bundesratspräsident\", \"die Bundeskanzlerin/der Bundeskanzler\" ], \"answer\": \"die Bundeskanzlerin/der Bundeskanzler\", \"explanation\": \"Das Bundeskabinett, das aus den Chefs der Bundesministerien besteht, wird von der Bundeskanzlerin oder dem Bundeskanzler geleitet. Die Leitung des Kabinetts ist entscheidend für die Umsetzung der politischen Agenda und die Koordination der Regierungsarbeit.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 83, \"question\": \"Wer wählt die deutsche Bundeskanzlerin/den deutschen Bundeskanzler?\", \"options\": [ \"das Volk\", \"die Bundesversammlung\", \"der Bundestag\", \"die Bundesregierung\" ], \"answer\": \"der Bundestag\", \"explanation\": \"Die Wahl der Bundeskanzlerin oder des Bundeskanzlers findet durch die Abgeordneten des Bundestages statt. Dieses Verfahren stellt sicher, dass der Regierungschef eine Mehrheit im Parlament hat, was für die politische Stabilität wichtig ist.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 84, \"question\": \"Welche Hauptaufgabe hat die deutsche Bundespräsidentin/der deutsche Bundespräsident? Sie/Er …\", \"options\": [ \"regiert das Land.\", \"entwirft die Gesetze.\", \"repräsentiert das Land.\", \"überwacht die Einhaltung der Gesetze.\" ], \"answer\": \"repräsentiert das Land.\", \"explanation\": \"Die Aufgabe des Bundespräsidenten oder der Bundespräsidentin besteht hauptsächlich darin, das Land nach außen zu repräsentieren und die Verfassung zu wahren. Er/Sie hat eine eher symbolische Rolle, spielt aber auch in wichtigen politischen Entscheidungen eine beratende Funktion.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 85, \"question\": \"Wer bildet den deutschen Bundesrat?\", \"options\": [ \"die Abgeordneten des Bundestages\", \"die Ministerinnen und Minister der Bundesregierung\", \"die Regierungsvertreter der Bundesländer\", \"die Parteimitglieder\" ], \"answer\": \"die Regierungsvertreter der Bundesländer\", \"explanation\": \"Der Bundesrat setzt sich aus Regierungsvertretern der 16 Bundesländer zusammen, die die Interessen ihrer jeweiligen Länder auf Bundesebene vertreten. Der Bundesrat hat ein Mitspracherecht bei Gesetzen und ist somit ein wichtiger Bestandteil des föderalen Systems in Deutschland.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 86, \"question\": \"Wer wählt in Deutschland die Bundespräsidentin/den Bundespräsidenten?\", \"options\": [ \"die Bundesversammlung\", \"der Bundesrat\", \"das Bundesparlament\", \"das Bundesverfassungsgericht\" ], \"answer\": \"die Bundesversammlung\", \"explanation\": \"Die Bundesversammlung, die aus Mitgliedern des Bundestages und Vertretern der Bundesländer besteht, wählt die Bundespräsidentin oder den Bundespräsidenten. Dieses Gremium sorgt dafür, dass sowohl die gesamtdeutsche als auch die föderale Perspektive in der Wahl berücksichtigt wird.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 87, \"question\": \"Wer ist das Staatsoberhaupt der Bundesrepublik Deutschland?\", \"options\": [ \"die Bundeskanzlerin/der Bundeskanzler\", \"die Bundespräsidentin/der Bundespräsident\", \"die Bundesratspräsidentin/der Bundesratspräsident\", \"die Bundestagspräsidentin/der Bundestagspräsident\" ], \"answer\": \"die Bundespräsidentin/der Bundespräsident\", \"explanation\": \"Die Bundespräsidentin oder der Bundespräsident ist das Staatsoberhaupt Deutschlands und erfüllt vor allem repräsentative Aufgaben. Er/Sie hat eine vermittelnde Rolle, insbesondere in politischen Krisen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 88, \"question\": \"Die parlamentarische Opposition im Deutschen Bundestag …\", \"options\": [ \"kontrolliert die Regierung.\", \"entscheidet, wer Bundesministerin/Bundesminister wird.\", \"bestimmt, wer im Bundesrat sitzt.\", \"schlägt die Regierungschefinnen/Regierungschefs der Länder vor.\" ], \"answer\": \"kontrolliert die Regierung.\", \"explanation\": \"Die parlamentarische Opposition hat die wichtige Aufgabe, die Regierung zu kontrollieren und deren Arbeit zu hinterfragen. Diese Kontrolle ist für die Demokratie essenziell, da sie Transparenz und Verantwortung fördert.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 89, \"question\": \"Wie nennt man in Deutschland die Vereinigung von Abgeordneten einer Partei im Parlament?\", \"options\": [\"Verband\", \"Ältestenrat\", \"Fraktion\", \"Opposition\"], \"answer\": \"Fraktion\", \"explanation\": \"Eine Fraktion ist eine Gruppe von Abgeordneten einer politischen Partei, die im Parlament zusammenarbeitet. Die Fraktionen spielen eine zentrale Rolle im politischen Entscheidungsprozess, da sie Gesetze erarbeiten und daran mitwirken.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 90, \"question\": \"Die deutschen Bundesländer wirken an der Gesetzgebung des Bundes mit durch …\", \"options\": [ \"den Bundesrat.\", \"die Bundesversammlung.\", \"den Bundestag.\", \"die Bundesregierung.\" ], \"answer\": \"den Bundesrat.\", \"explanation\": \"Der Bundesrat ist das Gremium, durch das die Bundesländer an der bundesgesetzlichen Gesetzgebung mitwirken. Er hat das Recht, Gesetze zu überprüfen und Änderungen vorzuschlagen, was zur Interessenvertretung der Länder auf Bundesebene beiträgt.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-3\", \"category\": \"Bildung und Gesellschaft\" }, { \"id\": 91, \"question\": \"In Deutschland kann ein Regierungswechsel in einem Bundesland Auswirkungen auf die Bundespolitik haben. Das Regieren wird …\", \"options\": [ \"schwieriger, wenn sich dadurch die Mehrheit im Bundestag ändert.\", \"leichter, wenn dadurch neue Parteien in den Bundesrat kommen.\", \"schwieriger, wenn dadurch die Mehrheit im Bundesrat verändert wird.\", \"leichter, wenn es sich um ein reiches Bundesland handelt.\" ], \"answer\": \"schwieriger, wenn dadurch die Mehrheit im Bundesrat verändert wird.\", \"explanation\": \"Ein Regierungswechsel in einem Bundesland kann sowohl die Ziele als auch die Zusammensetzung des Bundesrates beeinflussen. Der Bundesrat ist das Organ, das die Bundesländer auf Bundesebene vertritt, und eine Änderung der Mehrheitsverhältnisse kann die Gesetzgebung erheblich beeinflussen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 92, \"question\": \"Was bedeutet die Abkürzung CSU in Deutschland?\", \"options\": [ \"Christlich Sichere Union\", \"Christlich Süddeutsche Union\", \"Christlich Sozialer Unternehmerverband\", \"Christlich Soziale Union\" ], \"answer\": \"Christlich Soziale Union\", \"explanation\": \"Die CSU ist eine politische Partei in Deutschland, die vor allem in Bayern aktiv ist. Sie ist verbunden mit der CDU und tritt für christliche und sozialpolitische Werte ein.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 93, \"question\": \"Je mehr 'Zweitstimmen' eine Partei bei einer Bundestagswahl bekommt, desto …\", \"options\": [ \"weniger Erststimmen kann sie haben.\", \"mehr Direktkandidaten der Partei ziehen ins Parlament ein.\", \"größer ist das Risiko, eine Koalition bilden zu müssen.\", \"mehr Sitze erhält die Partei im Parlament.\" ], \"answer\": \"mehr Sitze erhält die Partei im Parlament.\", \"explanation\": \"In Deutschland wird das Bundestagswahlrecht durch ein Verhältniswahlrecht gestützt, bei dem die Zweitstimmen entscheidend für die Verteilung der Sitze im Parlament sind. Eine höhere Anzahl an Zweitstimmen führt somit zu einer stärkeren Vertretung der betreffenden Partei.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 94, \"question\": \"Ab welchem Alter darf man in Deutschland an der Wahl zum Deutschen Bundestag teilnehmen?\", \"options\": [\"16\", \"18\", \"21\", \"23\"], \"answer\": \"18\", \"explanation\": \"Das Wahlrecht in Deutschland ist im Grundgesetz verankert und sieht vor, dass das aktive Wahlrecht ab 18 Jahren gilt. Dies stellt sicher, dass Wählerlein im Vollbesitz ihrer geistigen Kräfte sind und in der Lage sind, informierte Entscheidungen zu treffen.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 95, \"question\": \"Was gilt für die meisten Kinder in Deutschland?\", \"options\": [ \"Wahlpflicht\", \"Schulpflicht\", \"Schweigepflicht\", \"Religionspflicht\" ], \"answer\": \"Schulpflicht\", \"explanation\": \"In Deutschland besteht für Kinder eine Schulpflicht, die in den meisten Bundesländern für minderjährige Kinder gilt. Diese Pflicht soll sicherstellen, dass alle Kinder eine grundlegende Bildung erhalten, die für ihre persönliche und soziale Entwicklung wichtig ist.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 96, \"question\": \"Wie kann jemand, der den Holocaust leugnet, bestraft werden?\", \"options\": [ \"Kürzung sozialer Leistungen\", \"bis zu 100 Sozialstunden\", \"gar nicht, Holocaustleugnung ist erlaubt\", \"mit Freiheitsstrafe bis zu fünf Jahren oder mit Geldstrafe\" ], \"answer\": \"mit Freiheitsstrafe bis zu fünf Jahren oder mit Geldstrafe\", \"explanation\": \"In Deutschland ist die Leugnung des Holocaust eine Straftat, die unter das Strafgesetzbuch fällt. Diese Regelung dient dem Schutz des Andenkens an die Opfer und der Aufklärung über die Gräueltaten des Nationalsozialismus.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 97, \"question\": \"Was bezahlt man in Deutschland automatisch, wenn man fest angestellt ist?\", \"options\": [\"Sozialversicherung\", \"Sozialhilfe\", \"Kindergeld\", \"Wohngeld\"], \"answer\": \"Sozialversicherung\", \"explanation\": \"In Deutschland sind Arbeitnehmer gesetzlich verpflichtet, in die Sozialversicherung einzuzahlen, was unter anderem Renten-, Kranken-, Arbeitslosen- und Pflegeversicherung umfasst. Diese Beiträge dienen dem Schutz der Arbeitnehmer und ihrer Familien in verschiedenen Lebenslagen.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 98, \"question\": \"Wenn Abgeordnete im Deutschen Bundestag ihre Fraktion wechseln, …\", \"options\": [ \"dürfen sie nicht mehr an den Sitzungen des Parlaments teilnehmen.\", \"kann die Regierung ihre Mehrheit verlieren.\", \"muss die Bundespräsidentin/der Bundespräsident zuvor ihr/sein Einverständnis geben.\", \"dürfen die Wählerinnen/Wähler dieser Abgeordneten noch einmal wählen.\" ], \"answer\": \"kann die Regierung ihre Mehrheit verlieren.\", \"explanation\": \"Der Wechsel einer Fraktion im Bundestag kann erhebliche Auswirkungen auf die politische Machtbalance haben. Verlust der Mehrheit kann die Regierungsführenden zwingen, Koalitionen zu bilden oder ihre Strategien zu ändern.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 99, \"question\": \"Wer bezahlt in Deutschland die Sozialversicherungen?\", \"options\": [ \"Arbeitgeberinnen/Arbeitgeber und Arbeitnehmerinnen/Arbeitnehmer\", \"nur Arbeitnehmerinnen/Arbeitnehmer\", \"alle Staatsangehörigen\", \"nur Arbeitgeberinnen/Arbeitgeber\" ], \"answer\": \"Arbeitgeberinnen/Arbeitgeber und Arbeitnehmerinnen/Arbeitnehmer\", \"explanation\": \"In Deutschland teilen sich Arbeitgeber und Arbeitnehmer die Beiträge zur Sozialversicherung. Dies schafft ein System der gegenseitigen Absicherung, das sowohl die Beschäftigten als auch die Arbeitgeber schützt.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 100, \"question\": \"Was gehört nicht zur gesetzlichen Sozialversicherung?\", \"options\": [ \"die Lebensversicherung\", \"die gesetzliche Rentenversicherung\", \"die Arbeitslosenversicherung\", \"die Pflegeversicherung\" ], \"answer\": \"die Lebensversicherung\", \"explanation\": \"Die gesetzliche Sozialversicherung umfasst Bereiche wie Renten-, Kranken-, Pflege- und Arbeitslosenversicherung, die alle auf den sozialen Schutz von Arbeitnehmern abzielen. Eine Lebensversicherung hingegen ist eine private Versicherung und gehört nicht zu diesem System.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 101, \"question\": \"Gewerkschaften sind Interessenverbände der …\", \"options\": [ \"Jugendlichen.\", \"Arbeitnehmerinnen und Arbeitnehmer.\", \"Rentnerinnen und Rentner.\", \"Arbeitgeberinnen und Arbeitgeber.\" ], \"answer\": \"Arbeitnehmerinnen und Arbeitnehmer.\", \"explanation\": \"Gewerkschaften sind Organisationen, die die Interessen von Arbeitnehmerinnen und Arbeitnehmern vertreten. Sie setzen sich für bessere Arbeitsbedingungen, Löhne und soziale Rechte ihrer Mitglieder ein.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 102, \"question\": \"Womit kann man in der Bundesrepublik Deutschland geehrt werden, wenn man auf politischem, wirtschaftlichem, kulturellem, geistigem oder sozialem Gebiet eine besondere Leistung erbracht hat? Mit dem …\", \"options\": [ \"Bundesverdienstkreuz\", \"Bundesadler\", \"Vaterländischen Verdienstorden\", \"Ehrentitel 'Held der Deutschen Demokratischen Republik'\" ], \"answer\": \"Bundesverdienstkreuz\", \"explanation\": \"Das Bundesverdienstkreuz ist die höchste Auszeichnung, die die Bundesrepublik Deutschland für besondere Verdienste um das Gemeinwohl verleiht. Es wird an Bürgerinnen und Bürger vergeben, die sich in verschiedenen Bereichen wie Kultur, Wissenschaft oder Soziales besonders hervorgetan haben.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 103, \"question\": \"Was wird in Deutschland als 'Ampelkoalition' bezeichnet? Die Zusammenarbeit …\", \"options\": [ \"der Bundestagsfraktionen von CDU und CSU\", \"von SPD, FDP und Bündnis 90/Die Grünen in einer Regierung\", \"von CSU, Die LINKE und Bündnis 90/Die Grünen in einer Regierung\", \"der Bundestagsfraktionen von CDU und SPD\" ], \"answer\": \"von SPD, FDP und Bündnis 90/Die Grünen in einer Regierung\", \"explanation\": \"Eine Ampelkoalition bezieht sich auf die Regierungsbildung in Deutschland, wenn die Parteien SPD, FDP und Bündnis 90/Die Grünen zusammenarbeiten. Der Name kommt von den Farben der Parteien, die den Farben einer Verkehrsampel entsprechen (rot, gelb und grün).\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 104, \"question\": \"Eine Frau in Deutschland verliert ihre Arbeit. Was darf nicht der Grund für diese Entlassung sein?\", \"options\": [ \"Die Frau ist lange krank und arbeitsunfähig.\", \"Die Frau kam oft zu spät zur Arbeit.\", \"Die Frau erledigt private Sachen während der Arbeitszeit.\", \"Die Frau bekommt ein Kind und ihr Chef weiß das.\" ], \"answer\": \"Die Frau bekommt ein Kind und ihr Chef weiß das.\", \"explanation\": \"In Deutschland ist eine Entlassung aufgrund von Schwangerschaft oder Elternzeit rechtlich nicht zulässig. Das Mutterschutzgesetz schützt Schwangere und junge Mütter vor Diskriminierung am Arbeitsplatz.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 105, \"question\": \"Was ist eine Aufgabe von Wahlhelferinnen/Wahlhelfern in Deutschland?\", \"options\": [ \"Sie helfen alten Menschen bei der Stimmabgabe in der Wahlkabine.\", \"Sie schreiben die Wahlbenachrichtigungen vor der Wahl.\", \"Sie geben Zwischenergebnisse an die Medien weiter.\", \"Sie zählen die Stimmen nach dem Ende der Wahl.\" ], \"answer\": \"Sie zählen die Stimmen nach dem Ende der Wahl.\", \"explanation\": \"Wahlhelferinnen und Wahlhelfer spielen eine wichtige Rolle bei der Durchführung von Wahlen. Ihre Hauptaufgaben sind die Unterstützung bei der Einhaltung der Wahlordnung und das Zählen der Stimmen am Ende der Wahl, um die Ergebnisse zu ermitteln.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 106, \"question\": \"In Deutschland helfen ehrenamtliche Wahlhelferinnen und Wahlhelfer bei den Wahlen. Was ist eine Aufgabe von Wahlhelferinnen/Wahlhelfern?\", \"options\": [ \"Sie helfen Kindern und alten Menschen beim Wählen.\", \"Sie schreiben Karten und Briefe mit der Angabe des Wahllokals.\", \"Sie geben Zwischenergebnisse an Journalisten weiter.\", \"Sie zählen die Stimmen nach dem Ende der Wahl.\" ], \"answer\": \"Sie zählen die Stimmen nach dem Ende der Wahl.\", \"explanation\": \"Die Aufgaben von Wahlhelferinnen und Wahlhelfern sind vielfältig. Wesentlich ist das Zählen der Stimmen, da dies sicherstellt, dass die Wahlrechtergebnisse korrekt sind und die Integrität des Wahlprozesses gewahrt bleibt.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 107, \"question\": \"Für wie viele Jahre wird der Bundestag in Deutschland gewählt?\", \"options\": [\"2 Jahre\", \"4 Jahre\", \"6 Jahre\", \"8 Jahre\"], \"answer\": \"4 Jahre\", \"explanation\": \"Der Bundestag, das deutsche Parlament, wird alle vier Jahre gewählt. Diese Regelung ist im Grundgesetz festgelegt und stellt sicher, dass die Wählerinnen und Wähler regelmäßig Einfluss auf die politische Gestaltung nehmen können.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 108, \"question\": \"Bei einer Bundestagswahl in Deutschland darf jede/jeder wählen, die/der …\", \"options\": [ \"in der Bundesrepublik Deutschland wohnt und wählen möchte.\", \"Bürgerin/Bürger der Bundesrepublik Deutschland ist und mindestens 18 Jahre alt ist.\", \"seit mindestens 3 Jahren in der Bundesrepublik Deutschland lebt.\", \"Bürgerin/Bürger der Bundesrepublik Deutschland ist und mindestens 21 Jahre alt ist.\" ], \"answer\": \"Bürgerin/Bürger der Bundesrepublik Deutschland ist und mindestens 18 Jahre alt ist.\", \"explanation\": \"Um an Bundestagswahlen teilnehmen zu dürfen, muss man mindestens 18 Jahre alt sein und die deutsche Staatsbürgerschaft besitzen. Dies gewährleistet, dass alle Wählerinnen und Wähler in der Lage sind, informierte Entscheidungen zu treffen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 109, \"question\": \"Wie oft gibt es normalerweise Bundestagswahlen in Deutschland?\", \"options\": [ \"alle drei Jahre\", \"alle vier Jahre\", \"alle fünf Jahre\", \"alle sechs Jahre\" ], \"answer\": \"alle vier Jahre\", \"explanation\": \"Bundestagswahlen finden in Deutschland in der Regel alle vier Jahre statt. Diese Regelung erlaubt es den Wählerinnen und Wählern, ihre Vertreter im Parlament regelmäßig zu wählen und die Regierung zu kontrollieren.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 110, \"question\": \"Für wie viele Jahre wird der Bundestag in Deutschland gewählt?\", \"options\": [\"2 Jahre\", \"3 Jahre\", \"4 Jahre\", \"5 Jahre\"], \"answer\": \"4 Jahre\", \"explanation\": \"Wie bereits erwähnt, wird der Bundestag in Deutschland alle vier Jahre gewählt. Diese Wahlperiode ermöglicht es den gewählten Abgeordneten, ihre Legislaturarbeit über einen festgelegten Zeitraum durchzuführen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 111, \"question\": \"Welche Handlungen mit Bezug auf den Staat Israel sind in Deutschland verboten?\", \"options\": [ \"die Politik Israels öffentlich kritisieren\", \"das Aufhängen einer israelischen Flagge auf dem Privatgrundstück\", \"eine Diskussion über die Politik Israels\", \"der öffentliche Aufruf zur Vernichtung Israels\" ], \"answer\": \"der öffentliche Aufruf zur Vernichtung Israels\", \"explanation\": \"In Deutschland sind bestimmte Äußerungen und Handlungen, die sich gegen den Staat Israel richten, verboten, insbesondere solche, die zur Gewalt aufrufen oder einen Völkermord propagieren. Dies steht im Zusammenhang mit dem Schutz der Menschenwürde und der Verhinderung von Antisemitismus, welche in der deutschen Gesetzgebung von großer Bedeutung sind.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 112, \"question\": \"Die Wahlen in Deutschland sind …\", \"options\": [ \"speziell.\", \"geheim.\", \"berufsbezogen.\", \"geschlechtsabhängig.\" ], \"answer\": \"geheim.\", \"explanation\": \"Die geheimen Wahlen sind ein fundamentales Prinzip der Demokratie, das sicherstellt, dass Wählerinnen und Wähler ihre Stimme ohne Angst vor Repressalien oder Einflussnahme abgeben können. Dies trägt zur Wahrung der freien Meinungsäußerung und zu einem fairen Wahlprozess bei.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 113, \"question\": \"Wahlen in Deutschland gewinnt die Partei, die …\", \"options\": [ \"die meisten Stimmen bekommt.\", \"die meisten Männer mehrheitlich gewählt haben.\", \"die meisten Stimmen bei den Arbeiterinnen/Arbeitern bekommen hat.\", \"die meisten Erststimmen für ihre Kanzlerkandidatin/ihren Kanzlerkandidaten erhalten hat.\" ], \"answer\": \"die meisten Stimmen bekommt.\", \"explanation\": \"Im deutschen Wahlsystem entscheidet die allgemeine Wahlmehrheit darüber, welche Partei die Wahl gewinnt. Dies bedeutet, dass die Partei, die die meisten Stimmen erhält, die Möglichkeit hat, die Regierung zu bilden, während die Stimmenverteilung entscheidend für die politische Landschaft des Landes ist.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 114, \"question\": \"An demokratischen Wahlen in Deutschland teilzunehmen ist …\", \"options\": [\"eine Pflicht.\", \"ein Recht.\", \"ein Zwang.\", \"eine Last.\"], \"answer\": \"ein Recht.\", \"explanation\": \"Die Teilnahme an Wahlen ist in Deutschland ein grundlegendes Recht, das jedem volljährigen Bürger zusteht. Dieser demokratische Prozess ermöglicht es den Menschen, aktiv an der politischen Willensbildung teilzunehmen und ihre Interessen zu vertreten.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 115, \"question\": \"Was bedeutet 'aktives Wahlrecht' in Deutschland?\", \"options\": [ \"Man kann gewählt werden.\", \"Man muss wählen gehen.\", \"Man kann wählen.\", \"Man muss zur Auszählung der Stimmen gehen.\" ], \"answer\": \"Man kann wählen.\", \"explanation\": \"Aktives Wahlrecht bezeichnet das Recht eines Bürgers, an Wahlen teilzunehmen und seine Stimme abzugeben. Es ist ein zentraler Aspekt der Demokratie, da es den Bürgern ermöglicht, Einfluss auf die politischen Entscheidungen zu nehmen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 116, \"question\": \"Wenn Sie bei einer Bundestagswahl in Deutschland wählen dürfen, heißt das …\", \"options\": [ \"aktive Wahlkampagne.\", \"aktives Wahlverfahren.\", \"aktiver Wahlkampf.\", \"aktives Wahlrecht.\" ], \"answer\": \"aktives Wahlrecht.\", \"explanation\": \"Das aktive Wahlrecht bezieht sich auf das Recht, an Wahlen teilzunehmen. In Deutschland bedeutet dies, dass jede wahlberechtigte Person das Recht hat, bei Wahlen ihre Stimme abzugeben und somit Einfluss auf die politische Gestaltung zu nehmen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 117, \"question\": \"Wie viel Prozent der Zweitstimmen müssen Parteien mindestens bekommen, um in den Deutschen Bundestag gewählt zu werden?\", \"options\": [\"3%\", \"4%\", \"5%\", \"6%\"], \"answer\": \"5%\", \"explanation\": \"Der Fünf-Prozent-Hürde in Deutschland ist eine Regelung, die sicherstellt, dass nur Parteien, die einen signifikanten Teil der Stimmen erhalten, im Bundestag vertreten sind. Dies verhindert eine Zersplitterung des Parlaments in viele kleine Fraktionen und fördert stabilere Mehrheiten.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 118, \"question\": \"Wer darf bei den rund 40 jüdischen Makkabi-Sportvereinen Mitglied werden?\", \"options\": [ \"nur Deutsche\", \"nur Israelis\", \"nur religiöse Menschen\", \"alle Menschen\" ], \"answer\": \"alle Menschen\", \"explanation\": \"Die Makkabi-Sportvereine in Deutschland sind offen für alle Mitglieder der Gesellschaft, unabhängig von ihrer Herkunft oder Religionszugehörigkeit. Dies fördert den interkulturellen Austausch und die Integration, wobei der Verein auch jüdische Traditionen und Werte weitergibt.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 119, \"question\": \"Wahlen in Deutschland sind frei. Was bedeutet das?\", \"options\": [ \"Alle verurteilten Straftäterinnen/Straftäter dürfen nicht wählen.\", \"Wenn ich wählen gehen möchte, muss meine Arbeitgeberin/mein Arbeitgeber mir frei geben.\", \"Jede Person kann ohne Zwang entscheiden, ob sie wählen möchte und wen sie wählen möchte.\", \"Ich kann frei entscheiden, wo ich wählen gehen möchte.\" ], \"answer\": \"Jede Person kann ohne Zwang entscheiden, ob sie wählen möchte und wen sie wählen möchte.\", \"explanation\": \"Freie Wahlen sind ein Grundpfeiler der Demokratie. Dieses Prinzip bedeutet, dass Bürgerinnen und Bürger in der Lage sind, ihre Stimme ohne Druck oder Zwang abzugeben, was zu einem fairen und transparenten Wahlprozess beiträgt.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 120, \"question\": \"Das Wahlsystem in Deutschland ist ein …\", \"options\": [ \"Zensuswahlrecht.\", \"Dreiklassenwahlrecht.\", \"Mehrheits- und Verhältniswahlrecht.\", \"allgemeines Männerwahlrecht.\" ], \"answer\": \"Mehrheits- und Verhältniswahlrecht.\", \"explanation\": \"Das deutsche Wahlsystem kombiniert Mehrheits- und Verhältniswahlrecht, um eine faire Vertretung der Wählerstimmen zu gewährleisten. Dadurch wird sowohl die Stabilität einer Regierung als auch die Berücksichtigung von Minderheitsmeinungen gefördert.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-4\", \"category\": \"Geschichte und Kultur\" }, { \"id\": 121, \"question\": \"Eine Partei möchte in den Deutschen Bundestag. Sie muss aber einen Mindestanteil an Wählerstimmen haben. Das heißt …\", \"options\": [\"5%-Hürde.\", \"Zulassungsgrenze.\", \"Basiswert.\", \"Richtlinie.\"], \"answer\": \"5%-Hürde.\", \"explanation\": \"Die 5%-Hürde ist eine Regelung im deutschen Wahlrecht, die sicherstellen soll, dass nur Parteien, die eine bestimmte Mindestanzahl an Stimmen erhalten, ins Parlament einziehen können. Diese Regelung soll eine Zersplitterung des Parlaments durch zu viele kleine Parteien verhindern und die Regierungsbildung erleichtern.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 122, \"question\": \"Welchem Grundsatz unterliegen Wahlen in Deutschland? Wahlen in Deutschland sind …\", \"options\": [ \"frei, gleich, geheim.\", \"offen, sicher, frei.\", \"geschlossen, gleich, sicher.\", \"sicher, offen, freiwillig.\" ], \"answer\": \"frei, gleich, geheim.\", \"explanation\": \"Die Grundsätze der Wahlen in Deutschland sind im Grundgesetz verankert und garantieren, dass jeder Bürger das Recht hat, seine Stimme ohne Zwang abzugeben. Die Begriffe 'frei', 'gleich' und 'geheim' beschreiben die Bedingungen, unter denen Wahlen stattfinden müssen, um die Demokratie zu gewährleisten.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 123, \"question\": \"Was ist in Deutschland die '5%-Hürde'?\", \"options\": [ \"Abstimmungsregelung im Bundestag für kleine Parteien\", \"Anwesenheitskontrolle im Bundestag für Abstimmungen\", \"Mindestanteil an Wählerstimmen, um ins Parlament zu kommen\", \"Anwesenheitskontrolle im Bundesrat für Abstimmungen\" ], \"answer\": \"Mindestanteil an Wählerstimmen, um ins Parlament zu kommen\", \"explanation\": \"Die '5%-Hürde' ist eine gesetzliche Regelung, die besagt, dass Parteien mindestens 5% der Stimmen erhalten müssen, um im Bundestag vertreten zu sein. Dadurch soll eine politische Stabilität gefördert und Mehrheitsentscheidungen ermöglicht werden.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 124, \"question\": \"Die Bundestagswahl in Deutschland ist die Wahl …\", \"options\": [ \"der Bundeskanzlerin/des Bundeskanzlers.\", \"der Parlamente der Länder.\", \"des Parlaments für Deutschland.\", \"der Bundespräsidentin/des Bundespräsidenten.\" ], \"answer\": \"des Parlaments für Deutschland.\", \"explanation\": \"Die Bundestagswahl ist ein zentrales Element der politischen Mitbestimmung in Deutschland, da bei dieser Wahl die Abgeordneten des Deutschen Bundestages gewählt werden. Der Bundestag ist das wichtigste Organ der Legislative, das Gesetze beschließt und die Regierung kontrolliert.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 125, \"question\": \"In einer Demokratie ist eine Funktion von regelmäßigen Wahlen, …\", \"options\": [ \"die Bürgerinnen und Bürger zu zwingen, ihre Stimme abzugeben.\", \"nach dem Willen der Wählermehrheit den Wechsel der Regierung zu ermöglichen.\", \"im Land bestehende Gesetze beizubehalten.\", \"den Armen mehr Macht zu geben.\" ], \"answer\": \"nach dem Willen der Wählermehrheit den Wechsel der Regierung zu ermöglichen.\", \"explanation\": \"Regelmäßige Wahlen sind ein fundamentales Merkmal demokratischer Systeme, die es den Bürgern ermöglichen, ihre Vertreter zu wählen und zu bestimmen, wer an der Regierung beteiligt ist. Dies garantiert, dass die Regierung den Willen der Wähler widerspiegelt und sich entsprechend anpassen kann.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 126, \"question\": \"Was bekommen wahlberechtigte Bürgerinnen und Bürger in Deutschland vor einer Wahl?\", \"options\": [ \"eine Wahlbenachrichtigung von der Gemeinde\", \"eine Wahlerlaubnis von der Bundespräsidentin/von dem Bundespräsidenten\", \"eine Benachrichtigung von der Bundesversammlung\", \"eine Benachrichtigung vom Pfarramt\" ], \"answer\": \"eine Wahlbenachrichtigung von der Gemeinde\", \"explanation\": \"Vor Wahlen erhalten wahlberechtigte Bürger in Deutschland eine Wahlbenachrichtigung, die sie über ihren Wahltermin und den Wahlort informiert. Diese Benachrichtigung ist wichtig, um sicherzustellen, dass jeder Zugang zur Wahl hat und seine Stimme rechtzeitig abgeben kann.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 127, \"question\": \"Warum gibt es die 5%-Hürde im Wahlgesetz der Bundesrepublik Deutschland? Es gibt sie, weil …\", \"options\": [ \"die Programme von vielen kleinen Parteien viele Gemeinsamkeiten haben.\", \"die Bürgerinnen und Bürger bei vielen kleinen Parteien die Orientierung verlieren können.\", \"viele kleine Parteien die Regierungsbildung erschweren.\", \"die kleinen Parteien nicht so viel Geld haben, um die Politikerinnen und Politiker zu bezahlen.\" ], \"answer\": \"viele kleine Parteien die Regierungsbildung erschweren.\", \"explanation\": \"Die 5%-Hürde wurde eingeführt, um zu verhindern, dass zu viele kleine Parteien im Bundestag vertreten sind, was die Bildung einer stabilen Regierung erschweren könnte. Ein stabiler Regierungspartner ist wichtig, um handlungsfähig zu bleiben und effektive politische Entscheidungen zu treffen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 128, \"question\": \"Parlamentsmitglieder, die von den Bürgerinnen und Bürgern gewählt werden, nennt man …\", \"options\": [ \"Abgeordnete.\", \"Kanzlerinnen/Kanzler.\", \"Botschafterinnen/Botschafter.\", \"Ministerpräsidentinnen/Ministerpräsidenten.\" ], \"answer\": \"Abgeordnete.\", \"explanation\": \"Die gewählten Parlamentsmitglieder in Deutschland werden als Abgeordnete bezeichnet, da sie die Interessen ihrer Wähler im Bundestag vertreten. Sie spielen eine entscheidende Rolle im politischen Prozess, da sie Gesetze erlassen, die Regierung kontrollieren und die Stimme des Volkes repräsentieren.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 129, \"question\": \"Vom Volk gewählt wird in Deutschland …\", \"options\": [ \"die Bundeskanzlerin/der Bundeskanzler.\", \"die Ministerpräsidentin/der Ministerpräsident eines Bundeslandes.\", \"der Bundestag.\", \"die Bundespräsidentin/der Bundespräsident.\" ], \"answer\": \"der Bundestag.\", \"explanation\": \"In Deutschland wird der Bundestag vom Volk gewählt, was eine grundlegende Elemen der Demokratie darstellt. Durch die Wahl des Bundestages haben die Bürger die Möglichkeit, Einfluss auf die Gesetzgebung und die Regierungsführung zu nehmen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 130, \"type\": \"image\", \"question\": \"Welcher Stimmzettel wäre bei einer Bundestagswahl gültig?\", \"options\": [\"1\", \"2\", \"3\", \"4\"], \"answer\": \"2\", \"explanation\": \"Die Gültigkeit eines Stimmzettels hängt von der korrekten Ausfüllung ab, die im Wahlprozess eindeutig festgelegt ist. Ein gültiger Stimmzettel muss bestimmte Kriterien erfüllen, damit die Stimmen korrekt gezählt werden können.\", \"state\": \"general\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 131, \"question\": \"In Deutschland ist eine Bürgermeisterin/ein Bürgermeister …\", \"options\": [ \"die Leiterin/der Leiter einer Schule.\", \"die Chefin/der Chef einer Bank.\", \"das Oberhaupt einer Gemeinde.\", \"die/der Vorsitzende einer Partei.\" ], \"answer\": \"das Oberhaupt einer Gemeinde.\", \"explanation\": \"Der Bürgermeister oder die Bürgermeisterin ist das gewählte Oberhaupt einer Gemeinde in Deutschland. Diese Position ist mit vielen Verantwortlichkeiten verbunden, einschließlich der Verwaltung öffentlicher Angelegenheiten und der Vertretung der Gemeinde in der Öffentlichkeit.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 132, \"question\": \"Viele Menschen in Deutschland arbeiten in ihrer Freizeit ehrenamtlich. Was bedeutet das?\", \"options\": [ \"Sie arbeiten als Soldatinnen/Soldaten.\", \"Sie arbeiten freiwillig und unbezahlt in Vereinen und Verbänden.\", \"Sie arbeiten in der Bundesregierung.\", \"Sie arbeiten in einem Krankenhaus und verdienen dabei Geld.\" ], \"answer\": \"Sie arbeiten freiwillig und unbezahlt in Vereinen und Verbänden.\", \"explanation\": \"Ehrenamtliche Arbeit bezieht sich auf unentgeltliche Tätigkeiten, die Personen in ihrer Freizeit leisten, um zu helfen oder die Gemeinschaft zu unterstützen. Diese Form des Engagements trägt zur Stärkung von sozialen Bindungen und zum Gemeinwohl bei.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 133, \"question\": \"Was ist bei Bundestags- und Landtagswahlen in Deutschland erlaubt?\", \"options\": [ \"Der Ehemann wählt für seine Frau mit.\", \"Man kann durch Briefwahl seine Stimme abgeben.\", \"Man kann am Wahltag telefonisch seine Stimme abgeben.\", \"Kinder ab dem Alter von 14 Jahren dürfen wählen.\" ], \"answer\": \"Man kann durch Briefwahl seine Stimme abgeben.\", \"explanation\": \"Die Briefwahl ist ein Verfahren, das es Wählern ermöglicht, ihre Stimme zur Wahl abzugeben, ohne physisch am Wahlsort teilnehmen zu müssen. Dies ist besonders nützlich für Menschen, die am Wahltag verhindert sind.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 134, \"question\": \"Man will die Buslinie abschaffen, mit der Sie immer zur Arbeit fahren. Was können Sie machen, um die Buslinie zu erhalten?\", \"options\": [ \"Ich beteilige mich an einer Bürgerinitiative für die Erhaltung der Buslinie oder gründe selber eine Initiative.\", \"Ich werde Mitglied in einem Sportverein und trainiere Radfahren.\", \"Ich wende mich an das Finanzamt, weil ich als Steuerzahlerin/Steuerzahler ein Recht auf die Buslinie habe.\", \"Ich schreibe einen Brief an das Forstamt der Gemeinde.\" ], \"answer\": \"Ich beteilige mich an einer Bürgerinitiative für die Erhaltung der Buslinie oder gründe selber eine Initiative.\", \"explanation\": \"Eine Bürgerinitiative ist eine Form des aktiven Engagements von Bürgern, um Veränderungen in ihrer Gemeinde zu bewirken. Indem man sich an einer Initiative beteiligt, kann man Einfluss auf politische Entscheidungen nehmen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 135, \"question\": \"Wen vertreten die Gewerkschaften in Deutschland?\", \"options\": [ \"große Unternehmen\", \"kleine Unternehmen\", \"Selbstständige\", \"Arbeitnehmerinnen und Arbeitnehmer\" ], \"answer\": \"Arbeitnehmerinnen und Arbeitnehmer\", \"explanation\": \"Gewerkschaften sind Organisationen, die die Interessen von Arbeitnehmern vertreten. Durch Tarifverhandlungen setzen sie sich für bessere Arbeitsbedingungen, Löhne und Rechte der Beschäftigten ein.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 136, \"question\": \"Sie gehen in Deutschland zum Arbeitsgericht bei …\", \"options\": [ \"falscher Nebenkostenabrechnung.\", \"ungerechtfertigter Kündigung durch Ihre Chefin/Ihren Chef.\", \"Problemen mit den Nachbarinnen/Nachbarn.\", \"Schwierigkeiten nach einem Verkehrsunfall.\" ], \"answer\": \"ungerechtfertigter Kündigung durch Ihre Chefin/Ihren Chef.\", \"explanation\": \"Das Arbeitsgericht ist zuständig für Streitigkeiten zwischen Arbeitnehmern und Arbeitgebern, insbesondere in Fällen von unrechtmäßiger Kündigung oder anderen arbeitsrechtlichen Konflikten. Es bietet eine Plattform zur Klärung von rechtlichen Ansprüchen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 137, \"question\": \"Welches Gericht ist in Deutschland bei Konflikten in der Arbeitswelt zuständig?\", \"options\": [ \"das Familiengericht\", \"das Strafgericht\", \"das Arbeitsgericht\", \"das Amtsgericht\" ], \"answer\": \"das Arbeitsgericht\", \"explanation\": \"Das Arbeitsgericht ist der Gerichtstyp, der speziell für arbeitsrechtliche Streitigkeiten festgelegt ist. Es behandelt Fälle, die die Rechte von Arbeitnehmern und Arbeitgebern betreffen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 138, \"question\": \"Was kann ich in Deutschland machen, wenn mir meine Arbeitgeberin/mein Arbeitgeber zu Unrecht gekündigt hat?\", \"options\": [ \"weiterarbeiten und freundlich zur Chefin/zum Chef sein\", \"ein Mahnverfahren gegen die Arbeitgeberin/den Arbeitgeber führen\", \"Kündigungsschutzklage erheben\", \"die Arbeitgeberin/den Arbeitgeber bei der Polizei anzeigen\" ], \"answer\": \"Kündigungsschutzklage erheben\", \"explanation\": \"Eine Kündigungsschutzklage ist ein rechtliches Verfahren, das ein Arbeitnehmer einleiten kann, um gegen eine als unrechtmäßig empfundene Kündigung vorzugehen. Diese Möglichkeit schützt die Rechte der Arbeitnehmer im Arbeitsverhältnis.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 139, \"question\": \"Wann kommt es in Deutschland zu einem Prozess vor Gericht? Wenn jemand …\", \"options\": [ \"zu einer anderen Religion übertritt.\", \"eine Straftat begangen hat und angeklagt wird.\", \"eine andere Meinung als die der Regierung vertritt.\", \"sein Auto falsch geparkt hat und es abgeschleppt wird.\" ], \"answer\": \"eine Straftat begangen hat und angeklagt wird.\", \"explanation\": \"Ein Gerichtsprozess findet statt, wenn jemand beschuldigt wird, gegen das Strafgesetz verstoßen zu haben. Das Gericht entscheidet dann über Schuld und Strafe und gewährleistet ein faires Verfahren.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 140, \"question\": \"Was macht eine Schöffin/ein Schöffe in Deutschland? Sie/Er …\", \"options\": [ \"entscheidet mit Richterinnen/Richtern über Schuld und Strafe.\", \"gibt Bürgerinnen/Bürgern rechtlichen Rat.\", \"stellt Urkunden aus.\", \"verteidigt die Angeklagte/den Angeklagten.\" ], \"answer\": \"entscheidet mit Richterinnen/Richtern über Schuld und Strafe.\", \"explanation\": \"Ein Schöffe ist ein Laienrichter, der zusammen mit professionellen Richtern an Gerichtsverfahren teilnimmt. Diese Position ermöglicht es Bürgern, aktiv im Justizsystem mitzuarbeiten und das Urteil über Schuld oder Unschuld mitzugestalten.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 141, \"question\": \"Wer berät in Deutschland Personen bei Rechtsfragen und vertritt sie vor Gericht?\", \"options\": [ \"eine Rechtsanwältin/ein Rechtsanwalt\", \"eine Richterin/ein Richter\", \"eine Schöffin/ein Schöffe\", \"eine Staatsanwältin/ein Staatsanwalt\" ], \"answer\": \"eine Rechtsanwältin/ein Rechtsanwalt\", \"explanation\": \"In Deutschland haben Rechtsanwälte die Aufgabe, ihre Mandanten in rechtlichen Angelegenheiten zu beraten und sie vor Gericht zu vertreten. Dies ist ein zentraler Bestandteil des Rechts systems, da Anwälte eine wichtige Rolle bei der Wahrung der Rechte ihrer Klienten spielen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 142, \"question\": \"Was ist die Hauptaufgabe einer Richterin/eines Richters in Deutschland? Eine Richterin/ein Richter …\", \"options\": [ \"vertritt Bürgerinnen und Bürger vor einem Gericht.\", \"arbeitet an einem Gericht und spricht Urteile.\", \"ändert Gesetze.\", \"betreut Jugendliche vor Gericht.\" ], \"answer\": \"arbeitet an einem Gericht und spricht Urteile.\", \"explanation\": \"Richter sind dafür zuständig, in Rechtsstreitigkeiten zu entscheiden und Urteile zu fällen. Ihre Hauptaufgabe ist es, die Gesetze anzuwenden und für Gerechtigkeit zu sorgen, basierend auf den vorgelegten Beweisen und Argumenten.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 143, \"question\": \"Eine Richterin/ein Richter in Deutschland gehört zur …\", \"options\": [\"Judikative.\", \"Exekutive.\", \"Operative.\", \"Legislative.\"], \"answer\": \"Judikative.\", \"explanation\": \"Die Judikative ist die dritte Gewalt im Staat, die für die Rechtsprechung zuständig ist. Sie ist unabhängig von Legislative und Exekutive und soll sicherstellen, dass die Gesetze fair und gerecht angewendet werden.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 144, \"question\": \"Eine Richterin/ein Richter gehört in Deutschland zur …\", \"options\": [ \"vollziehenden Gewalt.\", \"rechtsprechenden Gewalt.\", \"planenden Gewalt.\", \"gesetzgebenden Gewalt.\" ], \"answer\": \"rechtsprechenden Gewalt.\", \"explanation\": \"Die rechtsprechende Gewalt ist verantwortlich für die Anwendung und Auslegung von Gesetzgebung. In Deutschland ist sie durch die Gerichte organisiert, die unabhängige Entscheidungen im Namen der Gerechtigkeit treffen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 145, \"question\": \"In Deutschland wird die Staatsgewalt geteilt. Für welche Staatsgewalt arbeitet eine Richterin/ein Richter? Für die …\", \"options\": [\"Judikative\", \"Exekutive\", \"Presse\", \"Legislative\"], \"answer\": \"Judikative\", \"explanation\": \"Die Trennung der Staatsgewalten in Deutschland umfasst die Legislative (Gesetzgebung), die Exekutive (Ausführung der Gesetze) und die Judikative (Rechtsprechung). Richter arbeiten innerhalb der Judikative, um Recht zu sprechen und rechtliche Streitigkeiten zu entscheiden.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 146, \"question\": \"Wie nennt man in Deutschland ein Verfahren vor einem Gericht?\", \"options\": [\"Programm\", \"Prozedur\", \"Protokoll\", \"Prozess\"], \"answer\": \"Prozess\", \"explanation\": \"Ein Prozess ist der rechtliche Weg, den eine Streitigkeit vor den Gerichten nimmt. Dies umfasst alle Schritte von der Einreichung der Klage bis zur Urteilsverkündung und ist ein zentraler Bestandteil der Justiz.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 147, \"question\": \"Was ist die Arbeit einer Richterin/eines Richters in Deutschland?\", \"options\": [ \"Deutschland regieren\", \"Recht sprechen\", \"Pläne erstellen\", \"Gesetze erlassen\" ], \"answer\": \"Recht sprechen\", \"explanation\": \"Die Tätigkeit eines Richters wird als 'Recht sprechen' bezeichnet, was bedeutet, dass sie in rechtlichen Angelegenheiten urteilen. Dadurch tragen sie zur Durchsetzung des Rechtsstaates und zur Wahrung der Gerechtigkeit bei.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 148, \"question\": \"Was ist eine Aufgabe der Polizei in Deutschland?\", \"options\": [ \"das Land zu verteidigen\", \"die Bürgerinnen und Bürger abzuhören\", \"die Gesetze zu beschließen\", \"die Einhaltung von Gesetzen zu überwachen\" ], \"answer\": \"die Einhaltung von Gesetzen zu überwachen\", \"explanation\": \"Die Polizei hat die Aufgabe, die öffentliche Sicherheit und Ordnung aufrechtzuerhalten. Dazu gehört auch die Überwachung der Einhaltung von Gesetzen sowie das Eingreifen bei Straftaten oder Bedrohungen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 149, \"question\": \"Was ist ein Beispiel für antisemitisches Verhalten?\", \"options\": [ \"ein jüdisches Fest besuchen\", \"die israelische Regierung kritisieren\", \"den Holocaust leugnen\", \"gegen Juden Fußball spielen.\" ], \"answer\": \"den Holocaust leugnen\", \"explanation\": \"Antisemitismus bezeichnet Vorurteile und Diskriminierung gegenüber Juden. Das Leugnen des Holocausts ist ein besonders extrem und gefährlich Ausdruck dieser Haltung, da es die historische Realität negiert und das Leid von Millionen Menschen verharmlost.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 150, \"question\": \"Eine Gerichtsschöffin/ein Gerichtsschöffe in Deutschland ist …\", \"options\": [ \"die Stellvertreterin/der Stellvertreter des Stadtoberhaupts.\", \"eine ehrenamtliche Richterin/ein ehrenamtlicher Richter.\", \"ein Mitglied eines Gemeinderats.\", \"eine Person, die Jura studiert hat.\" ], \"answer\": \"eine ehrenamtliche Richterin/ein ehrenamtlicher Richter.\", \"explanation\": \"Eine Gerichtsschöffin oder ein Gerichtsschöffe ist eine Person, die als ehrenamtliche Richter in bestimmten Gerichtsverfahren mitwirkt. Sie unterstützen die Richter durch ihre Urteilskraft und bringen oft praktisches Wissen aus dem gesellschaftlichen Leben in den Prozess ein.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-5\", \"category\": \"Politik und Regierung\" }, { \"id\": 151, \"question\": \"Wer baute die Mauer in Berlin?\", \"options\": [ \"Großbritannien\", \"die DDR\", \"die Bundesrepublik Deutschland\", \"die USA\" ], \"answer\": \"die DDR\", \"explanation\": \"Die Berliner Mauer wurde 1961 von der Deutschen Demokratischen Republik (DDR) errichtet, um die Flucht von Bürgern in die Bundesrepublik Deutschland zu verhindern. Sie symbolisierte die Teilung Berlins und das kalte Kriegsklima zwischen Ost und West.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 152, \"question\": \"Wann waren die Nationalsozialisten mit Adolf Hitler in Deutschland an der Macht?\", \"options\": [ \"1918 bis 1923\", \"1932 bis 1950\", \"1933 bis 1945\", \"1945 bis 1989\" ], \"answer\": \"1933 bis 1945\", \"explanation\": \"Die Nationalsozialisten unter Adolf Hitler erlangten 1933 die Macht und regierten bis zu ihrer Niederlage im Jahr 1945. Diese Zeit war geprägt von totalitärer Herrschaft, Rassendiskriminierung und dem Zweiten Weltkrieg.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 153, \"question\": \"Was war am 8. Mai 1945?\", \"options\": [ \"Tod Adolf Hitlers\", \"Beginn des Berliner Mauerbaus\", \"Wahl von Konrad Adenauer zum Bundeskanzler\", \"Ende des Zweiten Weltkriegs in Europa\" ], \"answer\": \"Ende des Zweiten Weltkriegs in Europa\", \"explanation\": \"Der 8. Mai 1945 wird als Tag der Kapitulation Deutschlands gefeiert und markiert das offizielle Ende des Zweiten Weltkriegs in Europa. An diesem Tag legte die deutsche Wehrmacht die Waffen nieder und trat in die übergangsweise Kontrolle der Alliierten ein.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 154, \"question\": \"Wann war der Zweite Weltkrieg zu Ende?\", \"options\": [\"1933\", \"1945\", \"1949\", \"1961\"], \"answer\": \"1945\", \"explanation\": \"Der Zweite Weltkrieg endete 1945 mit der Kapitulation Deutschlands im Mai und der Kapitulation Japans im September. Diese globalen Konflikte führten zu erheblichen politischen, sozialen und wirtschaftlichen Veränderungen in der Welt.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 155, \"question\": \"Wann waren die Nationalsozialisten in Deutschland an der Macht?\", \"options\": [ \"1888 bis 1918\", \"1921 bis 1934\", \"1933 bis 1945\", \"1949 bis 1963\" ], \"answer\": \"1933 bis 1945\", \"explanation\": \"Die Nazis, angeführt von Adolf Hitler, etablierten eine Diktatur in Deutschland von 1933 bis 1945. In dieser Zeit wurden zahlreiche Menschen verfolgt und es kam zu gravierenden Menschenrechtsverletzungen, insbesondere gegen Juden.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 156, \"question\": \"In welchem Jahr wurde Hitler Reichskanzler?\", \"options\": [\"1923\", \"1927\", \"1933\", \"1936\"], \"answer\": \"1933\", \"explanation\": \"Adolf Hitler wurde am 30. Januar 1933 zum Reichskanzler Deutschlands ernannt. Dies markierte den Beginn seiner Diktatur und den Übergang von der Weimarer Republik zur nationalsozialistischen Herrschaft.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 157, \"question\": \"Die Nationalsozialisten mit Adolf Hitler errichteten 1933 in Deutschland …\", \"options\": [ \"eine Diktatur.\", \"einen demokratischen Staat.\", \"eine Monarchie.\", \"ein Fürstentum.\" ], \"answer\": \"eine Diktatur.\", \"explanation\": \"Der Nationalsozialismus führte zur Errichtung einer Diktatur in Deutschland, die auf unterdrückerischen Maßnahmen und einer zentralisierten, autoritären Kontrolle basierte. Es gab keine politische Opposition, und die Grundrechte wurden massiv eingeschränkt.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 158, \"question\": \"Das 'Dritte Reich' war eine …\", \"options\": [\"Diktatur.\", \"Demokratie.\", \"Monarchie.\", \"Räterepublik.\"], \"answer\": \"Diktatur.\", \"explanation\": \"Das 'Dritte Reich' bezeichnet die Regierungszeit der Nationalsozialisten von 1933 bis 1945. Unter dieser Diktatur wurden grundlegende Menschenrechte verletzt und eine aggressive Expansionspolitik verfolgt.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 159, \"question\": \"Was gab es in Deutschland nicht während der Zeit des Nationalsozialismus?\", \"options\": [ \"freie Wahlen\", \"Pressezensur\", \"willkürliche Verhaftungen\", \"Verfolgung von Juden\" ], \"answer\": \"freie Wahlen\", \"explanation\": \"Während der Zeit des Nationalsozialismus gab es keine freien Wahlen; stattdessen wurde eine Einheitspartei etabliert, die jede Form von politischer Opposition unterdrückte. Pressezensur und Verhaftungen waren gängige Praktiken zur Kontrolle der Bevölkerung.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 160, \"question\": \"Welcher Krieg dauerte von 1939 bis 1945?\", \"options\": [ \"der Erste Weltkrieg\", \"der Zweite Weltkrieg\", \"der Vietnamkrieg\", \"der Golfkrieg\" ], \"answer\": \"der Zweite Weltkrieg\", \"explanation\": \"Der Zweite Weltkrieg war ein weltweiter Konflikt, der von 1939 bis 1945 dauerte und zahlreiche Länder involvierte. Er führte zu bedeutenden Veränderungen auf globaler Ebene und hatte tiefgreifende Auswirkungen auf die politische Landschaft des 20. Jahrhunderts.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 161, \"question\": \"Was kennzeichnete den NS-Staat? Eine Politik …\", \"options\": [ \"des staatlichen Rassismus\", \"der Meinungsfreiheit\", \"der allgemeinen Religionsfreiheit\", \"der Entwicklung der Demokratie\" ], \"answer\": \"des staatlichen Rassismus\", \"explanation\": \"Der NS-Staat war geprägt von einer Ideologie, die Rassismus auf staatlicher Ebene verankerte. Dies führte zur Diskriminierung und Verfolgung von Minderheiten, insbesondere der jüdischen Bevölkerung, und stellte einen grundlegenden Bruch mit den Prinzipien der Menschenrechte dar.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 162, \"question\": \"Claus Schenk Graf von Stauffenberg wurde bekannt durch …\", \"options\": [ \"eine Goldmedaille bei den Olympischen Spielen 1936.\", \"den Bau des Reichstagsgebäudes.\", \"den Aufbau der Wehrmacht.\", \"das Attentat auf Hitler am 20. Juli 1944.\" ], \"answer\": \"das Attentat auf Hitler am 20. Juli 1944.\", \"explanation\": \"Stauffenberg ist bekannt für seinen Versuch, Adolf Hitler durch ein Attentat zu liquidieren. Das Attentat ist ein bedeutendes Ereignis in der deutschen Geschichte, da es zeigt, dass es innerhalb des Militärs und der Gesellschaft Widerstand gegen das nationalsozialistische Regime gab.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 163, \"question\": \"In welchem Jahr zerstörten die Nationalsozialisten Synagogen und jüdische Geschäfte in Deutschland?\", \"options\": [\"1925\", \"1930\", \"1938\", \"1945\"], \"answer\": \"1938\", \"explanation\": \"Die Zerstörung von Synagogen und jüdischen Geschäften geschah während der Pogromnacht am 9. November 1938. Diese Ereignisse stellen einen Wendepunkt in der antisemitischen Gewalt dar und markierten den Beginn einer systematischen Verfolgung der Juden in Deutschland.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 164, \"question\": \"Was passierte am 9. November 1938 in Deutschland?\", \"options\": [ \"Mit dem Angriff auf Polen beginnt der Zweite Weltkrieg.\", \"Die Nationalsozialisten verlieren eine Wahl und lösen den Reichstag auf.\", \"Jüdische Geschäfte und Synagogen werden durch Nationalsozialisten und ihre Anhänger zerstört.\", \"Hitler wird Reichspräsident und lässt alle Parteien verbieten.\" ], \"answer\": \"Jüdische Geschäfte und Synagogen werden durch Nationalsozialisten und ihre Anhänger zerstört.\", \"explanation\": \"Am 9. November 1938 ereignete sich die Reichskristallnacht, in der jüdische Geschäfte und Synagogen verwüstet wurden. Diese Gewalt war eine direkte Folge der nationalsozialistischen antisemitischen Politik und stellte einen dramatischen Anstieg der systematischen Verfolgung von Juden dar.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 165, \"question\": \"Wie hieß der erste Bundeskanzler der Bundesrepublik Deutschland?\", \"options\": [ \"Konrad Adenauer\", \"Kurt Georg Kiesinger\", \"Helmut Schmidt\", \"Willy Brandt\" ], \"answer\": \"Konrad Adenauer\", \"explanation\": \"Konrad Adenauer war der erste Bundeskanzler der Bundesrepublik Deutschland von 1949 bis 1963. Er spielte eine entscheidende Rolle beim Wiederaufbau und der Integration Deutschlands in die westliche Gemeinschaft nach dem Zweiten Weltkrieg.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 166, \"question\": \"Bei welchen Demonstrationen in Deutschland riefen die Menschen 'Wir sind das Volk'?\", \"options\": [ \"beim Arbeiteraufstand 1953 in der DDR\", \"bei den Demonstrationen 1968 in der Bundesrepublik Deutschland\", \"bei den Anti-Atomkraft-Demonstrationen 1985 in der Bundesrepublik Deutschland\", \"bei den Montagsdemonstrationen 1989 in der DDR\" ], \"answer\": \"bei den Montagsdemonstrationen 1989 in der DDR\", \"explanation\": \"'Wir sind das Volk' wurde zum zentralen Slogan der Montagsdemonstrationen in der DDR 1989. Diese Proteste forderten Freiheit und Reformen und trugen entscheidend zum Ende der DDR und zur Wiedervereinigung Deutschlands bei.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 167, \"question\": \"Welche Länder wurden nach dem Zweiten Weltkrieg in Deutschland als 'Alliierte Besatzungsmächte' bezeichnet?\", \"options\": [ \"Sowjetunion, Großbritannien, Polen, Schweden\", \"Frankreich, Sowjetunion, Italien, Japan\", \"USA, Sowjetunion, Spanien, Portugal\", \"USA, Sowjetunion, Großbritannien, Frankreich\" ], \"answer\": \"USA, Sowjetunion, Großbritannien, Frankreich\", \"explanation\": \"Nach dem Zweiten Weltkrieg wurde Deutschland von vier Besatzungsmächten kontrolliert: USA, Sowjetunion, Großbritannien und Frankreich. Diese Teilung führte zu unterschiedlichen politischen Systemen in den besetzten Zonen und schließlich zur Teilung Deutschlands in Ost- und Westdeutschland.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 168, \"question\": \"Welches Land war keine 'Alliierte Besatzungsmacht' in Deutschland?\", \"options\": [\"USA\", \"Sowjetunion\", \"Frankreich\", \"Japan\"], \"answer\": \"Japan\", \"explanation\": \"Japan war nach dem Zweiten Weltkrieg nicht Teil der Besatzungsmächte in Deutschland. Die Besatzung Deutschlands lag ausschließlich bei den westlichen Alliierten und der Sowjetunion, während Japan in Asien beschäftigt war.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 169, \"question\": \"Wann wurde die Bundesrepublik Deutschland gegründet?\", \"options\": [\"1939\", \"1945\", \"1949\", \"1951\"], \"answer\": \"1949\", \"explanation\": \"Die Bundesrepublik Deutschland wurde am 23. Mai 1949 gegründet. Dieser Gründungstag markierte den Beginn der parlamentarischen Demokratie im westlichen Teil Deutschlands nach dem Ende des Zweiten Weltkriegs.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 170, \"question\": \"Was gab es während der Zeit des Nationalsozialismus in Deutschland?\", \"options\": [ \"das Verbot von Parteien\", \"das Recht zur freien Entfaltung der Persönlichkeit\", \"Pressefreiheit\", \"den Schutz der Menschenwürde\" ], \"answer\": \"das Verbot von Parteien\", \"explanation\": \"Im nationalsozialistischen Deutschland gab es ein striktes Verbot von politischen Parteien außer der NSDAP. Dies führte zur Errichtung einer totalitären Herrschaft, in der die Meinungsfreiheit und die politischen Rechte der Bürger stark eingeschränkt wurden.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 171, \"question\": \"Soziale Marktwirtschaft bedeutet, die Wirtschaft …\", \"options\": [ \"steuert sich allein nach Angebot und Nachfrage.\", \"wird vom Staat geplant und gesteuert, Angebot und Nachfrage werden nicht berücksichtigt.\", \"richtet sich nach der Nachfrage im Ausland.\", \"richtet sich nach Angebot und Nachfrage, aber der Staat sorgt für einen sozialen Ausgleich.\" ], \"answer\": \"richtet sich nach Angebot und Nachfrage, aber der Staat sorgt für einen sozialen Ausgleich.\", \"explanation\": \"Die soziale Marktwirtschaft ist ein wirtschaftliches Konzept, das Angebot und Nachfrage mit sozialen Prinzipien verbindet. Der Staat hat die Aufgabe, soziale Gerechtigkeit zu fördern und wirtschaftliche Ungleichheiten auszugleichen.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 172, \"question\": \"In welcher Besatzungszone wurde die DDR gegründet? In der …\", \"options\": [ \"amerikanischen Besatzungszone\", \"französischen Besatzungszone\", \"britischen Besatzungszone\", \"sowjetischen Besatzungszone\" ], \"answer\": \"sowjetischen Besatzungszone\", \"explanation\": \"Die Deutsche Demokratische Republik (DDR) wurde in der sowjetischen Besatzungszone gegründet. Diese Zone war nach dem Zweiten Weltkrieg von der Sowjetunion kontrolliert und spielte eine entscheidende Rolle in der Teilung Deutschlands.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 173, \"question\": \"Die Bundesrepublik Deutschland ist ein Gründungsmitglied …\", \"options\": [ \"des Nordatlantikpakts (NATO).\", \"der Vereinten Nationen (VN).\", \"der Europäischen Union (EU).\", \"des Warschauer Pakts.\" ], \"answer\": \"der Europäischen Union (EU).\", \"explanation\": \"Die Bundesrepublik Deutschland ist eines der Gründungsmitglieder der Europäischen Union, die 1993 offiziell gegründet wurde. Die EU verfolgt Ziele wie wirtschaftliche Zusammenarbeit, Frieden und Stabilität in Europa.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 174, \"question\": \"Wann wurde die DDR gegründet?\", \"options\": [\"1947\", \"1949\", \"1953\", \"1956\"], \"answer\": \"1949\", \"explanation\": \"Die DDR wurde im Jahr 1949 gegründet, als die Teilung Deutschlands nach dem Zweiten Weltkrieg formalisiert wurde. Dies geschah in einem politischen Kontext, der durch Spannungen zwischen Ost und West geprägt war.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 175, \"question\": \"Wie viele Besatzungszonen gab es in Deutschland nach dem Zweiten Weltkrieg?\", \"options\": [\"3\", \"4\", \"5\", \"6\"], \"answer\": \"4\", \"explanation\": \"Nach dem Zweiten Weltkrieg wurde Deutschland in vier Besatzungszonen aufgeteilt: die amerikanische, britische, französische und sowjetische Zone. Diese Teilung führte schließlich zur Gründung der BRD und der DDR.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 176, \"type\": \"image\", \"question\": \"Wie waren die Besatzungszonen Deutschlands nach 1945 verteilt?\", \"options\": [ \"1=Großbritannien, 2=Sowjetunion, 3=Frankreich, 4=USA\", \"1=Sowjetunion, 2=Großbritannien, 3=USA, 4=Frankreich\", \"1=Großbritannien, 2=Sowjetunion, 3=USA, 4=Frankreich\", \"1=Großbritannien, 2=USA, 3=Sowjetunion, 4=Frankreich\" ], \"answer\": \"1=Großbritannien, 2=Sowjetunion, 3=USA, 4=Frankreich\", \"explanation\": \"Die Verteilung der Besatzungszonen wurde durch die Alliierten bei Konferenzen nach dem Krieg festgelegt. Dies hatte langfristige Auswirkungen auf die politische Landschaft Europas und die Teilung Deutschlands.\", \"state\": \"general\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 177, \"question\": \"Welche deutsche Stadt wurde nach dem Zweiten Weltkrieg in vier Sektoren aufgeteilt?\", \"options\": [\"München\", \"Berlin\", \"Dresden\", \"Frankfurt/Oder\"], \"answer\": \"Berlin\", \"explanation\": \"Berlin wurde nach dem Zweiten Weltkrieg in vier Sektoren aufgeteilt, die jeweils einer der vier Besatzungsmächte zugewiesen wurden. Diese Teilung Berlins wurde zum Symbol des Kalten Krieges.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 178, \"question\": \"Vom Juni 1948 bis zum Mai 1949 wurden die Bürgerinnen und Bürger von West-Berlin durch eine Luftbrücke versorgt. Welcher Umstand war dafür verantwortlich?\", \"options\": [ \"Für Frankreich war eine Versorgung der West-Berliner Bevölkerung mit dem Flugzeug kostengünstiger.\", \"Die amerikanischen Soldatinnen und Soldaten hatten beim Landtransport Angst vor Überfällen.\", \"Für Großbritannien war die Versorgung über die Luftbrücke schneller.\", \"Die Sowjetunion unterbrach den gesamten Verkehr auf dem Landwege.\" ], \"answer\": \"Die Sowjetunion unterbrach den gesamten Verkehr auf dem Landwege.\", \"explanation\": \"Die Luftbrücke war eine Reaktion auf die Blockade Berlins durch die Sowjetunion, die alle Land- und Wasserwege nach West-Berlin absperrte. Die westlichen Alliierten organisierten daraufhin eine massive Luftversorgung.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 179, \"question\": \"Wie endete der Zweite Weltkrieg in Europa offiziell?\", \"options\": [ \"mit dem Tod Adolf Hitlers\", \"durch die bedingungslose Kapitulation Deutschlands\", \"mit dem Rückzug der Deutschen aus den besetzten Gebieten\", \"durch eine Revolution in Deutschland\" ], \"answer\": \"durch die bedingungslose Kapitulation Deutschlands\", \"explanation\": \"Der Zweite Weltkrieg in Europa endete offiziell am 8. Mai 1945 mit der bedingungslosen Kapitulation Deutschlands. Dieses Datum wird als Tag der Befreiung gefeiert.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 180, \"question\": \"Der erste Bundeskanzler der Bundesrepublik Deutschland war …\", \"options\": [ \"Ludwig Erhard.\", \"Willy Brandt.\", \"Konrad Adenauer.\", \"Gerhard Schröder.\" ], \"answer\": \"Konrad Adenauer.\", \"explanation\": \"Konrad Adenauer war der erste Bundeskanzler der Bundesrepublik Deutschland und diente von 1949 bis 1963. Er spielte eine wesentliche Rolle bei der politischen und wirtschaftlichen Stabilisierung der Bundesrepublik nach dem Krieg.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-6\", \"category\": \"Wirtschaft und Soziales\" }, { \"id\": 181, \"question\": \"Was wollte Willy Brandt mit seinem Kniefall 1970 im ehemaligen jüdischen Ghetto in Warschau ausdrücken?\", \"options\": [ \"Er hat sich den ehemaligen Alliierten unterworfen.\", \"Er bat Polen und die polnischen Juden um Vergebung.\", \"Er zeigte seine Demut vor dem Warschauer Pakt.\", \"Er sprach ein Gebet am Grab des Unbekannten Soldaten.\" ], \"answer\": \"Er bat Polen und die polnischen Juden um Vergebung.\", \"explanation\": \"Willy Brandts Kniefall 1970 war ein symbolischer Akt der Versöhnung und des Gedenkens an die Opfer des Holocaust. Er stellte damit auch die Verantwortung Deutschlands für die Gräueltaten des Zweiten Weltkriegs heraus und suchte eine Entschuldigung für das erlittene Unrecht.\", \"state\": \"general\", \"type\": \"image\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 182, \"question\": \"Wie heißt das jüdische Gebetshaus?\", \"options\": [\"Basilika\", \"Moschee\", \"Synagoge\", \"Kirche\"], \"answer\": \"Synagoge\", \"explanation\": \"Eine Synagoge ist der Versammlungsort für Juden, in dem Gebete, Gottesdienste und andere religiöse Aktivitäten stattfinden. Sie hat eine zentrale Bedeutung im jüdischen Glaubensleben und in der Gemeinschaft.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 183, \"question\": \"Wann war in der Bundesrepublik Deutschland das 'Wirtschaftswunder'?\", \"options\": [\"40er Jahre\", \"50er Jahre\", \"70er Jahre\", \"80er Jahre\"], \"answer\": \"50er Jahre\", \"explanation\": \"Das 'Wirtschaftswunder' beschreibt den wirtschaftlichen Aufschwung in der Bundesrepublik Deutschland in den 1950er Jahren. Diese Phase war durch rasches Wirtschaftswachstum und die Wiederherstellung der deutschen Industrie nach dem Zweiten Weltkrieg geprägt.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 184, \"question\": \"Auf welcher rechtlichen Grundlage wurde der Staat Israel gegründet?\", \"options\": [ \"eine Resolution der Vereinten Nationen\", \"ein Beschluss des Zionistenkongresses\", \"ein Vorschlag der Bundesregierung\", \"ein Vorschlag der UdSSR\" ], \"answer\": \"eine Resolution der Vereinten Nationen\", \"explanation\": \"Die Gründung des Staates Israel wurde durch die Resolution 181 der Vereinten Nationen von 1947 legitimiert, die einen Teilungsplan für Palästina vorsah. Diese Resolution führte zur Gründung Israels im Jahr 1948 und hatte bedeutende geopolitische Auswirkungen.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 185, \"question\": \"Wofür stand der Ausdruck 'Eiserner Vorhang'? Für die Abschottung …\", \"options\": [ \"des Warschauer Pakts gegen den Westen\", \"Norddeutschlands gegen Süddeutschland\", \"Nazi-Deutschlands gegen die Alliierten\", \"Europas gegen die USA\" ], \"answer\": \"des Warschauer Pakts gegen den Westen\", \"explanation\": \"Der Ausdruck 'Eiserner Vorhang' bezeichnet die politische und ideologische Grenze zwischen dem kommunistischen Osten und dem kapitalistischen Westen während des Kalten Krieges. Insbesondere wird er oft in Verbindung mit den Ländern des Warschauer Pakts und den westlichen Demokratien erwähnt.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 186, \"question\": \"Im Jahr 1953 gab es in der DDR einen Aufstand, an den lange Zeit in der Bundesrepublik Deutschland ein Feiertag erinnerte. Wann war das?\", \"options\": [\"1. Mai\", \"17. Juni\", \"20. Juli\", \"9. November\"], \"answer\": \"17. Juni\", \"explanation\": \"Der Volksaufstand vom 17. Juni 1953 in der DDR war eine Reaktion auf wirtschaftliche Probleme und politische Unterdrückung. Er stellte einen wichtigen Moment des Widerstands gegen das SED-Regime dar und wurde in Westdeutschland als Nationalfeiertag begangen.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 187, \"question\": \"Welcher deutsche Staat hatte eine schwarz-rot-goldene Flagge mit Hammer, Zirkel und Ährenkranz?\", \"options\": [ \"Preußen\", \"Bundesrepublik Deutschland\", \"\\\"Drittes Reich\\\"\", \"DDR\" ], \"answer\": \"DDR\", \"explanation\": \"Die Flagge der DDR (Deutsche Demokratische Republik) bestand aus den Farben schwarz, rot und gold, ergänzt durch Symbole wie Hammer und Zirkel, die die Arbeiter- und Bauernschaft repräsentieren sollten. Diese Flagge spiegelte die ideologischen Prinzipien des kommunistischen Staates wider.\", \"type\": \"image\", \"state\": \"general\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 188, \"question\": \"In welchem Jahr wurde die Mauer in Berlin gebaut?\", \"options\": [\"1953\", \"1956\", \"1959\", \"1961\"], \"answer\": \"1961\", \"explanation\": \"Die Berliner Mauer wurde am 13. August 1961 errichtet und symbolisierte die Teilung Deutschlands und den Kalten Krieg. Sie stellte eine physische Barriere zwischen Ost- und Westberlin dar und wurde ein starkes Symbol für die Unterdrückung des kommunistischen Regimes der DDR.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 189, \"question\": \"Wann baute die DDR die Mauer in Berlin?\", \"options\": [\"1919\", \"1933\", \"1961\", \"1990\"], \"answer\": \"1961\", \"explanation\": \"Die DDR errichtete die Mauer am 13. August 1961, um die Massenflucht von Bürgern in den Westen zu stoppen. Dieses Ereignis war entscheidend für die Geschichte des Kalten Krieges und beeinflusste die deutsch-deutsche Beziehung stark.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 190, \"question\": \"Was bedeutet die Abkürzung DDR?\", \"options\": [ \"Dritter Deutscher Rundfunk\", \"Die Deutsche Republik\", \"Dritte Deutsche Republik\", \"Deutsche Demokratische Republik\" ], \"answer\": \"Deutsche Demokratische Republik\", \"explanation\": \"DDR steht für Deutsche Demokratische Republik, die von 1949 bis 1990 existierte. Dieser Staat war das Ergebnis der Teilung Deutschlands nach dem Zweiten Weltkrieg und war ein sozialistischer Staat, der unter dem Einfluss der Sowjetunion stand.\", \"type\": \"text\", \"state\": \"general\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 191, \"question\": \"Wann wurde die Mauer in Berlin für alle geöffnet?\", \"options\": [\"1987\", \"1989\", \"1992\", \"1995\"], \"answer\": \"1989\", \"explanation\": \"Die Berlinermauer wurde am 9. November 1989 geöffnet und stellt einen Wendepunkt in der deutschen Geschichte dar, da sie den Beginn des Endes der Teilung Deutschlands markierte. Diese Öffnung führte zur Wiedervereinigung Deutschlands und symbolisierte den Zusammenbruch des Kommunismus in Osteuropa.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 192, \"question\": \"Welches heutige deutsche Bundesland gehörte früher zum Gebiet der DDR?\", \"options\": [\"Brandenburg\", \"Bayern\", \"Saarland\", \"Hessen\"], \"answer\": \"Brandenburg\", \"explanation\": \"Brandenburg war ein Teil der Deutschen Demokratischen Republik (DDR) und umfasste das Gebiet um Berlin. Die Region war während der Teilung Deutschlands besonders betroffen, da sie direkt an die Westberliner Mauer grenzte.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 193, \"question\": \"Von 1961 bis 1989 war Berlin …\", \"options\": [ \"ohne Bürgermeister.\", \"ein eigener Staat.\", \"durch eine Mauer geteilt.\", \"nur mit dem Flugzeug erreichbar.\" ], \"answer\": \"durch eine Mauer geteilt.\", \"explanation\": \"Die Berliner Mauer war von 1961 bis 1989 ein Symbol für die Teilung zwischen Ost- und Westdeutschland. Diese physische Trennung war das Ergebnis des Kalten Krieges und trennte Familien sowie Freunde für fast drei Jahrzehnte.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 194, \"question\": \"Am 3. Oktober feiert man in Deutschland den Tag der Deutschen …\", \"options\": [\"Einheit.\", \"Nation.\", \"Bundesländer.\", \"Städte.\"], \"answer\": \"Einheit.\", \"explanation\": \"Der Tag der Deutschen Einheit ist der nationale Feiertag der Bundesrepublik Deutschland und erinnert an die Wiedervereinigung Deutschlands im Jahr 1990. Er symbolisiert den Frieden und die Freiheit, die nach der Teilung und den politischen Umwälzungen der 1980er Jahre erreicht wurden.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 195, \"question\": \"Welches heutige deutsche Bundesland gehörte früher zum Gebiet der DDR?\", \"options\": [\"Hessen\", \"Sachsen-Anhalt\", \"Nordrhein-Westfalen\", \"Saarland\"], \"answer\": \"Sachsen-Anhalt\", \"explanation\": \"Sachsen-Anhalt war ein bedeutendes Bundesland in der DDR und beherbergte mehrere wichtige Städte, wie Magdeburg und Halle. Die Landesteile spielten eine zentrale Rolle in der Industrie sowie in der Kultur der ehemaligen DDR.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 196, \"question\": \"Warum nennt man die Zeit im Herbst 1989 in der DDR 'Die Wende'? In dieser Zeit veränderte sich die DDR politisch …\", \"options\": [ \"von einer Diktatur zur Demokratie.\", \"von einer liberalen Marktwirtschaft zum Sozialismus.\", \"von einer Monarchie zur Sozialdemokratie.\", \"von einem religiösen Staat zu einem kommunistischen Staat.\" ], \"answer\": \"von einer Diktatur zur Demokratie.\", \"explanation\": \"Die 'Wende' bezeichnet die Zeit im Herbst 1989, als in der DDR friedliche Proteste gegen das Regime stattfanden. Diese Proteste führten zu einer grundlegenden politischen Veränderung und schließlich zur Einführung demokratischer Strukturen in der ehemaligen Diktatur.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 197, \"question\": \"Welches heutige deutsche Bundesland gehörte früher zum Gebiet der DDR?\", \"options\": [\"Thüringen\", \"Hessen\", \"Bayern\", \"Bremen\"], \"answer\": \"Thüringen\", \"explanation\": \"Thüringen ist ein Bundesland, das früher Teil der DDR war und bekannt für seine reiche Kultur und Geschichte ist. Die Region hat viele historische Städte, wie Weimar und Erfurt, die bedeutend für die deutsche Literatur und Politik waren.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 198, \"question\": \"Welches heutige deutsche Bundesland gehörte früher zum Gebiet der DDR?\", \"options\": [\"Bayern\", \"Niedersachsen\", \"Sachsen\", \"Baden-Württemberg\"], \"answer\": \"Sachsen\", \"explanation\": \"Sachsen war ein zentrales Land in der DDR und hatte bedeutende Städte wie Leipzig und Dresden. Es war ein kulturelles und industrielles Zentrum, das viele wichtige Entwicklungen während der DDR-Zeit erlebte.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 199, \"question\": \"Mit der Abkürzung 'Stasi' meinte man in der DDR …\", \"options\": [ \"das Parlament.\", \"das Ministerium für Staatssicherheit.\", \"eine regierende Partei.\", \"das Ministerium für Volksbildung.\" ], \"answer\": \"das Ministerium für Staatssicherheit.\", \"explanation\": \"Die Stasi war der Geheimdienst der DDR, verantwortlich für die Überwachung der Bevölkerung und die Abwehr oppositioneller Bewegungen. Dieses Ministerium spielte eine entscheidende Rolle in der repressiven Politik der DDR und war für viele Menschen ein Symbol der Angst.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 200, \"question\": \"Welches heutige deutsche Bundesland gehörte früher zum Gebiet der DDR?\", \"options\": [ \"Hessen\", \"Schleswig-Holstein\", \"Mecklenburg-Vorpommern\", \"Saarland\" ], \"answer\": \"Mecklenburg-Vorpommern\", \"explanation\": \"Mecklenburg-Vorpommern war ein Teil der DDR und ist bekannt für seine Küstenlinie an der Ostsee sowie für zahlreiche Seen und Naturparks. Die Region hat viel von der Geschichte der DDR bewahrt und ist heute ein beliebtes Urlaubsziel.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 201, \"question\": \"Welche der folgenden Auflistungen enthält nur Bundesländer, die zum Gebiet der früheren DDR gehörten?\", \"options\": [ \"Niedersachsen, Nordrhein-Westfalen, Hessen, Schleswig-Holstein, Brandenburg\", \"Mecklenburg-Vorpommern, Brandenburg, Sachsen, Sachsen-Anhalt, Thüringen\", \"Bayern, Baden-Württemberg, Rheinland-Pfalz, Thüringen, Sachsen\", \"Sachsen, Thüringen, Hessen, Niedersachen, Brandenburg\" ], \"answer\": \"Mecklenburg-Vorpommern, Brandenburg, Sachsen, Sachsen-Anhalt, Thüringen\", \"explanation\": \"Die Deutsche Demokratische Republik (DDR) bestand aus verschiedenen Bundesländern, die nach der Wiedervereinigung 1990 zu den neuen Bundesländern wurden. Bei dieser Frage geht es darum, die Geografie Deutschlands zu verstehen und die ehemaligen territorialen Grenzen der DDR zu identifizieren.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 202, \"question\": \"Zu wem gehörte die DDR im 'Kalten Krieg'?\", \"options\": [ \"zu den Westmächten\", \"zum Warschauer Pakt\", \"zur NATO\", \"zu den blockfreien Staaten\" ], \"answer\": \"zum Warschauer Pakt\", \"explanation\": \"Der Kalte Krieg war ein Geopolitischer Konflikt zwischen den westlichen Demokratien, angeführt von den USA, und den sozialistischen Staaten, angeführt von der Sowjetunion. Die DDR war Teil des Warschauer Paktes, einem Militärbündnis der sozialistischen Staaten.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 203, \"question\": \"Wie hieß das Wirtschaftssystem der DDR?\", \"options\": [ \"Marktwirtschaft\", \"Planwirtschaft\", \"Angebot und Nachfrage\", \"Kapitalismus\" ], \"answer\": \"Planwirtschaft\", \"explanation\": \"Die DDR verwaltete ihre Wirtschaft durch eine Planwirtschaft, die staatlich gelenkt und zentralisiert war. Im Gegensatz zur Marktwirtschaft, die auf Angebot und Nachfrage basiert, wird in einer Planwirtschaft alles von der Regierung kontrolliert, um bestimmte wirtschaftliche Ziele zu erreichen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 204, \"question\": \"Wie wurden die Bundesrepublik Deutschland und die DDR zu einem Staat?\", \"options\": [ \"Die Bundesrepublik hat die DDR besetzt.\", \"Die heutigen fünf östlichen Bundesländer sind der Bundesrepublik Deutschland beigetreten.\", \"Die westlichen Bundesländer sind der DDR beigetreten.\", \"Die DDR hat die Bundesrepublik Deutschland besetzt.\" ], \"answer\": \"Die heutigen fünf östlichen Bundesländer sind der Bundesrepublik Deutschland beigetreten.\", \"explanation\": \"Die Wiedervereinigung Deutschlands erfolgte am 3. Oktober 1990, als die fünf neuen Bundesländer der ehemaligen DDR der Bundesrepublik Deutschland beitraten. Diese Entscheidung war das Ergebnis von politischen Veränderungen und dem Wunsch der Menschen für Einheit und Freiheit.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 205, \"question\": \"Mit dem Beitritt der DDR zur Bundesrepublik Deutschland gehören die neuen Bundesländer nun auch …\", \"options\": [ \"zur Europäischen Union.\", \"zum Warschauer Pakt.\", \"zur OPEC.\", \"zur Europäischen Verteidigungsgemeinschaft.\" ], \"answer\": \"zur Europäischen Union.\", \"explanation\": \"Nach der Wiedervereinigung trat Deutschland als Ganzes der Europäischen Union bei, was bedeutete, dass die neuen Bundesländer auch Teil der EU wurden. Dies führte zu einer Vertiefung der wirtschaftlichen und politischen Integration mit anderen europäischen Ländern.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 206, \"question\": \"Woran erinnern die sogenannten 'Stolpersteine' in Deutschland?\", \"options\": [ \"an berühmte deutsche Politikerinnen und Politiker\", \"an die Opfer des Nationalsozialismus\", \"an Verkehrstote\", \"an bekannte jüdische Musiker\" ], \"answer\": \"an die Opfer des Nationalsozialismus\", \"explanation\": \"Die Stolpersteine sind ein Projekt zur Erinnerung an die Opfer des Nationalsozialismus. Diese kleinen Gedenktafeln werden vor den letzten Wohnorten der ermordeten Menschen verlegt und erinnern an die individuellen Schicksale, die im Zuge des Holocausts erlitten wurden.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 207, \"question\": \"In welchem Militärbündnis war die DDR Mitglied?\", \"options\": [ \"in der NATO\", \"im Rheinbund\", \"im Warschauer Pakt\", \"im Europabündnis\" ], \"answer\": \"im Warschauer Pakt\", \"explanation\": \"Die DDR war Mitglied im Warschauer Pakt, einem Militärbündnis, das 1955 gegründet wurde, um eine militärische Blockade gegen die NATO-Staaten zu bilden. Dies spiegelte die politischen Spannungen und den Einfluss der Sowjetunion während des Kalten Krieges wider.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 208, \"question\": \"Was war die 'Stasi'?\", \"options\": [ \"der Geheimdienst im 'Dritten Reich'\", \"eine berühmte deutsche Gedenkstätte\", \"der Geheimdienst der DDR\", \"ein deutscher Sportverein während des Zweiten Weltkrieges\" ], \"answer\": \"der Geheimdienst der DDR\", \"explanation\": \"Die Stasi, offiziell Ministerium für Staatssicherheit, war der Geheimdienst der DDR und spielte eine zentrale Rolle bei der Überwachung und Kontrolle der Bevölkerung. Sie war bekannt für ihre umfangreichen Spitzelnetzwerke und Methoden zur politischen Unterdrückung.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 209, \"question\": \"Welches war das Wappen der Deutschen Demokratischen Republik?\", \"options\": [\"Bild 1\", \"Bild 2\", \"Bild 3\", \"Bild 4\"], \"answer\": \"Bild 4\", \"explanation\": \"Das Wappen der DDR war ein symbolisches Zeichen, das die Ideologie und die Werte des Staates widerspiegelte. Es beinhaltete Elemente wie einen Hammer und Zirkel, die die Arbeiter- und Bauernklasse repräsentierten.\", \"state\": \"general\", \"type\": \"image\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 210, \"question\": \"Was ereignete sich am 17. Juni 1953 in der DDR?\", \"options\": [ \"der feierliche Beitritt zum Warschauer Pakt\", \"landesweite Streiks und ein Volksaufstand\", \"der 1. SED-Parteitag\", \"der erste Besuch Fidel Castros\" ], \"answer\": \"landesweite Streiks und ein Volksaufstand\", \"explanation\": \"Am 17. Juni 1953 gab es in der DDR landesweite Streiks und Proteste gegen die Regierung, die als Volksaufstand bekannt wurden. Diese Ereignisse waren Ausdruck des Unmuts der Bevölkerung über die Lebensbedingungen und die politischen Repressionen in der DDR.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-7\", \"category\": \"Europa und Internationales\" }, { \"id\": 211, \"question\": \"Welcher Politiker steht für die 'Ostverträge'?\", \"options\": [ \"Helmut Kohl\", \"Willy Brandt\", \"Michail Gorbatschow\", \"Ludwig Erhard\" ], \"answer\": \"Willy Brandt\", \"explanation\": \"Willy Brandt war der Kanzler der Bundesrepublik Deutschland von 1969 bis 1974 und bekannt für seine Politik der 'Neuen Ostpolitik'. Diese Politik zielte darauf ab, die Beziehungen zur DDR und zu anderen osteuropäischen Staaten zu verbessern und die Spannungen des Kalten Krieges zu verringern.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 212, \"question\": \"Wie heißt Deutschland mit vollem Namen?\", \"options\": [ \"Bundesstaat Deutschland\", \"Bundesländer Deutschland\", \"Bundesrepublik Deutschland\", \"Bundesbezirk Deutschland\" ], \"answer\": \"Bundesrepublik Deutschland\", \"explanation\": \"Der volle Name 'Bundesrepublik Deutschland' wurde im Grundgesetz von 1949 festgelegt und bezeichnet Deutschland als einen demokratischen Bundesstaat. Diese Bezeichnung spiegelt die föderale Struktur des Landes wider, in der 16 Bundesländer zusammenarbeiten.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 213, \"question\": \"Wie viele Einwohner hat Deutschland?\", \"options\": [\"70 Millionen\", \"78 Millionen\", \"84 Millionen\", \"90 Millionen\"], \"answer\": \"84 Millionen\", \"explanation\": \"Deutschland ist das bevölkerungsreichste Land der Europäischen Union. Die Zahl der Einwohner schwankt, aber aktuell wird die Bevölkerung auf etwa 84 Millionen geschätzt, was für politische, wirtschaftliche und soziale Planungen von Bedeutung ist.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 214, \"question\": \"Welche Farben hat die deutsche Flagge?\", \"options\": [ \"schwarz-rot-gold\", \"rot-weiß-schwarz\", \"schwarz-rot-grün\", \"schwarz-gelb-rot\" ], \"answer\": \"schwarz-rot-gold\", \"explanation\": \"Die Farben Schwarz-Rot-Gold sind symbolisch für die deutsche Einheit und Freiheit. Diese Farben haben ihre Wurzeln in der Zeit der Befreiungskriege gegen Napoleon und wurden seitdem zum Symbol der nationalen Identität Deutschlands.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 215, \"question\": \"Wer wird als 'Kanzler der Deutschen Einheit' bezeichnet?\", \"options\": [ \"Gerhard Schröder\", \"Helmut Kohl\", \"Konrad Adenauer\", \"Helmut Schmidt\" ], \"answer\": \"Helmut Kohl\", \"explanation\": \"Helmut Kohl war von 1982 bis 1998 Bundeskanzler und spielte eine entscheidende Rolle bei der Wiedervereinigung Deutschlands im Jahr 1990. Aufgrund seines Engagements für die Einheit wird er oft als 'Kanzler der Deutschen Einheit' gefeiert.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 216, \"type\": \"image\", \"question\": \"Welches Symbol ist im Plenarsaal des Deutschen Bundestages zu sehen?\", \"options\": [ \"der Bundesadler\", \"die Fahne der Stadt Berlin\", \"der Reichsadler\", \"die Reichskrone\" ], \"answer\": \"der Bundesadler\", \"explanation\": \"Der Bundesadler ist das Hoheitszeichen der Bundesrepublik Deutschland und steht für Souveränität und nationale Identität. Er hat eine lange Geschichte und ist ein bedeutendes Symbol im politischen Raum, einschließlich des Bundestags.\", \"state\": \"general\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 217, \"question\": \"In welchem Zeitraum gab es die Deutsche Demokratische Republik (DDR)?\", \"options\": [ \"1919 bis 1927\", \"1933 bis 1945\", \"1945 bis 1961\", \"1949 bis 1990\" ], \"answer\": \"1949 bis 1990\", \"explanation\": \"Die Deutsche Demokratische Republik (DDR) wurde 1949 gegründet und existierte bis zur Wiedervereinigung mit der BRD im Jahr 1990. Diese Zeit war geprägt von politischen Spannungen und einem geteilten Deutschland während des Kalten Krieges.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 218, \"question\": \"Wie viele Bundesländer kamen bei der Wiedervereinigung 1990 zur Bundesrepublik Deutschland hinzu?\", \"options\": [\"4\", \"5\", \"6\", \"7\"], \"answer\": \"5\", \"explanation\": \"Bei der Wiedervereinigung Deutschlands im Jahr 1990 schlossen sich fünf Bundesländer der ehemaligen DDR der Bundesrepublik Deutschland an. Diese Länder sind Brandenburg, Sachsen, Sachsen-Anhalt, Thüringen und Mecklenburg-Vorpommern.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 219, \"question\": \"Die Bundesrepublik Deutschland hat die Grenzen von heute seit …\", \"options\": [\"1933\", \"1949\", \"1971\", \"1990\"], \"answer\": \"1990\", \"explanation\": \"Die Bundesrepublik Deutschland hat ihre heutigen Grenzen seit der Wiedervereinigung im Jahr 1990. Davor war Deutschland geteilt in Ost- und Westdeutschland, was zu einer Vielzahl von politischen und sozialen Herausforderungen führte.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 220, \"question\": \"Der 27. Januar ist in Deutschland ein offizieller Gedenktag. Woran erinnert dieser Tag?\", \"options\": [ \"an das Ende des Zweiten Weltkrieges\", \"an die Verabschiedung des Grundgesetzes\", \"an die Wiedervereinigung Deutschlands\", \"an die Opfer des Nationalsozialismus (Tag der Befreiung des Vernichtungslagers Auschwitz)\" ], \"answer\": \"an die Opfer des Nationalsozialismus (Tag der Befreiung des Vernichtungslagers Auschwitz)\", \"explanation\": \"Der 27. Januar erinnert an die Befreiung des Konzentrationslagers Auschwitz im Jahr 1945 und ist ein wichtiger Gedenktag für die Opfer des Nationalsozialismus. An diesem Tag wird das Bewusstsein für die Verbrechen des NS-Regimes geschärft und die Verpflichtung zur Erinnerung wachgehalten.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 221, \"question\": \"Deutschland ist Mitglied des Schengener Abkommens. Was bedeutet das?\", \"options\": [ \"Deutsche können in viele Länder Europas ohne Passkontrolle reisen.\", \"Alle Menschen können ohne Personenkontrolle in Deutschland einreisen.\", \"Deutsche können ohne Passkontrolle in jedes Land reisen.\", \"Deutsche können in jedem Land mit dem Euro bezahlen.\" ], \"answer\": \"Deutsche können in viele Länder Europas ohne Passkontrolle reisen.\", \"explanation\": \"Das Schengener Abkommen erlaubt den freien Personenverkehr zwischen den Mitgliedsländern, wodurch Reisende ohne Passkontrollen an den Grenzen reisen können. Dies fördert den Handel und die Mobilität innerhalb Europas und stärkt die europäischen Beziehungen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 222, \"question\": \"Welches Land ist ein Nachbarland von Deutschland?\", \"options\": [\"Ungarn\", \"Portugal\", \"Spanien\", \"Schweiz\"], \"answer\": \"Schweiz\", \"explanation\": \"Die Schweiz ist eines der Nachbarländer Deutschlands und liegt im Süden des Landes. Geografische Nachbarn sind wichtig für wirtschaftliche und kulturelle Beziehungen, da sie den Austausch von Waren und Menschen ermöglichen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 223, \"question\": \"Welches Land ist ein Nachbarland von Deutschland?\", \"options\": [\"Rumänien\", \"Bulgarien\", \"Polen\", \"Griechenland\"], \"answer\": \"Polen\", \"explanation\": \"Polen grenzt im Osten an Deutschland und ist ein wichtiger Partner in der Europäischen Union. Die gemeinsamen Grenzen fördern die Zusammenarbeit in Handel, Kultur und Sicherheit zwischen den beiden Ländern.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 224, \"question\": \"Was bedeutet die Abkürzung EU?\", \"options\": [ \"Europäische Unternehmen\", \"Europäische Union\", \"Einheitliche Union\", \"Euro Union\" ], \"answer\": \"Europäische Union\", \"explanation\": \"Die Europäische Union (EU) ist ein politischer und wirtschaftlicher Zusammenschluss von 27 europäischen Ländern, die gemeinsam politische und wirtschaftliche Entscheidungen treffen. Die EU fördert den Frieden, die Stabilität und den Wohlstand in Europa durch Zusammenarbeit und Integration.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 225, \"question\": \"In welchem anderen Land gibt es eine große deutschsprachige Bevölkerung?\", \"options\": [\"Tschechien\", \"Norwegen\", \"Spanien\", \"Österreich\"], \"answer\": \"Österreich\", \"explanation\": \"Österreich ist nicht nur ein Nachbarland von Deutschland, sondern hat auch eine große deutschsprachige Bevölkerung. Die gemeinsame Sprache und kulturelle Ähnlichkeiten fördern enge Verbindungen zwischen den beiden Ländern.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 226, \"type\": \"image\", \"question\": \"Welche ist die Flagge der Europäischen Union?\", \"options\": [\"Bild 1\", \"Bild 2\", \"Bild 3\", \"Bild 4\"], \"answer\": \"Bild 2\", \"explanation\": \"Die Flagge der Europäischen Union zeigt einen blauen Hintergrund mit zwölf goldenen Sternen, die einen Kreis bilden. Diese Symbole stehen für Einheit und Solidarität unter den Mitgliedstaaten der EU.\", \"state\": \"general\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 227, \"question\": \"Welches Land ist ein Nachbarland von Deutschland?\", \"options\": [\"Finnland\", \"Dänemark\", \"Norwegen\", \"Schweden\"], \"answer\": \"Dänemark\", \"explanation\": \"Dänemark liegt nördlich von Deutschland und ist durch die Ostsee von Deutschland getrennt. Die enge geografische Lage erleichtert den Austausch zwischen den Ländern in Bereichen wie Handel, Umwelt und Kultur.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 228, \"question\": \"Wie wird der Beitritt der DDR zur Bundesrepublik Deutschland im Jahr 1990 allgemein genannt?\", \"options\": [ \"NATO-Osterweiterung\", \"EU-Osterweiterung\", \"Deutsche Wiedervereinigung\", \"Europäische Gemeinschaft\" ], \"answer\": \"Deutsche Wiedervereinigung\", \"explanation\": \"Die Deutsche Wiedervereinigung bezeichnet den historischen Prozess, durch den die Deutsche Demokratische Republik (DDR) im Jahr 1990 der Bundesrepublik Deutschland beitrat. Dieser Moment markiert das Ende der Teilung Deutschlands und die Rückkehr zur Einheit nach Jahrzehnten der Trennung.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 229, \"question\": \"Welches Land ist ein Nachbarland von Deutschland?\", \"options\": [\"Spanien\", \"Bulgarien\", \"Norwegen\", \"Luxemburg\"], \"answer\": \"Luxemburg\", \"explanation\": \"Luxemburg ist eines der kleineren Nachbarländer Deutschlands im Westen und Teil der Europäischen Union. Die Grenzlage begünstigt den Austausch zwischen den beiden Nationen in sozialen, wirtschaftlichen und politischen Belangen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 230, \"question\": \"Das Europäische Parlament wird regelmäßig gewählt, nämlich alle …\", \"options\": [\"5 Jahre.\", \"6 Jahre.\", \"7 Jahre.\", \"8 Jahre.\"], \"answer\": \"5 Jahre.\", \"explanation\": \"Die alle fünf Jahre stattfindenden Wahlen zum Europäischen Parlament ermöglichen es den Bürgern der EU, ihre Vertreter zu wählen, die in der Gesetzgebung der EU mitwirken. Dies ist ein grundlegender Bestandteil der demokratischen Struktur der EU und fördert die Teilnahme der Bürger am europäischen politischen Prozess.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 231, \"question\": \"Was bedeutet der Begriff 'europäische Integration'?\", \"options\": [ \"Damit sind amerikanische Einwanderinnen und Einwanderer in Europa gemeint.\", \"Der Begriff meint den Einwanderungsstopp nach Europa.\", \"Damit sind europäische Auswanderinnen und Auswanderer in den USA gemeint.\", \"Der Begriff meint den Zusammenschluss europäischer Staaten zur EU.\" ], \"answer\": \"Der Begriff meint den Zusammenschluss europäischer Staaten zur EU.\", \"explanation\": \"Der Begriff 'europäische Integration' beschreibt den Prozess, durch den europäische Länder zusammenarbeiten und politisch sowie wirtschaftlich enger verbunden werden. Dies geschieht vor allem durch die Gründung der Europäischen Union (EU), die Zusammenarbeit in verschiedenen Bereichen wie Handel, Sicherheit und Umwelt fördert.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 232, \"question\": \"Wer wird bei der Europawahl gewählt?\", \"options\": [ \"die Europäische Kommission\", \"die Länder, die in die EU eintreten dürfen\", \"die Abgeordneten des Europäischen Parlaments\", \"die europäische Verfassung\" ], \"answer\": \"die Abgeordneten des Europäischen Parlaments\", \"explanation\": \"Bei der Europawahl wählen die Bürgerinnen und Bürger der EU ihre Vertreter im Europäischen Parlament, dem legislativen Organ der EU. Diese Abgeordneten haben Einfluss auf die politische Entscheidungsfindung in Europa und vertreten die Interessen der Bürger in den EU-Institutionen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 233, \"question\": \"Welches Land ist ein Nachbarland von Deutschland?\", \"options\": [\"Tschechien\", \"Bulgarien\", \"Griechenland\", \"Portugal\"], \"answer\": \"Tschechien\", \"explanation\": \"Nachbarländer sind Staaten, die an die eigenen Grenzen angrenzen. Deutschland hat insgesamt neun Nachbarländer, zu denen auch Tschechien gehört, was eine wichtige Rolle in der europäischen Nachbarschaftspolitik spielt.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 234, \"question\": \"Wo ist ein Sitz des Europäischen Parlaments?\", \"options\": [\"London\", \"Paris\", \"Berlin\", \"Straßburg\"], \"answer\": \"Straßburg\", \"explanation\": \"Das Europäische Parlament hat mehrere Sitze, wobei Straßburg ein wichtiger Standort ist. Hier finden die regulären Plenarsitzungen statt, und die Stadt ist symbolisch für die europäische Einigung und den Frieden.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 235, \"question\": \"Der damalige französische Staatspräsident François Mitterrand und der damalige deutsche Bundeskanzler Helmut Kohl gedenken in Verdun gemeinsam der Toten beider Weltkriege. Welches Ziel der Europäischen Union wird bei diesem Treffen deutlich?\", \"options\": [ \"Freundschaft zwischen England und Deutschland\", \"Reisefreiheit in alle Länder der EU\", \"Frieden und Sicherheit in den Ländern der EU\", \"einheitliche Feiertage in den Ländern der EU\" ], \"answer\": \"Frieden und Sicherheit in den Ländern der EU\", \"explanation\": \"Diese Szene symbolisiert das zentrale Ziel der Europäischen Union, Frieden und Sicherheit in Europa zu fördern, insbesondere nach den verheerenden beiden Weltkriegen. Der Zusammenhalt und die Zusammenarbeit zwischen den Mitgliedstaaten sollen dazu beitragen, jegliche Form von Konflikten zu vermeiden.\", \"state\": \"general\", \"type\": \"image\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 236, \"question\": \"Wie viele Mitgliedstaaten hat die EU heute?\", \"options\": [\"21\", \"23\", \"25\", \"27\"], \"answer\": \"27\", \"explanation\": \"Die Europäische Union besteht derzeit aus 27 Mitgliedstaaten, die sich in einem gemeinsamen politischen und wirtschaftlichen Rahmen zusammengefunden haben. Dieser Zusammenschluss ermöglicht eine tiefere Integration und Zusammenarbeit in vielen Bereichen der Gesellschaft.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 237, \"question\": \"2007 wurde das 50-jährige Jubiläum der 'Römischen Verträge' gefeiert. Was war der Inhalt der Verträge?\", \"options\": [ \"Beitritt Deutschlands zur NATO\", \"Gründung der Europäischen Wirtschaftsgemeinschaft (EWG)\", \"Verpflichtung Deutschlands zu Reparationsleistungen\", \"Festlegung der Oder-Neiße-Linie als Ostgrenze\" ], \"answer\": \"Gründung der Europäischen Wirtschaftsgemeinschaft (EWG)\", \"explanation\": \"Die Römischen Verträge, die 1957 unterzeichnet wurden, führten zur Gründung der Europäischen Wirtschaftsgemeinschaft (EWG). Diese Vereinbarung legte den Grundstein für die spätere Entwicklung der Europäischen Union und die gemeinschaftliche wirtschaftliche Zusammenarbeit.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 238, \"question\": \"An welchen Orten arbeitet das Europäische Parlament?\", \"options\": [ \"Paris, London und Den Haag\", \"Straßburg, Luxemburg und Brüssel\", \"Rom, Bern und Wien\", \"Bonn, Zürich und Mailand\" ], \"answer\": \"Straßburg, Luxemburg und Brüssel\", \"explanation\": \"Das Europäische Parlament hat Plätze in Straßburg, wo die Plenarsitzungen stattfinden, in Brüssel, wo die Ausschüsse und die meisten Sitzungen der Abgeordneten abgehalten werden, und in Luxemburg, wo die Verwaltung sitzt. Diese Aufteilung reflektiert die multilaterale Natur der EU.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 239, \"question\": \"Durch welche Verträge schloss sich die Bundesrepublik Deutschland mit anderen Staaten zur Europäischen Wirtschaftsgemeinschaft zusammen?\", \"options\": [ \"durch die 'Hamburger Verträge'\", \"durch die 'Römischen Verträge'\", \"durch die 'Pariser Verträge'\", \"durch die 'Londoner Verträge'\" ], \"answer\": \"durch die 'Römischen Verträge'\", \"explanation\": \"Die Römischen Verträge, unterzeichnet 1957, ermöglichten Deutschland und anderen europäischen Ländern die Bildung der Europäischen Wirtschaftsgemeinschaft (EWG). Dies war ein entscheidender Schritt in Richtung europäischer Integration und der späteren Bildung der Europäischen Union.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 240, \"question\": \"Seit wann bezahlt man in Deutschland mit dem Euro in bar?\", \"options\": [\"1995\", \"1998\", \"2002\", \"2005\"], \"answer\": \"2002\", \"explanation\": \"Der Euro wurde am 1. Januar 1999 als Buchungswährung eingeführt, aber die Bargeldnutzung begann erst am 1. Januar 2002. Der Euro ersetzt damit die deutsche Mark und erleichtert den Handel und die Reisen innerhalb der Eurozone.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-8\", \"category\": \"Allgemeinwissen Deutschland\" }, { \"id\": 241, \"question\": \"Frau Seger bekommt ein Kind. Was muss sie tun, um Elterngeld zu erhalten?\", \"options\": [ \"Sie muss an ihre Krankenkasse schreiben.\", \"Sie muss einen Antrag bei der Elterngeldstelle stellen.\", \"Sie muss nichts tun, denn sie bekommt automatisch Elterngeld.\", \"Sie muss das Arbeitsamt um Erlaubnis bitten.\" ], \"answer\": \"Sie muss einen Antrag bei der Elterngeldstelle stellen.\", \"explanation\": \"Um Elterngeld zu erhalten, müssen Eltern einen Antrag stellen, da das Elterngeld nicht automatisch gewährt wird. Der Antrag muss bei der zuständigen Elterngeldstelle eingereicht werden und dient dazu, die finanzielle Unterstützung während der ersten Lebensmonate eines Kindes festzulegen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 242, \"question\": \"Wer entscheidet, ob ein Kind in Deutschland in den Kindergarten geht?\", \"options\": [ \"der Staat\", \"die Bundesländer\", \"die Eltern/die Erziehungsberechtigten\", \"die Schulen\" ], \"answer\": \"die Eltern/die Erziehungsberechtigten\", \"explanation\": \"In Deutschland haben die Eltern das Recht und die Verantwortung zu entscheiden, ob und wann ihr Kind in den Kindergarten geht. Diese Entscheidung hängt oft von den individuellen Bedürfnissen des Kindes und den örtlichen Angeboten ab.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 243, \"question\": \"Maik und Sybille wollen mit Freunden an ihrem deutschen Wohnort eine Demonstration auf der Straße abhalten. Was müssen sie vorher tun?\", \"options\": [ \"Sie müssen die Demonstration anmelden.\", \"Sie müssen nichts tun. Man darf in Deutschland jederzeit überall demonstrieren.\", \"Sie können gar nichts tun, denn Demonstrationen sind in Deutschland grundsätzlich verboten.\", \"Maik und Sybille müssen einen neuen Verein gründen, weil nur Vereine demonstrieren dürfen.\" ], \"answer\": \"Sie müssen die Demonstration anmelden.\", \"explanation\": \"In Deutschland sind Demonstrationen grundsätzlich erlaubt, aber sie müssen meist bei der zuständigen Behörde angemeldet werden. Dies dient dazu, die öffentliche Ordnung zu gewährleisten und Sicherheitsvorkehrungen zu treffen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 244, \"question\": \"Welchen Schulabschluss braucht man normalerweise, um an einer Universität in Deutschland ein Studium zu beginnen?\", \"options\": [ \"das Abitur\", \"ein Diplom\", \"die Prokura\", \"eine Gesellenprüfung\" ], \"answer\": \"das Abitur\", \"explanation\": \"Das Abitur ist der klassische Schulabschluss, der in Deutschland für den Zugang zu Universitäten erforderlich ist. Es bestätigt die allgemeine Hochschulreife und ermöglicht somit ein Studium an Hochschulen und Universitäten.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 245, \"question\": \"Wer darf in Deutschland nicht als Paar zusammenleben?\", \"options\": [ \"Hans (20 Jahre) und Marie (19 Jahre)\", \"Tom (20 Jahre) und Klaus (45 Jahre)\", \"Sofie (35 Jahre) und Lisa (40 Jahre)\", \"Anne (13 Jahre) und Tim (25 Jahre)\" ], \"answer\": \"Anne (13 Jahre) und Tim (25 Jahre)\", \"explanation\": \"In Deutschland ist das Zusammenleben von Personen, bei dem ein Partner unter 18 Jahren alt ist, in der Regel rechtlich eingeschränkt, um den Schutz von Minderjährigen zu gewährleisten. Dies betrifft insbesondere das Alter der Einwilligung und den Schutz vor Ausbeutung.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 246, \"question\": \"Ab welchem Alter ist man in Deutschland volljährig?\", \"options\": [\"16\", \"18\", \"19\", \"21\"], \"answer\": \"18\", \"explanation\": \"In Deutschland wird man mit 18 Jahren volljährig. Dies bedeutet, dass man das volle Recht auf Selbstbestimmung und Verantwortung für eigene Entscheidungen erlangt, einschließlich der Fähigkeit, Verträge zu schließen oder zu heiraten.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 247, \"question\": \"Eine Frau ist schwanger. Sie ist kurz vor und nach der Geburt ihres Kindes vom Gesetz besonders beschützt. Wie heißt dieser Schutz?\", \"options\": [ \"Elternzeit\", \"Mutterschutz\", \"Geburtsvorbereitung\", \"Wochenbett\" ], \"answer\": \"Mutterschutz\", \"explanation\": \"Mutterschutz ist ein gesetzlicher Schutz für schwangere Frauen, der ihnen während der Schwangerschaft und nach der Geburt besondere Rechte und Sicherheit am Arbeitsplatz gewährt. Dies beinhaltet meist ein Beschäftigungsverbot kurz vor und nach der Geburt, um die Gesundheit von Mutter und Kind zu schützen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 248, \"question\": \"Die Erziehung der Kinder ist in Deutschland vor allem Aufgabe …\", \"options\": [ \"des Staates.\", \"der Eltern.\", \"der Großeltern.\", \"der Schulen.\" ], \"answer\": \"der Eltern.\", \"explanation\": \"In Deutschland liegt die Hauptverantwortung für die Erziehung von Kindern bei den Eltern. Der Staat unterstützt die Familien durch verschiedene Programme und Gesetze, aber die Erziehung und Förderung der Kinder obliegt in erster Linie den Eltern.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 249, \"question\": \"Wer ist in Deutschland hauptsächlich verantwortlich für die Kindererziehung?\", \"options\": [\"der Staat\", \"die Eltern\", \"die Verwandten\", \"die Schulen\"], \"answer\": \"die Eltern\", \"explanation\": \"Die Eltern sind in Deutschland die Hauptverantwortlichen für die Erziehung ihrer Kinder. Dies ist im Grundgesetz verankert, das das elterliche Erziehungsrecht schützt und die aktive Rolle der Eltern in der Entwicklung ihrer Kinder betont.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 250, \"question\": \"In Deutschland hat man die besten Chancen auf einen gut bezahlten Arbeitsplatz, wenn man …\", \"options\": [ \"katholisch ist.\", \"gut ausgebildet ist.\", \"eine Frau ist.\", \"Mitglied einer Partei ist.\" ], \"answer\": \"gut ausgebildet ist.\", \"explanation\": \"Eine gute Ausbildung ist entscheidend für den Zugang zu gut bezahlten Arbeitsplätzen in Deutschland. Der Arbeitsmarkt verlangt oft spezifische Qualifikationen und Fähigkeiten, die durch entsprechende Bildung und Ausbildung erworben werden.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 251, \"question\": \"Wenn man in Deutschland ein Kind schlägt, …\", \"options\": [ \"geht das niemanden etwas an.\", \"geht das nur die Familie etwas an.\", \"kann man dafür nicht bestraft werden.\", \"kann man dafür bestraft werden.\" ], \"answer\": \"kann man dafür bestraft werden.\", \"explanation\": \"In Deutschland ist Gewalt gegen Kinder gesetzlich verboten. Körperliche Bestrafungen können als Misshandlung betrachtet werden und führen zu rechtlichen Konsequenzen für die Täter.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 252, \"question\": \"In Deutschland …\", \"options\": [ \"darf man zur gleichen Zeit nur mit einer Partnerin/einem Partner verheiratet sein.\", \"kann man mehrere Ehepartnerinnen/Ehepartner gleichzeitig haben.\", \"darf man nicht wieder heiraten, wenn man einmal verheiratet war.\", \"darf eine Frau nicht wieder heiraten, wenn ihr Mann gestorben ist.\" ], \"answer\": \"darf man zur gleichen Zeit nur mit einer Partnerin/einem Partner verheiratet sein.\", \"explanation\": \"In Deutschland ist die polygame Ehe, dass man mehrere Ehepartner gleichzeitig hat, rechtlich nicht anerkannt. Die Ehe wird rechtlich als exklusive Verbindung zwischen zwei Personen definiert.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 253, \"question\": \"Wo müssen Sie sich anmelden, wenn Sie in Deutschland umziehen?\", \"options\": [ \"beim Einwohnermeldeamt\", \"beim Standesamt\", \"beim Ordnungsamt\", \"beim Gewerbeamt\" ], \"answer\": \"beim Einwohnermeldeamt\", \"explanation\": \"Das Einwohnermeldeamt ist die zuständige Behörde für die Melderegister in Deutschland. Bei einem Umzug müssen Sie Ihre Adresse dort aktualisieren, um rechtsgültige Dokumente zu erhalten.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 254, \"question\": \"In Deutschland dürfen Ehepaare sich scheiden lassen. Meistens müssen sie dazu das 'Trennungsjahr' einhalten. Was bedeutet das?\", \"options\": [ \"Der Scheidungsprozess dauert ein Jahr.\", \"Die Ehegatten sind ein Jahr verheiratet, dann ist die Scheidung möglich.\", \"Das Besuchsrecht für die Kinder gilt ein Jahr.\", \"Die Ehegatten führen mindestens ein Jahr getrennt ihr eigenes Leben. Danach ist die Scheidung möglich.\" ], \"answer\": \"Die Ehegatten führen mindestens ein Jahr getrennt ihr eigenes Leben. Danach ist die Scheidung möglich.\", \"explanation\": \"Das Trennungsjahr ist eine gesetzliche Regelung, die den Ehepartnern Zeit geben soll, über die Ehe nachzudenken. Während dieses Zeitraums leben sie getrennt, bevor ein Scheidungsantrag gestellt werden kann.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 255, \"question\": \"Bei Erziehungsproblemen können Eltern in Deutschland Hilfe erhalten vom …\", \"options\": [\"Ordnungsamt.\", \"Schulamt.\", \"Jugendamt.\", \"Gesundheitsamt.\"], \"answer\": \"Jugendamt.\", \"explanation\": \"Das Jugendamt ist eine Behörde in Deutschland, die für die Belange von Kindern und Jugendlichen zuständig ist. Es bietet Unterstützung und Beratung bei Erziehungsfragen und Problemen in der Familie.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 256, \"question\": \"Ein Ehepaar möchte in Deutschland ein Restaurant eröffnen. Was braucht es dazu unbedingt?\", \"options\": [ \"eine Erlaubnis der Polizei\", \"eine Genehmigung einer Partei\", \"eine Genehmigung des Einwohnermeldeamts\", \"eine Gaststättenerlaubnis von der zuständigen Behörde\" ], \"answer\": \"eine Gaststättenerlaubnis von der zuständigen Behörde\", \"explanation\": \"In Deutschland ist für die Eröffnung eines Restaurants eine Gaststättenerlaubnis erforderlich. Diese muss bei der zuständigen Behörde beantragt werden, um sicherzustellen, dass alle gesetzlichen Anforderungen erfüllt sind.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 257, \"question\": \"Eine erwachsene Frau möchte in Deutschland das Abitur nachholen. Das kann sie an …\", \"options\": [ \"einer Hochschule.\", \"einem Abendgymnasium.\", \"einer Hauptschule.\", \"einer Privatuniversität.\" ], \"answer\": \"einem Abendgymnasium.\", \"explanation\": \"Das Abendgymnasium ist eine Bildungseinrichtung in Deutschland, die es Erwachsenen ermöglicht, das Abitur nachzuholen. Diese Schulen bieten flexible Unterrichtszeiten, die auf Berufstätige abgestimmt sind.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 258, \"question\": \"Was darf das Jugendamt in Deutschland?\", \"options\": [ \"Es entscheidet, welche Schule das Kind besucht.\", \"Es kann ein Kind, das geschlagen wird oder hungern muss, aus der Familie nehmen.\", \"Es bezahlt das Kindergeld an die Eltern.\", \"Es kontrolliert, ob das Kind einen Kindergarten besucht.\" ], \"answer\": \"Es kann ein Kind, das geschlagen wird oder hungern muss, aus der Familie nehmen.\", \"explanation\": \"Das Jugendamt hat die Aufgabe, das Wohl von Kindern zu schützen. Wenn Kindeswohlgefährdungen festgestellt werden, kann es Maßnahmen ergreifen, um Kinder zu schützen, einschließlich der vorübergehenden Unterbringung in Pflegefamilien.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 259, \"question\": \"Das Berufsinformationszentrum BIZ bei der Bundesagentur für Arbeit in Deutschland hilft bei der …\", \"options\": [ \"Rentenberechnung.\", \"Lehrstellensuche.\", \"Steuererklärung.\", \"Krankenversicherung.\" ], \"answer\": \"Lehrstellensuche.\", \"explanation\": \"Das Berufsinformationszentrum (BIZ) bietet umfassende Informationen und Beratung zu Berufsmöglichkeiten, Ausbildungsplätzen und Weiterbildungsangeboten. Es ist eine wichtige Anlaufstelle für Arbeitssuchende und Jugendliche.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 260, \"question\": \"In Deutschland hat ein Kind in der Schule …\", \"options\": [ \"Recht auf unbegrenzte Freizeit.\", \"Wahlfreiheit für alle Fächer.\", \"Anspruch auf Schulgeld.\", \"Anwesenheitspflicht.\" ], \"answer\": \"Anwesenheitspflicht.\", \"explanation\": \"In Deutschland besteht für Kinder eine Schulpflicht, die bedeutet, dass Kinder in der Schule anwesend sein müssen. Diese Regelung dient dazu, eine grundlegende Bildung für jedes Kind sicherzustellen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 261, \"question\": \"Ein Mann möchte mit 30 Jahren in Deutschland sein Abitur nachholen. Wo kann er das tun? An …\", \"options\": [ \"einer Hochschule.\", \"einem Abendgymnasium.\", \"einer Hauptschule.\", \"einer Privatuniversität.\" ], \"answer\": \"einem Abendgymnasium.\", \"explanation\": \"Das Abendgymnasium ist eine Bildungseinrichtung, die es Erwachsenen ermöglicht, ihr Abitur nachzuholen. Es richtet sich insbesondere an Berufstätige und Personen, die ihre Schulbildung verbessern möchten.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 262, \"question\": \"Was bedeutet in Deutschland der Grundsatz der Gleichbehandlung?\", \"options\": [ \"Niemand darf z.B. wegen einer Behinderung benachteiligt werden.\", \"Man darf andere Personen benachteiligen, wenn ausreichende persönliche Gründe hierfür vorliegen.\", \"Niemand darf gegen Personen klagen, wenn sie benachteiligt wurden.\", \"Es ist für alle Gesetz, benachteiligten Gruppen jährlich Geld zu spenden.\" ], \"answer\": \"Niemand darf z.B. wegen einer Behinderung benachteiligt werden.\", \"explanation\": \"Der Grundsatz der Gleichbehandlung ist ein fundamentales Prinzip im deutschen Recht, das Diskriminierung vorbeugen soll. Er stellt sicher, dass jeder Mensch unabhängig von Geschlecht, Herkunft, Behinderung oder anderen Merkmalen die gleichen Rechte hat.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 263, \"question\": \"In Deutschland sind Jugendliche ab 14 Jahren strafmündig. Das bedeutet: Jugendliche, die 14 Jahre und älter sind und gegen Strafgesetze verstoßen, …\", \"options\": [ \"werden bestraft.\", \"werden wie Erwachsene behandelt.\", \"teilen die Strafe mit ihren Eltern.\", \"werden nicht bestraft.\" ], \"answer\": \"werden bestraft.\", \"explanation\": \"Die Strafmündigkeit besagt, dass Jugendliche ab einem bestimmten Alter, in Deutschland ab 14 Jahren, für ihre Taten verantwortlich sind. Dies bedeutet, dass sie bei Gesetzesverstößen auch bestraft werden können, allerdings häufig nach anderen rechtlichen Standards als Erwachsene.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 264, \"question\": \"Zu welchem Fest tragen Menschen in Deutschland bunte Kostüme und Masken?\", \"options\": [ \"am Rosenmontag\", \"am Maifeiertag\", \"beim Oktoberfest\", \"an Pfingsten\" ], \"answer\": \"am Rosenmontag\", \"explanation\": \"Der Rosenmontag ist Teil der Karnevalszeit in Deutschland, die mit bunten Umzügen und Kostümpartys gefeiert wird. Viele Menschen verkleiden sich und nehmen aktiv an den Festlichkeiten teil, die in verschiedenen Regionen des Landes unterschiedlich gefeiert werden.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 265, \"question\": \"Wohin muss man in Deutschland zuerst gehen, wenn man heiraten möchte?\", \"options\": [ \"zum Einwohnermeldeamt\", \"zum Ordnungsamt\", \"zur Agentur für Arbeit\", \"zum Standesamt\" ], \"answer\": \"zum Standesamt\", \"explanation\": \"Das Standesamt ist die Behörde, die für die offizielle Registrierung von Eheschließungen in Deutschland zuständig ist. Paare müssen hier ihre Heiratsanmeldung einreichen und die Ehe wird rechtlich anerkannt.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 266, \"question\": \"Wann beginnt die gesetzliche Nachtruhe in Deutschland?\", \"options\": [ \"wenn die Sonne untergeht\", \"wenn die Nachbarn schlafen gehen\", \"um 0 Uhr, Mitternacht\", \"um 22 Uhr\" ], \"answer\": \"um 22 Uhr\", \"explanation\": \"Die gesetzliche Nachtruhe regelt die Zeiten, in denen Lärm, der andere stören könnte, zu vermeiden ist. In Deutschland beginnt diese Regelung oft um 22 Uhr, um den Anwohnern eine ruhige Nacht zu garantieren.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 267, \"question\": \"Eine junge Frau in Deutschland, 22 Jahre alt, lebt mit ihrem Freund zusammen. Die Eltern der Frau finden das nicht gut, weil ihnen der Freund nicht gefällt. Was können die Eltern tun?\", \"options\": [ \"Sie müssen die Entscheidung der volljährigen Tochter respektieren.\", \"Sie haben das Recht, die Tochter in die elterliche Wohnung zurückzuholen.\", \"Sie können zur Polizei gehen und die Tochter anzeigen.\", \"Sie suchen einen anderen Mann für die Tochter.\" ], \"answer\": \"Sie müssen die Entscheidung der volljährigen Tochter respektieren.\", \"explanation\": \"In Deutschland sind Personen ab 18 Jahren voll geschäftsfähig. Das bedeutet, dass sie das Recht haben, eigene Entscheidungen über ihr Leben, einschließlich ihrer Beziehungen, zu treffen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 268, \"question\": \"Eine junge Frau will den Führerschein machen. Sie hat Angst vor der Prüfung, weil ihre Muttersprache nicht Deutsch ist. Was ist richtig?\", \"options\": [ \"Sie muss mindestens zehn Jahre in Deutschland leben, bevor sie den Führerschein machen kann.\", \"Wenn sie kein Deutsch kann, darf sie keinen Führerschein haben.\", \"Sie muss den Führerschein in dem Land machen, in dem man ihre Sprache spricht.\", \"Sie kann die Theorie-Prüfung vielleicht in ihrer Muttersprache machen. Es gibt mehr als zehn Sprachen zur Auswahl.\" ], \"answer\": \"Sie kann die Theorie-Prüfung vielleicht in ihrer Muttersprache machen. Es gibt mehr als zehn Sprachen zur Auswahl.\", \"explanation\": \"In Deutschland haben viele Führerscheinstellen die Möglichkeit, die Theorieprüfung in verschiedenen Sprachen anzubieten. Das hilft nicht-deutschen Muttersprachlern, die Prüfung in einer Sprache abzulegen, die sie gut verstehen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 269, \"question\": \"In Deutschland haben Kinder ab dem Alter von drei Jahren bis zur Ersteinschulung einen Anspruch auf …\", \"options\": [ \"monatliches Taschengeld.\", \"einen Platz in einem Sportverein.\", \"einen Kindergartenplatz.\", \"einen Ferienpass.\" ], \"answer\": \"einen Kindergartenplatz.\", \"explanation\": \"Der Anspruch auf einen Kindergartenplatz ist Teil des Rechts auf frühkindliche Bildung in Deutschland. Dies gewährleistet, dass Kinder Zugang zu Bildungsangeboten haben, bevor sie in die Schule kommen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 270, \"question\": \"Die Volkshochschule in Deutschland ist eine Einrichtung …\", \"options\": [ \"für den Religionsunterricht.\", \"nur für Jugendliche.\", \"zur Weiterbildung.\", \"nur für Rentnerinnen und Rentner.\" ], \"answer\": \"zur Weiterbildung.\", \"explanation\": \"Die Volkshochschule (VHS) ist eine Bildungseinrichtung, die Erwachsenen die Möglichkeit bietet, sich in unterschiedlichen Bereichen weiterzubilden. Sie bietet Kurse zu vielen Themen an, von Sprachen über Kunst bis hin zu beruflicher Weiterbildung.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-9\", \"category\": \"Föderalismus und Länder\" }, { \"id\": 271, \"question\": \"Was ist in Deutschland ein Brauch zu Weihnachten?\", \"options\": [ \"bunte Eier verstecken\", \"einen Tannenbaum schmücken\", \"sich mit Masken und Kostümen verkleiden\", \"Kürbisse vor die Tür stellen\" ], \"answer\": \"einen Tannenbaum schmücken\", \"explanation\": \"In Deutschland ist der Brauch des Weihnachtsbaum Schmückens eine tief verwurzelte Tradition, die oft mit Familientreffen und festlichen Feierlichkeiten verbunden ist. Der Weihnachtsbaum wird typischerweise am Heiligabend aufgestellt und geschmückt, was Teil der adventlichen Vorbereitungen ist.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 272, \"question\": \"Welche Lebensform ist in Deutschland nicht erlaubt?\", \"options\": [ \"Mann und Frau sind geschieden und leben mit neuen Partnern zusammen.\", \"Zwei Frauen leben zusammen.\", \"Ein alleinerziehender Vater lebt mit seinen zwei Kindern zusammen.\", \"Ein Mann ist mit zwei Frauen zur selben Zeit verheiratet.\" ], \"answer\": \"Ein Mann ist mit zwei Frauen zur selben Zeit verheiratet.\", \"explanation\": \"In Deutschland ist die Ehe gesetzlich auf eine Verbindung zwischen zwei Personen beschränkt. Polygamie, also die Eheschließung mit mehreren Partnern zur gleichen Zeit, ist rechtlich nicht anerkannt und somit illegal.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 273, \"question\": \"Bei Erziehungsproblemen gehen Sie in Deutschland …\", \"options\": [ \"zur Ärztin/zum Arzt.\", \"zum Gesundheitsamt.\", \"zum Einwohnermeldeamt.\", \"zum Jugendamt.\" ], \"answer\": \"zum Jugendamt.\", \"explanation\": \"Das Jugendamt ist eine staatliche Institution, die in Deutschland für die Aufsicht über das Wohlergehen von Kindern und Jugendlichen zuständig ist. Bei Erziehungsproblemen stehen Fachkräfte des Jugendamtes Eltern und Familien beratend zur Seite.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 274, \"question\": \"Sie haben in Deutschland absichtlich einen Brief geöffnet, der an eine andere Person adressiert ist. Was haben Sie nicht beachtet?\", \"options\": [ \"das Schweigerecht\", \"das Briefgeheimnis\", \"die Schweigepflicht\", \"die Meinungsfreiheit\" ], \"answer\": \"das Briefgeheimnis\", \"explanation\": \"Das Briefgeheimnis ist ein im Grundgesetz verankertes Recht, das den Schutz persönlicher Korrespondenz garantiert. Es stellt sicher, dass Briefe nicht ohne Zustimmung des Absenders oder Empfängers geöffnet oder gelesen werden dürfen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 275, \"question\": \"Was braucht man in Deutschland für eine Ehescheidung?\", \"options\": [ \"die Einwilligung der Eltern\", \"ein Attest einer Ärztin/eines Arztes\", \"die Einwilligung der Kinder\", \"die Unterstützung einer Anwältin/eines Anwalts\" ], \"answer\": \"die Unterstützung einer Anwältin/eines Anwalts\", \"explanation\": \"In Deutschland ist eine Ehescheidung ein rechtlicher Prozess, der meist die Unterstützung eines Anwalts erfordert. Der Anwalt hilft dabei, die notwendigen Dokumente einzureichen und rechtliche Fragen zu klären.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 276, \"question\": \"Was sollten Sie tun, wenn Sie von Ihrer Ansprechpartnerin/Ihrem Ansprechpartner in einer deutschen Behörde schlecht behandelt werden?\", \"options\": [ \"Ich kann nichts tun.\", \"Ich muss mir diese Behandlung gefallen lassen.\", \"Ich drohe der Person.\", \"Ich kann mich bei der Behördenleiterin/beim Behördenleiter beschweren.\" ], \"answer\": \"Ich kann mich bei der Behördenleiterin/beim Behördenleiter beschweren.\", \"explanation\": \"In Deutschland haben Bürger das Recht, sich über eine unangemessene Behandlung in Behörden zu beschweren. Es gibt formale Wege, um dies zu tun, und die Verantwortung der Behörden umfasst die Gewährleistung einer respektvollen Behandlung aller Bürger.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 277, \"question\": \"Eine Frau, die ein zweijähriges Kind hat, bewirbt sich in Deutschland um eine Stelle. Was ist ein Beispiel für Diskriminierung? Sie bekommt die Stelle nur deshalb nicht, weil sie …\", \"options\": [ \"kein Englisch spricht.\", \"zu hohe Gehaltsvorstellungen hat.\", \"keine Erfahrungen in diesem Beruf hat.\", \"Mutter ist.\" ], \"answer\": \"Mutter ist.\", \"explanation\": \"Diskriminierung aufgrund des Geschlechts oder von Familienstand ist in Deutschland rechtlich verboten. Wenn eine Mutter wegen ihrer elterlichen Verantwortung benachteiligt wird, verstößt dies gegen das Antidiskriminierungsgesetz.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 278, \"question\": \"Ein Mann im Rollstuhl hat sich auf eine Stelle als Buchhalter beworben. Was ist ein Beispiel für Diskriminierung? Er bekommt die Stelle nur deshalb nicht, weil er …\", \"options\": [ \"im Rollstuhl sitzt.\", \"keine Erfahrung hat.\", \"zu hohe Gehaltsvorstellungen hat.\", \"kein Englisch spricht.\" ], \"answer\": \"im Rollstuhl sitzt.\", \"explanation\": \"In Deutschland gibt es Gesetze, die Menschen mit Behinderungen vor Diskriminierung schützen. Eine Ablehnung aufgrund von Körperbehinderung ist ein klarer Fall von Diskriminierung und verstößt gegen das allgemeine Gleichbehandlungsgesetz.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 279, \"question\": \"In den meisten Mietshäusern in Deutschland gibt es eine 'Hausordnung'. Was steht in einer solchen 'Hausordnung'? Sie nennt …\", \"options\": [ \"Regeln für die Benutzung öffentlicher Verkehrsmittel.\", \"alle Mieterinnen und Mieter im Haus.\", \"Regeln, an die sich alle Bewohnerinnen und Bewohner halten müssen.\", \"die Adresse des nächsten Ordnungsamtes.\" ], \"answer\": \"Regeln, an die sich alle Bewohnerinnen und Bewohner halten müssen.\", \"explanation\": \"Eine Hausordnung dient der Regelung von Verhaltensweisen innerhalb eines Mietshauses und fördert das harmonische Zusammenleben der Bewohner. Sie legt fest, wie z. B. Ruhezeiten oder die Nutzung gemeinschaftlicher Räume geregelt sind.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 280, \"question\": \"Wenn Sie sich in Deutschland gegen einen falschen Steuerbescheid wehren wollen, müssen Sie …\", \"options\": [ \"nichts machen.\", \"den Bescheid wegwerfen.\", \"Einspruch einlegen.\", \"warten, bis ein anderer Bescheid kommt.\" ], \"answer\": \"Einspruch einlegen.\", \"explanation\": \"In Deutschland haben Bürger das Recht, gegen einen Steuerbescheid Einspruch einzulegen, wenn sie mit der Entscheidung nicht einverstanden sind. Dieser Einspruch muss innerhalb einer bestimmten Frist erfolgen, die in dem Bescheid angegeben ist.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 281, \"question\": \"Zwei Freunde wollen in ein öffentliches Schwimmbad in Deutschland. Beide haben eine dunkle Hautfarbe und werden deshalb nicht hineingelassen. Welches Recht wird in dieser Situation verletzt? Das Recht auf …\", \"options\": [ \"Meinungsfreiheit\", \"Gleichbehandlung\", \"Versammlungsfreiheit\", \"Freizügigkeit\" ], \"answer\": \"Gleichbehandlung\", \"explanation\": \"In Deutschland garantiert das Grundgesetz die Gleichbehandlung aller Menschen, unabhängig von ihrer Hautfarbe oder Herkunft. Diese Frage beleuchtet die rechtlichen Grundlagen gegen Diskriminierung und wie wichtig es ist, dass jeder Zugang zu öffentlichen Einrichtungen hat.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 282, \"question\": \"Welches Ehrenamt müssen deutsche Staatsbürgerinnen und Staatsbürger übernehmen, wenn sie dazu aufgefordert werden?\", \"options\": [ \"Vereinstrainerin/Vereinstrainer\", \"Wahlhelferin/Wahlhelfer\", \"Bibliotheksaufsicht\", \"Lehrerin/Lehrer\" ], \"answer\": \"Wahlhelferin/Wahlhelfer\", \"explanation\": \"Das Ehrenamt als Wahlhelfer dient dazu, die ordnungsgemäße Durchführung von Wahlen zu gewährleisten. In Deutschland sind Bürgerinnen und Bürger rechtlich verpflichtet, dieses Ehrenamt anzunehmen, wenn sie dazu aufgefordert werden, um die Demokratie zu unterstützen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 283, \"question\": \"Was tun Sie, wenn Sie eine falsche Rechnung von einer deutschen Behörde bekommen?\", \"options\": [ \"Ich lasse die Rechnung liegen.\", \"Ich lege Widerspruch bei der Behörde ein.\", \"Ich schicke die Rechnung an die Behörde zurück.\", \"Ich gehe mit der Rechnung zum Finanzamt.\" ], \"answer\": \"Ich lege Widerspruch bei der Behörde ein.\", \"explanation\": \"In Deutschland haben Bürgerinnen und Bürger das Recht, Widerspruch gegen Verwaltungsakte einzulegen, wenn sie mit einer Entscheidung nicht einverstanden sind. Dieser Prozess schützt die Rechte der Bürger und sorgt dafür, dass fehlerhafte Entscheidungen korrigiert werden können.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 284, \"question\": \"Was man für die Arbeit können muss, ändert sich in Zukunft sehr schnell. Was kann man tun?\", \"options\": [ \"Es ist egal, was man lernt.\", \"Erwachsene müssen auch nach der Ausbildung immer weiter lernen.\", \"Kinder lernen in der Schule alles, was im Beruf wichtig ist. Nach der Schule muss man nicht weiter lernen.\", \"Alle müssen früher aufhören zu arbeiten, weil sich alles ändert.\" ], \"answer\": \"Erwachsene müssen auch nach der Ausbildung immer weiter lernen.\", \"explanation\": \"Lebenslanges Lernen ist ein wichtiges Konzept in der heutigen Arbeitswelt, da sich Technologien und Anforderungen ständig ändern. Erwachsene sind weiterhin gefordert, sich fortzubilden, um ihre Qualifikationen aktuell zu halten und flexibel auf Veränderungen reagieren zu können.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 285, \"question\": \"Frau Frost arbeitet als fest angestellte Mitarbeiterin in einem Büro. Was muss sie nicht von ihrem Gehalt bezahlen?\", \"options\": [ \"Lohnsteuer\", \"Beiträge zur Arbeitslosenversicherung\", \"Beiträge zur Renten- und Krankenversicherung\", \"Umsatzsteuer\" ], \"answer\": \"Umsatzsteuer\", \"explanation\": \"Die Umsatzsteuer ist eine Verbrauchsteuer, die beim Kauf von Waren oder Dienstleistungen anfällt, nicht aber direkt von den Gehältern der Arbeitnehmer abgezogen wird. Lohnsteuer und Sozialversicherungsbeiträge hingegen werden vom Arbeitgeber direkt einbehalten und an die entsprechenden Stellen abgeführt.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 286, \"question\": \"Welche Organisation in einer Firma hilft den Arbeitnehmerinnen und Arbeitnehmern bei Problemen mit der Arbeitgeberin/dem Arbeitgeber?\", \"options\": [ \"der Betriebsrat\", \"die Betriebsprüferin/der Betriebsprüfer\", \"die Betriebsgruppe\", \"das Betriebsmanagement\" ], \"answer\": \"der Betriebsrat\", \"explanation\": \"Der Betriebsrat ist ein Gremium, das die Interessen der Beschäftigten innerhalb eines Unternehmens vertritt. Er spielt eine wichtige Rolle bei der Mitbestimmung und Unterstützung der Arbeitnehmer, beispielsweise bei Konflikten mit der Geschäftsführung.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 287, \"question\": \"Sie möchten bei einer Firma in Deutschland ihr Arbeitsverhältnis beenden. Was müssen Sie beachten?\", \"options\": [ \"die Gehaltszahlungen\", \"die Arbeitszeit\", \"die Kündigungsfrist\", \"die Versicherungspflicht\" ], \"answer\": \"die Kündigungsfrist\", \"explanation\": \"Die Kündigungsfrist ist der Zeitraum, den man einhalten muss, bevor das Arbeitsverhältnis offiziell endet. In Deutschland sind diese Fristen gesetzlich geregelt und variieren je nach Dauer der Betriebszugehörigkeit, um einen ordentlichen Übergang zu gewährleisten.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 288, \"question\": \"Woraus begründet sich Deutschlands besondere Verantwortung für Israel?\", \"options\": [ \"aus der Mitgliedschaft in der Europäischen Union (EU)\", \"aus den nationalsozialistischen Verbrechen gegen Juden\", \"aus dem Grundgesetz der Bundesrepublik Deutschland\", \"aus der christlichen Tradition\" ], \"answer\": \"aus den nationalsozialistischen Verbrechen gegen Juden\", \"explanation\": \"Die besondere Verantwortung Deutschlands für Israel ist historisch auf die Verbrechen des Nationalsozialismus zurückzuführen, die zu enormem Leid und zur Vernichtung jüdischer Gemeinden führten. Diese Verantwortung prägt nicht nur die deutsche Außenpolitik, sondern auch das gesellschaftliche Bewusstsein in Deutschland.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 289, \"question\": \"Ein Mann mit dunkler Hautfarbe bewirbt sich um eine Stelle als Kellner in einem Restaurant in Deutschland. Was ist ein Beispiel für Diskriminierung? Er bekommt die Stelle nur deshalb nicht, weil …\", \"options\": [ \"seine Deutschkenntnisse zu gering sind.\", \"er zu hohe Gehaltsvorstellungen hat.\", \"er eine dunkle Haut hat.\", \"er keine Erfahrungen im Beruf hat.\" ], \"answer\": \"er eine dunkle Haut hat.\", \"explanation\": \"Diskriminierung bezeichnet die ungleiche Behandlung von Personen aufgrund bestimmter Merkmale, wie zum Beispiel Hautfarbe. Dieses Beispiel zeigt, wie wichtig Antidiskriminierungsgesetze sind, um Chancengleichheit auf dem Arbeitsmarkt zu gewährleisten.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 290, \"question\": \"Sie haben in Deutschland einen Fernseher gekauft. Zu Hause packen Sie den Fernseher aus, doch er funktioniert nicht. Der Fernseher ist kaputt. Was können Sie machen?\", \"options\": [ \"eine Anzeige schreiben\", \"den Fernseher reklamieren\", \"das Gerät ungefragt austauschen\", \"die Garantie verlängern\" ], \"answer\": \"den Fernseher reklamieren\", \"explanation\": \"In Deutschland haben Käufer das Recht, mangelhafte Waren zu reklamieren und Ersatz oder Reparatur zu fordern. Dieses Verbraucherrecht schützt die Käufer und stellt sicher, dass sie für fehlerhafte Produkte nicht auf den Kosten sitzen bleiben.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 291, \"question\": \"Warum muss man in Deutschland bei der Steuererklärung aufschreiben, ob man zu einer Kirche gehört oder nicht? Weil …\", \"options\": [ \"es eine Kirchensteuer gibt, die an die Einkommen- und Lohnsteuer geknüpft ist.\", \"das für die Statistik in Deutschland wichtig ist.\", \"man mehr Steuern zahlen muss, wenn man nicht zu einer Kirche gehört.\", \"die Kirche für die Steuererklärung verantwortlich ist.\" ], \"answer\": \"es eine Kirchensteuer gibt, die an die Einkommen- und Lohnsteuer geknüpft ist.\", \"explanation\": \"In Deutschland erheben viele Bundesländer eine Kirchensteuer, die von den Mitgliedern der Kirchen gezahlt wird. Diese Steuer wird automatisch von der Lohn- oder Einkommensteuer abgezogen, weshalb es für das Finanzamt wichtig ist, die Religionszugehörigkeit anzugeben.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 292, \"question\": \"Die Menschen in Deutschland leben nach dem Grundsatz der religiösen Toleranz. Was bedeutet das?\", \"options\": [ \"Es dürfen keine Moscheen gebaut werden.\", \"Alle Menschen glauben an Gott.\", \"Jeder kann glauben, was er möchte.\", \"Der Staat entscheidet, an welchen Gott die Menschen glauben.\" ], \"answer\": \"Jeder kann glauben, was er möchte.\", \"explanation\": \"Religiöse Toleranz bedeutet, dass jeder Mensch das Recht hat, seine eigene Religion oder Weltanschauung zu wählen und zu praktizieren. In Deutschland ist die Religionsfreiheit im Grundgesetz verankert, was bedeutet, dass der Staat niemanden aufgrund seines Glaubens diskriminieren darf.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 293, \"question\": \"Was ist in Deutschland ein Brauch zu Ostern?\", \"options\": [ \"Kürbisse vor die Tür stellen\", \"einen Tannenbaum schmücken\", \"Eier bemalen\", \"Raketen in die Luft schießen\" ], \"answer\": \"Eier bemalen\", \"explanation\": \"Das Bemalen von Eiern zu Ostern ist ein traditioneller Brauch, der die Fruchtbarkeit und das neue Leben symbolisieren soll. Diese Tradition ist in vielen Kulturen verbreitet und wurde im Christentum mit der Auferstehung Jesu verknüpft.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 294, \"question\": \"Pfingsten ist ein …\", \"options\": [ \"christlicher Feiertag.\", \"deutscher Gedenktag.\", \"internationaler Trauertag.\", \"bayerischer Brauch.\" ], \"answer\": \"christlicher Feiertag.\", \"explanation\": \"Pfingsten ist einer der bedeutendsten Feiertage im Christentum, der 50 Tage nach Ostern gefeiert wird. Er erinnert an die Herabkunft des Heiligen Geistes und gilt als Geburtstag der Kirche, da die Jünger Jesu nach diesem Ereignis begannen, zu predigen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 295, \"question\": \"Welche Religion hat die europäische und deutsche Kultur geprägt?\", \"options\": [ \"der Hinduismus\", \"das Christentum\", \"der Buddhismus\", \"der Islam\" ], \"answer\": \"das Christentum\", \"explanation\": \"Das Christentum hat eine zentrale Rolle in der Entwicklung der europäischen und speziell der deutschen Kultur gespielt. Die Werte und Traditionen des Christentums beeinflussten die Kunst, die Bildung, die Rechtsordnung und viele gesellschaftliche Normen.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 296, \"question\": \"In Deutschland nennt man die letzten vier Wochen vor Weihnachten …\", \"options\": [ \"den Buß- und Bettag.\", \"das Erntedankfest.\", \"die Adventszeit.\", \"Allerheiligen.\" ], \"answer\": \"die Adventszeit.\", \"explanation\": \"Die Adventszeit ist die Zeit der Vorbereitung auf Weihnachten und umfasst die vier Sonntage vor dem 25. Dezember. Sie symbolisiert das Warten auf die Geburt Jesu und ist geprägt von verschiedenen Traditionen wie Adventskalendern und Adventskranz.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 297, \"question\": \"Aus welchem Land sind die meisten Migrantinnen und Migranten nach Deutschland gekommen?\", \"options\": [\"Italien\", \"Polen\", \"Marokko\", \"Türkei\"], \"answer\": \"Türkei\", \"explanation\": \"Die Migration aus der Türkei nach Deutschland begann in den 1960er Jahren, als viele türkishce Arbeiter aufgrund des Arbeitskräftemangels in Deutschland angeworben wurden. Diese Gastarbeiter haben entscheidend zur wirtschaftlichen Entwicklung Deutschlands beigetragen und es gibt bis heute eine große türkische Gemeinschaft in Deutschland.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 298, \"question\": \"In der DDR lebten vor allem Migrantinnen und Migranten aus …\", \"options\": [ \"Vietnam, Polen, Mosambik.\", \"Frankreich, Rumänien, Somalia.\", \"Chile, Ungarn, Simbabwe.\", \"Nordkorea, Mexiko, Ägypten.\" ], \"answer\": \"Vietnam, Polen, Mosambik.\", \"explanation\": \"In der Deutschen Demokratischen Republik (DDR) wurden Menschen aus Ländern wie Vietnam und Polen als Arbeitskräfte angeworben. Diese Migranten trugen zum Aufbau der sozialistischen Wirtschaft bei und viele sind bis heute in Deutschland geblieben.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 299, \"question\": \"Ausländische Arbeitnehmerinnen und Arbeitnehmer, die in den 50er und 60er Jahren von der Bundesrepublik Deutschland angeworben wurden, nannte man …\", \"options\": [ \"Schwarzarbeiterinnen/Schwarzarbeiter.\", \"Gastarbeiterinnen/Gastarbeiter.\", \"Zeitarbeiterinnen/Zeitarbeiter.\", \"Schichtarbeiterinnen/Schichtarbeiter.\" ], \"answer\": \"Gastarbeiterinnen/Gastarbeiter.\", \"explanation\": \"Der Begriff \\\"Gastarbeiter\\\" bezieht sich auf ausländische Arbeitskräfte, die kurzfristig zur Unterstützung des Arbeitsmarktes in Deutschland angeworben wurden. Dieser Program war ein wesentlicher Teil des Wirtschaftswunders in den Nachkriegsjahren.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 300, \"question\": \"Aus welchem Land kamen die ersten Gastarbeiterinnen und Gastarbeiter in die Bundesrepublik Deutschland?\", \"options\": [\"Italien\", \"Spanien\", \"Portugal\", \"Türkei\"], \"answer\": \"Italien\", \"explanation\": \"Die ersten Gastarbeiter in der Bundesrepublik Deutschland stammten hauptsächlich aus Italien. In den frühen 1960er Jahren wurde ein Anwerbeabkommen geschlossen, um den Bedarf an Arbeitskräften zu decken, was zur bedeutenden italienischen Migrantengemeinschaft in Deutschland führte.\", \"state\": \"general\", \"type\": \"text\", \"setName\": \"set-10\", \"category\": \"Integration und Zusammenleben\" }, { \"id\": 301, \"question\": \"Welches Wappen gehört zum Bundesland Baden-Württemberg?\", \"options\": [\"Bild 1\", \"Bild 2\", \"Bild 3\", \"Bild 4\"], \"answer\": \"Bild 1\", \"explanation\": \"Das Wappen von Baden-Württemberg zeigt das Wappen der Grafen von Verden, das einen Löwen und ein Reh enthält. Wappen sind bedeutende Symbole für Regionen und drücken oft historische Zugehörigkeiten oder lokale Identitäten aus.\", \"state\": \"BW\", \"type\": \"image\", \"setName\": \"Baden-Württemberg\", \"category\": \"Baden-Württemberg\" }, { \"id\": 302, \"question\": \"Welches ist ein Landkreis in Baden-Württemberg?\", \"options\": [ \"Mecklenburgische Seenplatte\", \"Neckar-Odenwald-Kreis\", \"Nordfriesland\", \"Altötting\" ], \"answer\": \"Neckar-Odenwald-Kreis\", \"explanation\": \"Landkreise sind wichtige Verwaltungseinheiten in Deutschland, die für die lokale Selbstverwaltung zuständig sind. Der Neckar-Odenwald-Kreis ist ein Landkreis in Baden-Württemberg, der zur regionalen Struktur des Bundeslandes beiträgt.\", \"state\": \"BW\", \"type\": \"text\", \"setName\": \"Baden-Württemberg\", \"category\": \"Baden-Württemberg\" }, { \"id\": 303, \"question\": \"Für wie viele Jahre wird der Landtag in Baden-Württemberg gewählt?\", \"options\": [\"3\", \"4\", \"5\", \"6\"], \"answer\": \"5\", \"explanation\": \"Der Landtag ist das Parlament eines Bundeslandes und wird in Deutschland alle fünf Jahre gewählt. Diese Wahlperiode ermöglicht es den gewählten Vertretern, ihre politischen Programme umzusetzen und Gesetze zu erlassen.\", \"state\": \"BW\", \"type\": \"text\", \"setName\": \"Baden-Württemberg\", \"category\": \"Baden-Württemberg\" }, { \"id\": 304, \"question\": \"Ab welchem Alter darf man in Baden-Württemberg bei Kommunalwahlen wählen?\", \"options\": [\"14\", \"16\", \"18\", \"20\"], \"answer\": \"16\", \"explanation\": \"In Baden-Württemberg dürfen Jugendliche ab 16 Jahren an Kommunalwahlen teilnehmen. Dies fördert die politische Mitbestimmung und das Engagement der Jugend in den politischen Prozessen auf lokaler Ebene.\", \"state\": \"BW\", \"type\": \"text\", \"setName\": \"Baden-Württemberg\", \"category\": \"Baden-Württemberg\" }, { \"id\": 305, \"question\": \"Welche Farben hat die Landesflagge von Baden-Württemberg?\", \"options\": [\"blau-weiß-rot\", \"schwarz-gold\", \"weiß-blau\", \"grün-weiß-rot\"], \"answer\": \"schwarz-gold\", \"explanation\": \"Die Farben schwarz und gold sind traditionelle Farben deutscher Länder und begleiten auch die Flagge von Baden-Württemberg. Diese Farben symbolisieren Stärke und den historischen Hintergrund des Bundeslandes.\", \"state\": \"BW\", \"type\": \"text\", \"setName\": \"Baden-Württemberg\", \"category\": \"Baden-Württemberg\" }, { \"id\": 306, \"question\": \"Wo können Sie sich in Baden-Württemberg über politische Themen informieren?\", \"options\": [ \"beim Ordnungsamt der Gemeinde\", \"bei der Verbraucherzentrale\", \"bei der Landeszentrale für politische Bildung\", \"bei den Kirchen\" ], \"answer\": \"bei der Landeszentrale für politische Bildung\", \"explanation\": \"Die Landeszentrale für politische Bildung fördert das Verständnis und die Auseinandersetzung mit politischen Themen in der Gesellschaft. Solche Institutionen sind entscheidend, um Bürger über ihre Rechte und Pflichten zu informieren.\", \"state\": \"BW\", \"type\": \"text\", \"setName\": \"Baden-Württemberg\", \"category\": \"Baden-Württemberg\" }, { \"id\": 307, \"question\": \"Die Landeshauptstadt von Baden-Württemberg heißt …\", \"options\": [\"Heidelberg.\", \"Stuttgart.\", \"Karlsruhe.\", \"Mannheim.\"], \"answer\": \"Stuttgart.\", \"explanation\": \"Stuttgart ist nicht nur die Landeshauptstadt, sondern auch ein wirtschaftliches und kulturelles Zentrum von Baden-Württemberg. Hauptstädte spielen eine wichtige Rolle in der Verwaltung und politischen Vertretung eines Bundeslandes.\", \"state\": \"BW\", \"type\": \"text\", \"setName\": \"Baden-Württemberg\", \"category\": \"Baden-Württemberg\" }, { \"id\": 308, \"question\": \"Welches Bundesland ist Baden-Württemberg?\", \"options\": [\"1\", \"2\", \"3\", \"4\"], \"answer\": \"2\", \"explanation\": \"Baden-Württemberg ist eines von 16 Bundesländern in Deutschland. Die geografische und administrative Unterteilung des Landes in Bundesländer ist von großer Bedeutung für die Selbstverwaltung und die Verteilung von Kompetenzen.\", \"state\": \"BW\", \"type\": \"image\", \"setName\": \"Baden-Württemberg\", \"category\": \"Baden-Württemberg\" }, { \"id\": 309, \"question\": \"Wie nennt man die Regierungschefin/den Regierungschef in Baden-Württemberg?\", \"options\": [ \"Erste Ministerin/Erster Minister\", \"Premierministerin/Premierminister\", \"Bürgermeisterin/Bürgermeister\", \"Ministerpräsidentin/Ministerpräsident\" ], \"answer\": \"Ministerpräsidentin/Ministerpräsident\", \"explanation\": \"Der Ministerpräsident ist der Regierungschef eines Bundeslandes und trägt die Verantwortung für die Landesregierung. Diese Position ist entscheidend für die politische Führung und die Umsetzung von Gesetzen und Programmen auf Landesebene.\", \"state\": \"BW\", \"type\": \"text\", \"setName\": \"Baden-Württemberg\", \"category\": \"Baden-Württemberg\" }, { \"id\": 310, \"question\": \"Welche Ministerin/welchen Minister hat Baden-Württemberg nicht?\", \"options\": [ \"Finanzministerin/Finanzminister\", \"Justizministerin/Justizminister\", \"Innenministerin/Innenminister\", \"Außenministerin/Außenminister\" ], \"answer\": \"Außenministerin/Außenminister\", \"explanation\": \"In Deutschland haben die meisten Bundesländer nicht die Zuständigkeit für Außenpolitik, da diese auf Bundesebene geregelt wird. Aus diesem Grund ist die Position eines Außenministers innerhalb der Landesregierung nicht notwendig.\", \"state\": \"BW\", \"type\": \"text\", \"setName\": \"Baden-Württemberg\", \"category\": \"Baden-Württemberg\" }, { \"id\": 311, \"question\": \"Welches Wappen gehört zum Freistaat Bayern?\", \"options\": [\"Bild 1\", \"Bild 2\", \"Bild 3\", \"Bild 4\"], \"answer\": \"Bild 2\", \"explanation\": \"Das Wappen von Bayern zeigt die Rauten in Weiß und Blau, die eine wichtige symbolische Bedeutung für den Freistaat haben. Es steht für die bayerische Identität und Tradition, die in der Geschichte des Landes verwurzelt ist.\", \"state\": \"BY\", \"type\": \"image\", \"setName\": \"Bayern\", \"category\": \"Bayern\" }, { \"id\": 312, \"question\": \"Welches ist ein Landkreis in Bayern?\", \"options\": [\"Prignitz\", \"Rhein-Sieg-Kreis\", \"Nordfriesland\", \"Altötting\"], \"answer\": \"Altötting\", \"explanation\": \"Ein Landkreis ist eine Verwaltungseinheit in Deutschland, die für die lokale Regierung und Dienstleistungen zuständig ist. Altötting ist ein historisch bedeutender Landkreis in Bayern, bekannt für seine Wallfahrtsorte.\", \"state\": \"BY\", \"type\": \"text\", \"setName\": \"Bayern\", \"category\": \"Bayern\" }, { \"id\": 313, \"question\": \"Für wie viele Jahre wird der Landtag in Bayern gewählt?\", \"options\": [\"3\", \"4\", \"5\", \"6\"], \"answer\": \"5\", \"explanation\": \"Der Landtag ist das Parlament des Freistaates Bayern, und die Wahlperiode für die Abgeordneten beträgt fünf Jahre. Dies ermöglicht eine regelmäßige demokratische Erneuerung und die Möglichkeit, auf Veränderungen in der Gesellschaft zu reagieren.\", \"state\": \"BY\", \"type\": \"text\", \"setName\": \"Bayern\", \"category\": \"Bayern\" }, { \"id\": 314, \"question\": \"Ab welchem Alter darf man in Bayern bei Kommunalwahlen wählen?\", \"options\": [\"14\", \"16\", \"18\", \"20\"], \"answer\": \"18\", \"explanation\": \"In Deutschland liegt das Wahlalter für Kommunalwahlen in der Regel bei 18 Jahren, was bedeutet, dass junge Erwachsene ab diesem Alter das Recht haben, ihre Stimmen abzugeben. Dies fördert die politische Teilhabe und Verantwortung der jungen Bevölkerung.\", \"state\": \"BY\", \"type\": \"text\", \"setName\": \"Bayern\", \"category\": \"Bayern\" }, { \"id\": 315, \"question\": \"Welche Farben hat die Landesflagge von Bayern?\", \"options\": [\"blau-weiß-rot\", \"weiß-blau\", \"grün-weiß-rot\", \"schwarz-gelb\"], \"answer\": \"weiß-blau\", \"explanation\": \"Die bayerische Landesflagge besteht aus den Farben Weiß und Blau, die die traditionelle Farben des Freistaats sind. Diese Farben sind auch im Wappen und in der bayerischen Identität stark verwurzelt.\", \"state\": \"BY\", \"type\": \"text\", \"setName\": \"Bayern\", \"category\": \"Bayern\" }, { \"id\": 316, \"question\": \"Wo können Sie sich in Bayern über politische Themen informieren?\", \"options\": [ \"beim Ordnungsamt der Gemeinde\", \"bei der Landeszentrale für politische Bildung\", \"bei der Verbraucherzentrale\", \"bei den Kirchen\" ], \"answer\": \"bei der Landeszentrale für politische Bildung\", \"explanation\": \"Die Landeszentrale für politische Bildung bietet vielfältige Materialien und Veranstaltungen an, um Bürger über politische Themen und Prozesse zu informieren. Dies ist wichtig für die Förderung von Demokratie und politischer Bildung in der Gesellschaft.\", \"state\": \"BY\", \"type\": \"text\", \"setName\": \"Bayern\", \"category\": \"Bayern\" }, { \"id\": 317, \"question\": \"Die Landeshauptstadt von Bayern heißt …\", \"options\": [\"Ingolstadt.\", \"Regensburg.\", \"Nürnberg.\", \"München.\"], \"answer\": \"München.\", \"explanation\": \"München ist die Landeshauptstadt von Bayern und eine der größten Städte Deutschlands. Sie ist bekannt für ihre kulturellen Veranstaltungen, wirtschaftliche Bedeutung und historischen Sehenswürdigkeiten.\", \"state\": \"BY\", \"type\": \"text\", \"setName\": \"Bayern\", \"category\": \"Bayern\" }, { \"id\": 318, \"question\": \"Welches Bundesland ist Bayern?\", \"options\": [\"1\", \"2\", \"3\", \"4\"], \"answer\": \"4\", \"explanation\": \"Bayern ist eines der 16 Bundesländer Deutschlands und hat eine reiche Geschichte sowie eine starke kulturelle Identität. Es ist bekannt für seine Traditionen, Landschaften und wirtschaftlichen Errungenschaften.\", \"state\": \"BY\", \"type\": \"image\", \"setName\": \"Bayern\", \"category\": \"Bayern\" }, { \"id\": 319, \"question\": \"Wie nennt man die Regierungschefin/den Regierungschef in Bayern?\", \"options\": [ \"Erste Ministerin/Erster Minister\", \"Premierministerin/Premierminister\", \"Bürgermeisterin/Bürgermeister\", \"Ministerpräsidentin/Ministerpräsident\" ], \"answer\": \"Ministerpräsidentin/Ministerpräsident\", \"explanation\": \"Der Ministerpräsident ist der Vorsitzende der bayerischen Landesregierung und repräsentiert das Bundesland nach außen. Diese Position spielt eine zentrale Rolle in der politischen Führung und Entscheidungsfindung auf Landesebene.\", \"state\": \"BY\", \"type\": \"text\", \"setName\": \"Bayern\", \"category\": \"Bayern\" }, { \"id\": 320, \"question\": \"Welche Ministerin/welchen Minister hat Bayern nicht?\", \"options\": [ \"Justizministerin/Justizminister\", \"Außenministerin/Außenminister\", \"Finanzministerin/Finanzminister\", \"Innenministerin/Innenminister\" ], \"answer\": \"Außenministerin/Außenminister\", \"explanation\": \"Bayern hat keinen Außenminister, da die Außenpolitik auf Bundesebene von der Bundesregierung und dem Bundesaußenminister geleitet wird. Dies zeigt die Aufgabenverteilung zwischen den Landes- und der Bundesebene in Deutschland.\", \"state\": \"BY\", \"type\": \"text\", \"setName\": \"Bayern\", \"category\": \"Bayern\" }, { \"id\": 321, \"question\": \"Welches Wappen gehört zum Bundesland Berlin?\", \"options\": [\"Bild 1\", \"Bild 2\", \"Bild 3\", \"Bild 4\"], \"answer\": \"Bild 4\", \"explanation\": \"Das Wappen eines Bundeslandes ist ein Symbol, das seine Identität repräsentiert und häufig historische Elemente enthält. Berlin hat ein charakteristisches Wappen mit einem Bären, der für Stärke und Tapferkeit steht.\", \"state\": \"BE\", \"type\": \"image\", \"setName\": \"Berlin\", \"category\": \"Berlin\" }, { \"id\": 322, \"question\": \"Welches ist ein Bezirk von Berlin?\", \"options\": [\"Altona\", \"Prignitz\", \"Pankow\", \"Mecklenburgische Seenplatte\"], \"answer\": \"Pankow\", \"explanation\": \"Berlin ist in mehrere Bezirke unterteilt, die jeweils eigene Verwaltungsstrukturen und -aufgaben haben. Pankow ist einer der bekanntesten Bezirke und spielt eine wichtige Rolle in der Infrastruktur und Kultur der Stadt.\", \"state\": \"BE\", \"type\": \"text\", \"setName\": \"Berlin\", \"category\": \"Berlin\" }, { \"id\": 323, \"question\": \"Für wie viele Jahre wird das Landesparlament in Berlin gewählt?\", \"options\": [\"3\", \"4\", \"5\", \"6\"], \"answer\": \"5\", \"explanation\": \"Das Landesparlament, auch Abgeordnetenhaus genannt, ist für die Gesetzgebung in Berlin verantwortlich. Die Wahlperiode beträgt fünf Jahre, was eine langfristige Planung und stabile Politik ermöglichen soll.\", \"state\": \"BE\", \"type\": \"text\", \"setName\": \"Berlin\", \"category\": \"Berlin\" }, { \"id\": 324, \"question\": \"Ab welchem Alter darf man in Berlin bei Kommunalwahlen (Wahl der Bezirksverordnetenversammlung) wählen?\", \"options\": [\"14\", \"16\", \"18\", \"20\"], \"answer\": \"16\", \"explanation\": \"In Berlin dürfen junge Menschen ab 16 Jahren an Kommunalwahlen teilnehmen, was eine besondere Regelung in Deutschland darstellt. Diese niedrigere Altersgrenze fördert das politische Engagement und die Partizipation von Jugendlichen.\", \"state\": \"BE\", \"type\": \"text\", \"setName\": \"Berlin\", \"category\": \"Berlin\" }, { \"id\": 325, \"question\": \"Welche Farben hat die Landesflagge von Berlin?\", \"options\": [\"blau-weiß-rot\", \"weiß-rot\", \"grün-weiß-rot\", \"schwarz-gold\"], \"answer\": \"weiß-rot\", \"explanation\": \"Die Landesflagge von Berlin besteht aus den Farben Weiß und Rot und spiegelt die Tradition und Identität Berlins wider. Diese Farben sind im Wappen und in vielen offiziellen Dokumenten der Stadt präsent.\", \"state\": \"BE\", \"type\": \"text\", \"setName\": \"Berlin\", \"category\": \"Berlin\" }, { \"id\": 326, \"question\": \"Wo können Sie sich in Berlin über politische Themen informieren?\", \"options\": [ \"beim Ordnungsamt der Gemeinde\", \"bei den Kirchen\", \"bei der Verbraucherzentrale\", \"bei der Landeszentrale für politische Bildung\" ], \"answer\": \"bei der Landeszentrale für politische Bildung\", \"explanation\": \"Die Landeszentrale für politische Bildung bietet umfangreiche Informationen und Materialien zu politischen Themen und Beteiligungsmöglichkeiten in Berlin. Diese Institution fördert das politische Wissen und Engagement der Bürger.\", \"state\": \"BE\", \"type\": \"text\", \"setName\": \"Berlin\", \"category\": \"Berlin\" }, { \"id\": 327, \"question\": \"Welches Bundesland ist ein Stadtstaat?\", \"options\": [\"Berlin\", \"Saarland\", \"Brandenburg\", \"Hessen\"], \"answer\": \"Berlin\", \"explanation\": \"Ein Stadtstaat ist ein Bundesland, das nur aus einer Stadt besteht und gleichzeitig die Funktionen von Stadt und Bundesland vereint. Berlin ist der einzige Stadtstaat in Deutschland und hat eine einzigartige politische und kulturelle Struktur.\", \"state\": \"BE\", \"type\": \"text\", \"setName\": \"Berlin\", \"category\": \"Berlin\" }, { \"id\": 328, \"question\": \"Welches Bundesland ist Berlin?\", \"options\": [\"1\", \"2\", \"3\", \"4\"], \"answer\": \"4\", \"explanation\": \"Diese Frage bezieht sich auf die Darstellung Berlins als Bundesland in Deutschland. Berlin hat einen besonderen Status als Stadtstaat und wird oft unterschiedlich zu den anderen Bundesländern dargestellt.\", \"state\": \"BE\", \"type\": \"image\", \"setName\": \"Berlin\", \"category\": \"Berlin\" }, { \"id\": 329, \"question\": \"Wie nennt man die Regierungschefin/den Regierungschef des Stadtstaates Berlin?\", \"options\": [ \"Ministerpräsidentin/Ministerpräsident\", \"Oberbürgermeisterin/Oberbürgermeister\", \"Präsidentin/Präsident des Senates\", \"Regierende Bürgermeisterin/Regierender Bürgermeister\" ], \"answer\": \"Regierende Bürgermeisterin/Regierender Bürgermeister\", \"explanation\": \"Die Bezeichnung 'Regierender Bürgermeister' ist spezifisch für Berlin und unterscheidet sich von anderen Bundesländern, wo der Titel 'Ministerpräsident' verwendet wird. Die regierende Bürgermeisterin oder der regierende Bürgermeister leitet die Regierung und hat eine zentrale Rolle in der Stadtpolitik.\", \"state\": \"BE\", \"type\": \"text\", \"setName\": \"Berlin\", \"category\": \"Berlin\" }, { \"id\": 330, \"question\": \"Welche Senatorin/welchen Senator hat Berlin nicht?\", \"options\": [ \"Finanzsenatorin/Finanzsenator\", \"Innensenatorin/Innensenator\", \"Senatorin/Senator für Außenbeziehungen\", \"Justizsenatorin/Justizsenator\" ], \"answer\": \"Senatorin/Senator für Außenbeziehungen\", \"explanation\": \"In Berlin sind die Senatoren für verschiedene Bereiche zuständig, aber ein Senator für Außenbeziehungen existiert nicht. Der Bereich Außenbeziehungen wird in der Regel durch den Regierenden Bürgermeister oder einen anderen Senator behandelt.\", \"state\": \"BE\", \"type\": \"text\", \"setName\": \"Berlin\", \"category\": \"Berlin\" }, { \"id\": 331, \"question\": \"Welches Wappen gehört zum Bundesland Brandenburg?\", \"options\": [\"Bild 1\", \"Bild 2\", \"Bild 3\", \"Bild 4\"], \"answer\": \"Bild 1\", \"explanation\": \"Das Wappen eines Bundeslandes symbolisiert dessen Identität und Geschichte. Brandenburg hat ein charakteristisches Wappen, das mit dem brandenburgischen Landtag und der Regionalhistorie verknüpft ist.\", \"state\": \"BB\", \"type\": \"image\", \"setName\": \"Brandenburg\", \"category\": \"Brandenburg\" }, { \"id\": 332, \"question\": \"Welches ist ein Landkreis in Brandenburg?\", \"options\": [ \"Prignitz\", \"Rhein-Sieg-Kreis\", \"Vogtlandkreis\", \"Amberg-Sulzbach\" ], \"answer\": \"Prignitz\", \"explanation\": \"Ein Landkreis ist eine Verwaltungseinheit, die für bestimmte öffentliche Dienste zuständig ist. In Brandenburg gibt es mehrere Landkreise, die jeweils eigene Zuständigkeiten haben, wobei die Prignitz eine der bekanntesten Regionen ist.\", \"state\": \"BB\", \"type\": \"text\", \"setName\": \"Brandenburg\", \"category\": \"Brandenburg\" }, { \"id\": 333, \"question\": \"Für wie viele Jahre wird der Landtag in Brandenburg gewählt?\", \"options\": [\"3\", \"4\", \"5\", \"6\"], \"answer\": \"5\", \"explanation\": \"Der Landtag ist das Landesparlament, das die Gesetze für das Bundesland Brandenburg beschließt. Die Amtszeit von Landtagsabgeordneten beträgt in den meisten Bundesländern fünf Jahre, um eine kontinuierliche politische Arbeit zu gewährleisten.\", \"state\": \"BB\", \"type\": \"text\", \"setName\": \"Brandenburg\", \"category\": \"Brandenburg\" }, { \"id\": 334, \"question\": \"Ab welchem Alter darf man in Brandenburg bei Kommunalwahlen wählen?\", \"options\": [\"14\", \"16\", \"18\", \"20\"], \"answer\": \"16\", \"explanation\": \"In Brandenburg dürfen Jugendliche ab 16 Jahren an Kommunalwahlen teilnehmen. Dies fördert das politische Engagement junger Menschen und ermöglicht ihnen, Einfluss auf ihre unmittelbare Umgebung zu nehmen.\", \"state\": \"BB\", \"type\": \"text\", \"setName\": \"Brandenburg\", \"category\": \"Brandenburg\" }, { \"id\": 335, \"question\": \"Welche Farben hat die Landesflagge von Brandenburg?\", \"options\": [\"blau-weiß-rot\", \"rot-weiß\", \"grün-weiß-rot\", \"schwarz-gelb\"], \"answer\": \"rot-weiß\", \"explanation\": \"Die Farben einer Landesflagge sind oft Symbol für die historische und kulturelle Identität des Bundeslandes. Die rot-weißen Farben der brandenburgischen Flagge reflektieren die Traditionen und die Geschichte dieser Region.\", \"state\": \"BB\", \"type\": \"text\", \"setName\": \"Brandenburg\", \"category\": \"Brandenburg\" }, { \"id\": 336, \"question\": \"Wo können Sie sich in Brandenburg über politische Themen informieren?\", \"options\": [ \"bei den Kirchen\", \"beim Ordnungsamt der Gemeinde\", \"bei der Landeszentrale für politische Bildung\", \"bei der Verbraucherzentrale\" ], \"answer\": \"bei der Landeszentrale für politische Bildung\", \"explanation\": \"Die Landeszentrale für politische Bildung bietet Informationen und Bildungsressourcen zu politischen Themen. Solche Einrichtungen sind wichtig, um Bürger zu informieren und das Verständnis für demokratische Prozesse zu fördern.\", \"state\": \"BB\", \"type\": \"text\", \"setName\": \"Brandenburg\", \"category\": \"Brandenburg\" }, { \"id\": 337, \"question\": \"Die Landeshauptstadt von Brandenburg heißt …\", \"options\": [\"Potsdam.\", \"Cottbus.\", \"Brandenburg.\", \"Frankfurt/Oder.\"], \"answer\": \"Potsdam.\", \"explanation\": \"Potsdam ist die Landeshauptstadt von Brandenburg und bekannt für ihre historische Bedeutung sowie als Standort zahlreicher kultureller Einrichtungen. Die Stadt spielt eine wesentliche Rolle im politischen und sozialen Leben des Bundeslandes.\", \"state\": \"BB\", \"type\": \"text\", \"setName\": \"Brandenburg\", \"category\": \"Brandenburg\" }, { \"id\": 338, \"question\": \"Welches Bundesland ist Brandenburg?\", \"options\": [\"1\", \"2\", \"3\", \"4\"], \"answer\": \"4\", \"explanation\": \"Bundesländer sind die föderalen Einheiten der Bundesrepublik Deutschland, jede mit eigenen gesetzgeberischen und administrativen Befugnissen. Brandenburg ist ein Bundesland im Osten Deutschlands, das eine wichtige Rolle in der deutschen Geschichte spielt.\", \"state\": \"BB\", \"type\": \"image\", \"setName\": \"Brandenburg\", \"category\": \"Brandenburg\" }, { \"id\": 339, \"question\": \"Wie nennt man die Regierungschefin/den Regierungschef in Brandenburg?\", \"options\": [ \"Erste Ministerin/Erster Minister\", \"Premierministerin/Premierminister\", \"Bürgermeisterin/Bürgermeister\", \"Ministerpräsidentin/Ministerpräsident\" ], \"answer\": \"Ministerpräsidentin/Ministerpräsident\", \"explanation\": \"Der Begriff 'Ministerpräsident' bezeichnet den Regierungschef eines Bundeslandes. In Brandenburg ist der Ministerpräsident für die Leitung der Landesregierung und die Umsetzung der politischen Agenda verantwortlich.\", \"state\": \"BB\", \"type\": \"text\", \"setName\": \"Brandenburg\", \"category\": \"Brandenburg\" }, { \"id\": 340, \"question\": \"Welche Ministerin/welchen Minister hat Brandenburg nicht?\", \"options\": [ \"Justizministerin/Justizminister\", \"Außenministerin/Außenminister\", \"Finanzministerin/Finanzminister\", \"Innenministerin/Innenminister\" ], \"answer\": \"Außenministerin/Außenminister\", \"explanation\": \"In vielen Bundesländern wird das Ressort Außenpolitik auf den Bund übertragen, weshalb es keinen Außenminister auf Landesebene gibt. Brandenburg hat daher die anderen Ministerien, schließt aber eines für Außenangelegenheiten aus.\", \"state\": \"BB\", \"type\": \"text\", \"setName\": \"Brandenburg\", \"category\": \"Brandenburg\" }, { \"id\": 341, \"question\": \"Welches Wappen gehört zur Freien Hansestadt Bremen?\", \"options\": [\"Bild 1\", \"Bild 2\", \"Bild 3\", \"Bild 4\"], \"answer\": \"Bild 3\", \"explanation\": \"Das Wappen der Freien Hansestadt Bremen ist ein wichtiges Symbol ihrer Identität und Geschichte. Es zeigt die Traditionen der Stadt, die als Hansestadt im Mittelalter eine bedeutende Rolle im Handel und in der Politik spielte.\", \"state\": \"HB\", \"type\": \"image\", \"setName\": \"Bremen\", \"category\": \"Bremen\" }, { \"id\": 342, \"question\": \"Welches ist ein Stadtteil von Bremen?\", \"options\": [\"Altona\", \"Hemelingen\", \"Pankow\", \"Babelsberg\"], \"answer\": \"Hemelingen\", \"explanation\": \"Bremen ist in verschiedene Stadtteile untergliedert, die jeweils ihre eigenen Merkmale und Gemeinschaften haben. Hemelingen ist einer dieser Stadtteile und trägt zu der vielfältigen Kultur der Stadt bei.\", \"state\": \"HB\", \"type\": \"text\", \"setName\": \"Bremen\", \"category\": \"Bremen\" }, { \"id\": 343, \"question\": \"Für wie viele Jahre wird das Landesparlament in Bremen gewählt?\", \"options\": [\"3\", \"4\", \"5\", \"6\"], \"answer\": \"4\", \"explanation\": \"In Deutschland werden die meisten Landesparlamente, einschließlich des Bremer Landesparlaments, alle vier Jahre gewählt. Diese Wahlen sind entscheidend für die politische Leitung und den gesetzgebenden Prozess des Bundeslandes.\", \"state\": \"HB\", \"type\": \"text\", \"setName\": \"Bremen\", \"category\": \"Bremen\" }, { \"id\": 344, \"question\": \"Ab welchem Alter darf man in Bremen bei den Wahlen zur Bürgerschaft (Landtag) wählen?\", \"options\": [\"14\", \"16\", \"18\", \"20\"], \"answer\": \"16\", \"explanation\": \"In Bremen dürfen Jugendliche ab 16 Jahren an den Wahlen zur Bürgerschaft teilnehmen. Dies ist ein Beispiel für die zunehmende Einbeziehung junger Menschen in den politischen Prozess.\", \"state\": \"HB\", \"type\": \"text\", \"setName\": \"Bremen\", \"category\": \"Bremen\" }, { \"id\": 345, \"question\": \"Welche Farben hat die Landesflagge von Bremen?\", \"options\": [\"blau-weiß-rot\", \"rot-weiß\", \"grün-weiß-rot\", \"schwarz-gold\"], \"answer\": \"rot-weiß\", \"explanation\": \"Die Farben der Bremer Landesflagge sind rot und weiß, die oft mit historischen und kulturellen Aspekten der Stadt assoziiert werden. Flaggen sind wichtige Symbole für nationale und regionale Identität.\", \"state\": \"HB\", \"type\": \"text\", \"setName\": \"Bremen\", \"category\": \"Bremen\" }, { \"id\": 346, \"question\": \"Wo können Sie sich in Bremen über politische Themen informieren?\", \"options\": [ \"beim Ordnungsamt der Gemeinde\", \"bei der Landeszentrale für politische Bildung\", \"bei den Kirchen\", \"bei der Verbraucherzentrale\" ], \"answer\": \"bei der Landeszentrale für politische Bildung\", \"explanation\": \"Die Landeszentrale für politische Bildung in Bremen bietet Ressourcen und Informationen zu politischen Themen und Prozessen. Dies ist ein wichtiger Ort für Bürger, um sich zu informieren und sich aktiv am politischen Leben zu beteiligen.\", \"state\": \"HB\", \"type\": \"text\", \"setName\": \"Bremen\", \"category\": \"Bremen\" }, { \"id\": 347, \"question\": \"Was ist ein deutscher Stadtstaat?\", \"options\": [\"Bremen\", \"München\", \"Frankfurt\", \"Erfurt\"], \"answer\": \"Bremen\", \"explanation\": \"Ein Stadtstaat in Deutschland ist eine Stadt, die den Status eines Bundeslandes hat, und Bremen ist ein solches Beispiel. Stadtstaaten kombinieren städtische und landespolitische Funktionen in einem einzelnen Gebiet.\", \"state\": \"HB\", \"type\": \"text\", \"setName\": \"Bremen\", \"category\": \"Bremen\" }, { \"id\": 348, \"question\": \"Welches Bundesland ist Bremen?\", \"options\": [\"1\", \"2\", \"3\", \"4\"], \"answer\": \"1\", \"explanation\": \"Bremen ist eines der 16 Bundesländer Deutschlands und hat eine einzigartige Kultur und Geschichte. Es spielt eine wichtige Rolle in der deutschen Föderalstruktur.\", \"state\": \"HB\", \"type\": \"image\", \"setName\": \"Bremen\", \"category\": \"Bremen\" }, { \"id\": 349, \"question\": \"Wie nennt man die Regierungschefin/den Regierungschef des Stadtstaates Bremen?\", \"options\": [ \"Ministerpräsidentin/Ministerpräsident\", \"Erste Bürgermeisterin/Erster Bürgermeister\", \"Präsidentin/Präsident des Senates\", \"Regierende Bürgermeisterin/Regierender Bürgermeister\" ], \"answer\": \"Erste Bürgermeisterin/Erster Bürgermeister\", \"explanation\": \"Der Bürgermeister oder die Bürgermeisterin von Bremen hat eine zentrale Rolle in der Stadtverwaltung und der politischen Leitung. Diese Position ist entscheidend für die Vertretung der Stadt auf Landes- und Bundesebene.\", \"state\": \"HB\", \"type\": \"text\", \"setName\": \"Bremen\", \"category\": \"Bremen\" }, { \"id\": 350, \"question\": \"Welche Senatorin/welchen Senator hat Bremen nicht?\", \"options\": [ \"Senatorin/Senator für Außenbeziehungen\", \"Finanzsenatorin/Finanzsenator\", \"Justizsenatorin/Justizsenator\", \"Innensenatorin/Innensenator\" ], \"answer\": \"Senatorin/Senator für Außenbeziehungen\", \"explanation\": \"In Bremen gibt es eine spezielle Struktur für die Senatsmitglieder, und bestimmte Ämter sind möglicherweise nicht vorhanden. Das Fehlen eines Senators für Außenbeziehungen spiegelt die spezifischen Bedürfnisse und Prioritäten des Stadtstaates wider.\", \"state\": \"HB\", \"type\": \"text\", \"setName\": \"Bremen\", \"category\": \"Bremen\" }, { \"id\": 351, \"question\": \"Welches Wappen gehört zur Freien und Hansestadt Hamburg?\", \"options\": [\"Bild 1\", \"Bild 2\", \"Bild 3\", \"Bild 4\"], \"answer\": \"Bild 2\", \"explanation\": \"Das Wappen der Freien und Hansestadt Hamburg zeigt eine Burg mit drei Türmen. Es symbolisiert die historische Bedeutung Hamburgs als Hansestadt und seine Rolle als wichtiger Hafen und Handelsplatz in Norddeutschland.\", \"state\": \"HH\", \"type\": \"image\", \"setName\": \"Hamburg\", \"category\": \"Hamburg\" }, { \"id\": 352, \"question\": \"Welches ist ein Bezirk von Hamburg?\", \"options\": [ \"Altona\", \"Hemelingen\", \"Pankow\", \"Mecklenburgische Seenplatte\" ], \"answer\": \"Altona\", \"explanation\": \"Hamburg ist in mehrere Bezirke unterteilt, darunter Altona, das für seine kulturelle Vielfalt und seine Lage am Wasser bekannt ist. Diese Struktur ermöglicht eine effektive lokale Verwaltung und Bürgernähe.\", \"state\": \"HH\", \"type\": \"text\", \"setName\": \"Hamburg\", \"category\": \"Hamburg\" }, { \"id\": 353, \"question\": \"Für wie viele Jahre wird das Landesparlament in Hamburg gewählt?\", \"options\": [\"3\", \"4\", \"5\", \"6\"], \"answer\": \"5\", \"explanation\": \"Das Landesparlament von Hamburg wird alle fünf Jahre gewählt. Diese Wahlperiode ist gängig in vielen deutschen Bundesländern und sorgt für Kontinuität in der politischen Arbeit.\", \"state\": \"HH\", \"type\": \"text\", \"setName\": \"Hamburg\", \"category\": \"Hamburg\" }, { \"id\": 354, \"question\": \"Ab welchem Alter darf man in Hamburg bei Kommunalwahlen (Wahl der Bezirksversammlungen) wählen?\", \"options\": [\"14\", \"16\", \"18\", \"20\"], \"answer\": \"16\", \"explanation\": \"In Hamburg darf man bereits ab 16 Jahren an Kommunalwahlen teilnehmen. Dies spiegelt das Bestreben wider, junge Menschen frühzeitig in politische Prozesse einzubeziehen und ihnen eine Stimme zu geben.\", \"state\": \"HH\", \"type\": \"text\", \"setName\": \"Hamburg\", \"category\": \"Hamburg\" }, { \"id\": 355, \"question\": \"Welche Farben hat die Landesflagge von Hamburg?\", \"options\": [\"blau-weiß-rot\", \"weiß-rot\", \"grün-weiß-rot\", \"schwarz-gelb\"], \"answer\": \"weiß-rot\", \"explanation\": \"Die Landesflagge von Hamburg ist weiß-rot und beinhaltet traditionell ein einfaches und prägnantes Design. Diese Farben stehen seit Jahrhunderten für die Identität und das Erbe der Stadt.\", \"state\": \"HH\", \"type\": \"text\", \"setName\": \"Hamburg\", \"category\": \"Hamburg\" }, { \"id\": 356, \"question\": \"Wo können Sie sich in Hamburg über politische Themen informieren?\", \"options\": [ \"beim Ordnungsamt der Gemeinde\", \"bei der Verbraucherzentrale\", \"bei den Kirchen\", \"bei der Landeszentrale für politische Bildung\" ], \"answer\": \"bei der Landeszentrale für politische Bildung\", \"explanation\": \"Die Landeszentrale für politische Bildung bietet umfangreiche Informationen und Materialien zu politischen Themen und Prozessen. Diese Institution unterstützt die Bürger darin, sich aktiv an politischen Diskussionen und Entscheidungen zu beteiligen.\", \"state\": \"HH\", \"type\": \"text\", \"setName\": \"Hamburg\", \"category\": \"Hamburg\" }, { \"id\": 357, \"question\": \"Welches Bundesland ist ein Stadtstaat?\", \"options\": [\"Hamburg\", \"Sachsen\", \"Bayern\", \"Thüringen\"], \"answer\": \"Hamburg\", \"explanation\": \"Hamburg ist einer der drei Stadtstaaten Deutschlands, was bedeutet, dass die Stadt sowohl die Funktionen einer Stadt als auch die einer Landesregierung erfüllt. Diese spezielle Struktur ermöglicht eine einzigartige Verwaltung und politische Gestaltung.\", \"state\": \"HH\", \"type\": \"text\", \"setName\": \"Hamburg\", \"category\": \"Hamburg\" }, { \"id\": 358, \"question\": \"Welches Bundesland ist Hamburg?\", \"options\": [\"1\", \"2\", \"3\", \"4\"], \"answer\": \"3\", \"explanation\": \"Hamburg wird oft als Stadtstaat bezeichnet und ist daher einzigartig unter den Bundesländern. Diese Kategorisierung unterstreicht die politische und verwaltungstechnische Rolle Hamburgs innerhalb Deutschlands.\", \"state\": \"HH\", \"type\": \"image\", \"setName\": \"Hamburg\", \"category\": \"Hamburg\" }, { \"id\": 359, \"question\": \"Wie nennt man die Regierungschefin/den Regierungschef des Stadtstaates Hamburg?\", \"options\": [ \"Ministerpräsidentin/Ministerpräsident\", \"Erste Bürgermeisterin/Erster Bürgermeister\", \"Regierende Senatorin/Regierender Senator\", \"Oberbürgermeisterin/Oberbürgermeister\" ], \"answer\": \"Erste Bürgermeisterin/Erster Bürgermeister\", \"explanation\": \"Der Titel 'Erste Bürgermeisterin/Erster Bürgermeister' ist spezifisch für die Stadtstaaten in Deutschland und bezeichnet das Oberhaupt der Stadt und der Regierung. Diese Position spielt eine zentrale Rolle in der politischen Führung Hamburgs.\", \"state\": \"HH\", \"type\": \"text\", \"setName\": \"Hamburg\", \"category\": \"Hamburg\" }, { \"id\": 360, \"question\": \"Welche Senatorin/welchen Senator hat Hamburg nicht?\", \"options\": [ \"Justizsenatorin/Justizsenator\", \"Senatorin/Senator für Außenbeziehungen\", \"Finanzsenatorin/Finanzsenator\", \"Innensenatorin/Innensenator\" ], \"answer\": \"Senatorin/Senator für Außenbeziehungen\", \"explanation\": \"Einige Bundesländer haben spezifische Senatoren für Außenbeziehungen, während Hamburg nicht über diese Position verfügt. Hamburgs Fokus liegt eher auf anderen politischen Schwerpunkten wie Justiz, Finanzen und Inneres.\", \"state\": \"HH\", \"type\": \"text\", \"setName\": \"Hamburg\", \"category\": \"Hamburg\" }, { \"id\": 361, \"question\": \"Welches Wappen gehört zum Bundesland Hessen?\", \"options\": [\"Bild 1\", \"Bild 2\", \"Bild 3\", \"Bild 4\"], \"answer\": \"Bild 1\", \"explanation\": \"Das Wappen eines Bundeslandes ist ein wichtiges Symbol, das oft historische oder kulturelle Aspekte repräsentiert. Für Hessen zeigt das Wappen typischerweise das rot-weiße Stufenwappen, das die Wurzeln und Traditionen des Landes verdeutlicht.\", \"state\": \"HE\", \"type\": \"image\", \"setName\": \"Hessen\", \"category\": \"Hessen\" }, { \"id\": 362, \"question\": \"Welches ist ein Landkreis in Hessen?\", \"options\": [\"Ammerland\", \"Altötting\", \"Prignitz\", \"Main-Taunus-Kreis\"], \"answer\": \"Main-Taunus-Kreis\", \"explanation\": \"Landkreise sind verwaltungsrechtliche Einheiten in Deutschland, die für bestimmte öffentliche Aufgaben zuständig sind. Der Main-Taunus-Kreis liegt in der Nähe von Frankfurt und spielt eine wichtige Rolle für die regionale Verwaltung in Hessen.\", \"state\": \"HE\", \"type\": \"text\", \"setName\": \"Hessen\", \"category\": \"Hessen\" }, { \"id\": 363, \"question\": \"Für wie viele Jahre wird der Landtag in Hessen gewählt?\", \"options\": [\"3\", \"4\", \"5\", \"6\"], \"answer\": \"5\", \"explanation\": \"Die Wahlperiode für Landtage in Deutschland beträgt in der Regel fünf Jahre, was eine Zeitspanne ist, in der die gewählten Vertreter gesetzgeberische Entscheidungen treffen und die Regierung kontrollieren. Dies gewährleistet auch eine regelmäßige Überprüfung der politischen Zustimmung durch die Bevölkerung.\", \"state\": \"HE\", \"type\": \"text\", \"setName\": \"Hessen\", \"category\": \"Hessen\" }, { \"id\": 364, \"question\": \"Ab welchem Alter darf man in Hessen bei Kommunalwahlen wählen?\", \"options\": [\"14\", \"16\", \"18\", \"20\"], \"answer\": \"18\", \"explanation\": \"Das Wahlrecht ist ein fundamentales Recht der Bürger, das in den meisten deutschen Bundesländern ab 18 Jahren gilt. Dieses Alter wurde festgelegt, um sicherzustellen, dass Wähler eine ausreichende Reife und Lebenserfahrung haben, um informierte Entscheidungen zu treffen.\", \"state\": \"HE\", \"type\": \"text\", \"setName\": \"Hessen\", \"category\": \"Hessen\" }, { \"id\": 365, \"question\": \"Welche Farben hat die Landesflagge von Hessen?\", \"options\": [\"blau-weiß-rot\", \"rot-weiß\", \"schwarz-gold\", \"grün-weiß-rot\"], \"answer\": \"rot-weiß\", \"explanation\": \"Die Farben einer Landesflagge sind oft aus historischen Gründen gewählt und spiegeln die Identität und die Traditionen des jeweiligen Bundeslandes wider. In Hessen symbolisieren die Farben rot und weiß die Zugehörigkeit zur hessischen Kultur und Geschichte.\", \"state\": \"HE\", \"type\": \"text\", \"setName\": \"Hessen\", \"category\": \"Hessen\" }, { \"id\": 366, \"question\": \"Wo können Sie sich in Hessen über politische Themen informieren?\", \"options\": [ \"bei der Landeszentrale für politische Bildung\", \"bei der Verbraucherzentrale\", \"beim Ordnungsamt der Gemeinde\", \"bei den Kirchen\" ], \"answer\": \"bei der Landeszentrale für politische Bildung\", \"explanation\": \"Die Landeszentralen für politische Bildung sind Institutionen, die den Bürgern helfen, ein besseres Verständnis für politische Themen und Prozesse zu entwickeln. Sie bieten Informationsmaterial, Veranstaltungen und Seminare, um die politische Bildung und Teilnahme zu fördern.\", \"state\": \"HE\", \"type\": \"text\", \"setName\": \"Hessen\", \"category\": \"Hessen\" }, { \"id\": 367, \"question\": \"Die Landeshauptstadt von Hessen heißt …\", \"options\": [\"Kassel.\", \"Darmstadt.\", \"Frankfurt.\", \"Wiesbaden.\"], \"answer\": \"Wiesbaden.\", \"explanation\": \"Wiesbaden ist die Landeshauptstadt von Hessen und eine der ältesten Kurstädte Deutschlands mit einer reichen Geschichte. Als Hauptstadt hat Wiesbaden zentrale politische Institutionen und ist ein wichtiger Standort für Verwaltung und Kultur im Bundesland Hessen.\", \"state\": \"HE\", \"type\": \"text\", \"setName\": \"Hessen\", \"category\": \"Hessen\" }, { \"id\": 368, \"question\": \"Welches Bundesland ist Hessen?\", \"options\": [\"1\", \"2\", \"3\", \"4\"], \"answer\": \"3\", \"explanation\": \"Die Geographie der Bundesländer ist wichtig für das Verständnis der politischen und kulturellen Vielfalt in Deutschland. Hessen liegt in der Mitte Deutschlands und ist bekannt für seine Wirtschaftskraft und kulturellen Angebote, was es zu einem zentralen Gebiet macht.\", \"state\": \"HE\", \"type\": \"image\", \"setName\": \"Hessen\", \"category\": \"Hessen\" }, { \"id\": 369, \"question\": \"Wie nennt man die Regierungschefin/den Regierungschef in Hessen?\", \"options\": [ \"Erste Ministerin/Erster Minister\", \"Premierministerin/Premierminister\", \"Bürgermeisterin/Bürgermeister\", \"Ministerpräsidentin/Ministerpräsident\" ], \"answer\": \"Ministerpräsidentin/Ministerpräsident\", \"explanation\": \"Die Bezeichnung 'Ministerpräsident' bezeichnet den Regierungschef eines Bundeslandes in Deutschland und ist eine Schlüsselposition in der Landesregierung. Der Ministerpräsident oder die Ministerpräsidentin hat die Aufgabe, die Landesregierung zu leiten und die politischen Geschäfte des Landes zu führen.\", \"state\": \"HE\", \"type\": \"text\", \"setName\": \"Hessen\", \"category\": \"Hessen\" }, { \"id\": 370, \"question\": \"Welche Ministerin/welchen Minister hat Hessen nicht?\", \"options\": [ \"Justizministerin/Justizminister\", \"Außenministerin/Außenminister\", \"Finanzministerin/Finanzminister\", \"Innenministerin/Innenminister\" ], \"answer\": \"Außenministerin/Außenminister\", \"explanation\": \"Innerhalb der deutschen Bundesländer gibt es unterschiedliche Ministerien, die je nach lokalen Bedürfnissen variieren. Hessen hat kein Außenministerium, da die außenpolitischen Belange in Deutschland auf Bundesebene geregelt werden, während die Länder Zuständigkeiten in anderen Bereichen haben.\", \"state\": \"HE\", \"type\": \"text\", \"setName\": \"Hessen\", \"category\": \"Hessen\" }, { \"id\": 371, \"question\": \"Welches Wappen gehört zum Bundesland Mecklenburg-Vorpommern?\", \"options\": [\"Bild 1\", \"Bild 2\", \"Bild 3\", \"Bild 4\"], \"answer\": \"Bild 3\", \"explanation\": \"Das Wappen eines Bundeslandes ist ein wichtiges Symbol und repräsentiert dessen Geschichte und Kultur. Mecklenburg-Vorpommern hat ein einzigartiges Wappen, das Elemente aus seiner regionalen Identität aufnimmt.\", \"state\": \"MV\", \"type\": \"image\", \"setName\": \"Mecklenburg-Vorpommern\", \"category\": \"Mecklenburg-Vorpommern\" }, { \"id\": 372, \"question\": \"Welches ist ein Landkreis in Mecklenburg-Vorpommern?\", \"options\": [ \"Prignitz\", \"Mecklenburgische Seenplatte\", \"Vogtlandkreis\", \"Rhein-Sieg-Kreis\" ], \"answer\": \"Mecklenburgische Seenplatte\", \"explanation\": \"Landkreise sind die unteren Verwaltungseinheiten in Deutschland und spielen eine wichtige Rolle in der regionalen Verwaltung. Mecklenburg-Vorpommern hat eine Vielzahl von Landkreisen, wobei die Mecklenburgische Seenplatte bekannt für ihre Seenlandschaften ist.\", \"state\": \"MV\", \"type\": \"text\", \"setName\": \"Mecklenburg-Vorpommern\", \"category\": \"Mecklenburg-Vorpommern\" }, { \"id\": 373, \"question\": \"Für wie viele Jahre wird der Landtag in Mecklenburg-Vorpommern gewählt?\", \"options\": [\"3\", \"4\", \"5\", \"6\"], \"answer\": \"5\", \"explanation\": \"Der Landtag ist das Parlament eines Bundeslandes und wird durch Wahlen bestimmt. In Mecklenburg-Vorpommern beträgt die Legislaturperiode fünf Jahre, was eine Stabilität in der politischen Landschaft ermöglicht.\", \"state\": \"MV\", \"type\": \"text\", \"setName\": \"Mecklenburg-Vorpommern\", \"category\": \"Mecklenburg-Vorpommern\" }, { \"id\": 374, \"question\": \"Ab welchem Alter darf man in Mecklenburg-Vorpommern bei Kommunalwahlen wählen?\", \"options\": [\"14\", \"16\", \"18\", \"20\"], \"answer\": \"16\", \"explanation\": \"Das Mindestalter für die Teilnahme an Kommunalwahlen ist ein wichtiger Aspekt der politischen Mitbestimmung. In Mecklenburg-Vorpommern dürfen bereits 16-Jährige an Kommunalwahlen teilnehmen, was die Jugend aktiv in die Politik einbezieht.\", \"state\": \"MV\", \"type\": \"text\", \"setName\": \"Mecklenburg-Vorpommern\", \"category\": \"Mecklenburg-Vorpommern\" }, { \"id\": 375, \"question\": \"Welche Farben hat die Landesflagge von Mecklenburg-Vorpommern?\", \"options\": [ \"schwarz-rot-gold\", \"blau-weiß-gelb-rot\", \"grün-weiß-rot\", \"schwarz-gelb\" ], \"answer\": \"blau-weiß-gelb-rot\", \"explanation\": \"Die Landesflagge ist ein Symbol für die Identität eines Bundeslandes und enthält oft die Farben, die mit der Region verbunden sind. Die Farben von Mecklenburg-Vorpommern spiegeln die Tradition und Geschichte des Bundeslandes wider.\", \"state\": \"MV\", \"type\": \"text\", \"setName\": \"Mecklenburg-Vorpommern\", \"category\": \"Mecklenburg-Vorpommern\" }, { \"id\": 376, \"question\": \"Wo können Sie sich in Mecklenburg-Vorpommern über politische Themen informieren?\", \"options\": [ \"bei der Landeszentrale für politische Bildung\", \"bei den Kirchen\", \"beim Ordnungsamt der Gemeinde\", \"bei der Verbraucherzentrale\" ], \"answer\": \"bei der Landeszentrale für politische Bildung\", \"explanation\": \"Die politische Bildung spielt eine entscheidende Rolle in einer Demokratie. Die Landeszentrale für politische Bildung in Mecklenburg-Vorpommern bietet Ressourcen und Informationen, um Bürger über politische Themen aufzuklären.\", \"state\": \"MV\", \"type\": \"text\", \"setName\": \"Mecklenburg-Vorpommern\", \"category\": \"Mecklenburg-Vorpommern\" }, { \"id\": 377, \"question\": \"Die Landeshauptstadt von Mecklenburg-Vorpommern heißt …\", \"options\": [\"Greifswald.\", \"Schwerin.\", \"Rostock.\", \"Wismar.\"], \"answer\": \"Schwerin.\", \"explanation\": \"Die Landeshauptstadt ist nicht nur der politische Sitz des Bundeslandes, sondern auch ein wichtiges kulturelles Zentrum. Schwerin ist bekannt für ihre historisch bedeutenden Gebäude, darunter das Schloss Schwerin.\", \"state\": \"MV\", \"type\": \"text\", \"setName\": \"Mecklenburg-Vorpommern\", \"category\": \"Mecklenburg-Vorpommern\" }, { \"id\": 378, \"question\": \"Welches Bundesland ist Mecklenburg-Vorpommern?\", \"options\": [\"1\", \"2\", \"3\", \"4\"], \"answer\": \"3\", \"explanation\": \"Die geographische Bestimmung von Bundesländern ist wichtig für das Verständnis der politischen und kulturellen Struktur Deutschlands. Mecklenburg-Vorpommern ist an der Ostsee gelegen und grenzt im Norden an Dänemark.\", \"state\": \"MV\", \"type\": \"image\", \"setName\": \"Mecklenburg-Vorpommern\", \"category\": \"Mecklenburg-Vorpommern\" }, { \"id\": 379, \"question\": \"Wie nennt man die Regierungschefin/den Regierungschef in Mecklenburg-Vorpommern?\", \"options\": [ \"Erste Ministerin/Erster Minister\", \"Premierministerin/Premierminister\", \"Bürgermeisterin/Bürgermeister\", \"Ministerpräsidentin/Ministerpräsident\" ], \"answer\": \"Ministerpräsidentin/Ministerpräsident\", \"explanation\": \"Der Titel des Regierungschefs eines Bundeslandes variiert in Deutschland, aber oft wird die Bezeichnung Ministerpräsident verwendet. In Mecklenburg-Vorpommern ist die Ministerpräsidentin oder der Ministerpräsident verantwortlich für die Landesregierung und die Umsetzung der Politik.\", \"state\": \"MV\", \"type\": \"text\", \"setName\": \"Mecklenburg-Vorpommern\", \"category\": \"Mecklenburg-Vorpommern\" }, { \"id\": 380, \"question\": \"Welche Ministerin/welchen Minister hat Mecklenburg-Vorpommern nicht?\", \"options\": [ \"Justizministerin/Justizminister\", \"Außenministerin/Außenminister\", \"Finanzministerin/Finanzminister\", \"Innenministerin/Innenminister\" ], \"answer\": \"Außenministerin/Außenminister\", \"explanation\": \"Die Ministerien eines Bundeslandes können sich von den Bundesministerien unterscheiden. Mecklenburg-Vorpommern hat kein eigenes Außenministerium, da Außenpolitik auf Bundesebene geregelt wird und Länderkontexte nicht erforderlich sind.\", \"state\": \"MV\", \"type\": \"text\", \"setName\": \"Mecklenburg-Vorpommern\", \"category\": \"Mecklenburg-Vorpommern\" }, { \"id\": 381, \"question\": \"Welches Wappen gehört zum Bundesland Niedersachsen?\", \"options\": [\"Bild 1\", \"Bild 2\", \"Bild 3\", \"Bild 4\"], \"answer\": \"Bild 3\", \"explanation\": \"Das Wappen eines Bundeslandes repräsentiert oft historische und kulturelle Aspekte der Region. Niedersachsen ist bekannt für seine rote Farbe im Wappen, die oft mit der Geschichte der Herzogtümer in Verbindung gebracht wird.\", \"state\": \"NI\", \"type\": \"image\", \"setName\": \"Niedersachsen\", \"category\": \"Niedersachsen\" }, { \"id\": 382, \"question\": \"Welches ist ein Landkreis in Niedersachsen?\", \"options\": [ \"Ammerland\", \"Rhein-Sieg-Kreis\", \"Nordfriesland\", \"Vogtlandkreis\" ], \"answer\": \"Ammerland\", \"explanation\": \"Landkreise sind wichtige Verwaltungseinheiten in Deutschland. Ammerland ist ein Landkreis im Bundesland Niedersachsen, während die anderen genannten Landkreise in anderen Bundesländern liegen.\", \"state\": \"NI\", \"type\": \"text\", \"setName\": \"Niedersachsen\", \"category\": \"Niedersachsen\" }, { \"id\": 383, \"question\": \"Für wie viele Jahre wird der Landtag in Niedersachsen gewählt?\", \"options\": [\"3\", \"4\", \"5\", \"6\"], \"answer\": \"5\", \"explanation\": \"Der Landtag ist das Parlament eines Bundeslandes und wird in Deutschland in der Regel alle fünf Jahre gewählt. Diese Wahlperiode ermöglicht den Bürgern, ihre Vertreter regelmäßig zu wählen und die politik mitzubestimmen.\", \"state\": \"NI\", \"type\": \"text\", \"setName\": \"Niedersachsen\", \"category\": \"Niedersachsen\" }, { \"id\": 384, \"question\": \"Ab welchem Alter darf man in Niedersachsen bei Kommunalwahlen wählen?\", \"options\": [\"14\", \"16\", \"18\", \"20\"], \"answer\": \"16\", \"explanation\": \"In Deutschland haben Jugendliche ab 16 Jahren das Recht, an Kommunalwahlen teilzunehmen. Dies fördert das politische Engagement junger Menschen und ermöglicht ihnen, ihre Stimme in wichtigen lokalen Angelegenheiten abzugeben.\", \"state\": \"NI\", \"type\": \"text\", \"setName\": \"Niedersachsen\", \"category\": \"Niedersachsen\" }, { \"id\": 385, \"question\": \"Welche Farben hat die Landesflagge von Niedersachsen?\", \"options\": [ \"weiß-blau\", \"schwarz-rot-gold\", \"schwarz-gelb\", \"blau-weiß-rot\" ], \"answer\": \"schwarz-rot-gold\", \"explanation\": \"Die Farben einer Landesflagge spiegeln oft historische und kulturelle Identitäten wider. In Niedersachsen sind die Farben schwarz, rot und gold eine Symbolik, die auch auf die deutsche Nationalflagge zurückzuführen ist.\", \"state\": \"NI\", \"type\": \"text\", \"setName\": \"Niedersachsen\", \"category\": \"Niedersachsen\" }, { \"id\": 386, \"question\": \"Wo können Sie sich in Niedersachsen über politische Themen informieren?\", \"options\": [ \"bei der Landeszentrale für politische Bildung\", \"beim Ordnungsamt der Gemeinde\", \"bei der Verbraucherzentrale\", \"bei den Kirchen\" ], \"answer\": \"bei der Landeszentrale für politische Bildung\", \"explanation\": \"Die Landeszentrale für politische Bildung fördert das politische Wissen und Engagement der Bürger. Hier werden Informationen und Materialien bereitgestellt, die helfen, politische Fragestellungen besser zu verstehen.\", \"state\": \"NI\", \"type\": \"text\", \"setName\": \"Niedersachsen\", \"category\": \"Niedersachsen\" }, { \"id\": 387, \"question\": \"Die Landeshauptstadt von Niedersachsen heißt …\", \"options\": [\"Hannover.\", \"Braunschweig.\", \"Wolfsburg.\", \"Osnabrück.\"], \"answer\": \"Hannover.\", \"explanation\": \"Hannover ist nicht nur die Landeshauptstadt, sondern auch ein wichtiges Zentrum für Wirtschaft und Kultur in Niedersachsen. Als Landeshauptstadt hat sie eine besondere politische Bedeutung innerhalb des Bundeslandes.\", \"state\": \"NI\", \"type\": \"text\", \"setName\": \"Niedersachsen\", \"category\": \"Niedersachsen\" }, { \"id\": 388, \"question\": \"Welches Bundesland ist Niedersachsen?\", \"options\": [\"1\", \"2\", \"3\", \"4\"], \"answer\": \"1\", \"explanation\": \"Niedersachsen ist eines der 16 Bundesländer Deutschlands und liegt im Nordwesten des Landes. Es zeichnet sich durch eine vielfältige Landschaft und eine reiche Geschichte aus.\", \"state\": \"NI\", \"type\": \"image\", \"setName\": \"Niedersachsen\", \"category\": \"Niedersachsen\" }, { \"id\": 389, \"question\": \"Wie nennt man die Regierungschefin/den Regierungschef in Niedersachsen?\", \"options\": [ \"Erste Ministerin/Erster Minister\", \"Premierministerin/Premierminister\", \"Bürgermeisterin/Bürgermeister\", \"Ministerpräsidentin/Ministerpräsident\" ], \"answer\": \"Ministerpräsidentin/Ministerpräsident\", \"explanation\": \"Der Ministerpräsident ist das Oberhaupt der Landesregierung und leitet die Exekutive des Bundeslandes. In Niedersachsen trägt der Regierungschef diesen Titel, was in den meisten deutschen Bundesländern der Fall ist.\", \"state\": \"NI\", \"type\": \"text\", \"setName\": \"Niedersachsen\", \"category\": \"Niedersachsen\" }, { \"id\": 390, \"question\": \"Welche Ministerin/welchen Minister hat Niedersachsen nicht?\", \"options\": [ \"Justizministerin/Justizminister\", \"Außenministerin/Außenminister\", \"Finanzministerin/Finanzminister\", \"Innenministerin/Innenminister\" ], \"answer\": \"Außenministerin/Außenminister\", \"explanation\": \"Im Gegensatz zu den meisten Bundesländern hat Niedersachsen kein eigenes Außenministerium, da Außenpolitik in Deutschland auf Bundesebene geregelt wird. Deswegen existiert dieser Ministerposten nicht in der Landesregierung Niedersachsen.\", \"state\": \"NI\", \"type\": \"text\", \"setName\": \"Niedersachsen\", \"category\": \"Niedersachsen\" }, { \"id\": 391, \"question\": \"Welches Wappen gehört zum Bundesland Nordrhein-Westfalen?\", \"options\": [\"Bild 1\", \"Bild 2\", \"Bild 3\", \"Bild 4\"], \"answer\": \"Bild 2\", \"explanation\": \"Das Wappen von Nordrhein-Westfalen zeigt ein Pferd, das ein Symbol für das Land ist. In Deutschland haben Bundesländer ihre eigenen Wappen, die oft historische oder kulturelle Bedeutungen haben.\", \"state\": \"NW\", \"type\": \"image\", \"setName\": \"Nordrhein-Westfalen\", \"category\": \"Nordrhein-Westfalen\" }, { \"id\": 392, \"question\": \"Welches ist ein Landkreis in Nordrhein-Westfalen?\", \"options\": [ \"Ammerland\", \"Rhein-Sieg-Kreis\", \"Nordfriesland\", \"Vogtlandkreis\" ], \"answer\": \"Rhein-Sieg-Kreis\", \"explanation\": \"Landkreise sind regionale Verwaltungen in Deutschland, die für viele öffentliche Aufgaben zuständig sind. Der Rhein-Sieg-Kreis ist einer der 54 Landkreise in Nordrhein-Westfalen und spielt eine wichtige Rolle in der Verwaltungsstruktur.\", \"state\": \"NW\", \"type\": \"text\", \"setName\": \"Nordrhein-Westfalen\", \"category\": \"Nordrhein-Westfalen\" }, { \"id\": 393, \"question\": \"Für wie viele Jahre wird der Landtag in Nordrhein-Westfalen gewählt?\", \"options\": [\"3\", \"4\", \"5\", \"6\"], \"answer\": \"5\", \"explanation\": \"Der Landtag ist das Parlament eines Bundeslandes in Deutschland. In Nordrhein-Westfalen wird er alle fünf Jahre gewählt, was üblicherweise die Regierungs- und Gesetzgebungsperioden bestimmt.\", \"state\": \"NW\", \"type\": \"text\", \"setName\": \"Nordrhein-Westfalen\", \"category\": \"Nordrhein-Westfalen\" }, { \"id\": 394, \"question\": \"Ab welchem Alter darf man in Nordrhein-Westfalen bei Kommunalwahlen wählen?\", \"options\": [\"14\", \"16\", \"18\", \"20\"], \"answer\": \"16\", \"explanation\": \"In Nordrhein-Westfalen dürfen Jugendliche ab 16 Jahren an Kommunalwahlen teilnehmen. Dies ermöglicht jüngeren Menschen, sich aktiv an politischen Prozessen in ihrer Gemeinde zu beteiligen.\", \"state\": \"NW\", \"type\": \"text\", \"setName\": \"Nordrhein-Westfalen\", \"category\": \"Nordrhein-Westfalen\" }, { \"id\": 395, \"question\": \"Welche Farben hat die Landesflagge von Nordrhein-Westfalen?\", \"options\": [\"rot-weiß\", \"grün-weiß-rot\", \"schwarz-gold\", \"blau-weiß-rot\"], \"answer\": \"grün-weiß-rot\", \"explanation\": \"Die Landesflagge von Nordrhein-Westfalen ist in den Farben grün-weiß-rot gehalten, was die Identität und das Erbe des Bundeslandes widerspiegelt. Jedes Bundesland in Deutschland hat seine eigene Flagge und Farbgebung.\", \"state\": \"NW\", \"type\": \"text\", \"setName\": \"Nordrhein-Westfalen\", \"category\": \"Nordrhein-Westfalen\" }, { \"id\": 396, \"question\": \"Wo können Sie sich in Nordrhein-Westfalen über politische Themen informieren?\", \"options\": [ \"bei den Kirchen\", \"beim Ordnungsamt der Gemeinde\", \"bei der Verbraucherzentrale\", \"bei der Landeszentrale für politische Bildung\" ], \"answer\": \"bei der Landeszentrale für politische Bildung\", \"explanation\": \"Die Landeszentrale für politische Bildung in Nordrhein-Westfalen bietet Ressourcen und Informationen über politische Themen und die demokratische Bildung an. Solche Einrichtungen sind entscheidend, um Bürger über ihre politischen Rechte und Pflichten zu informieren.\", \"state\": \"NW\", \"type\": \"text\", \"setName\": \"Nordrhein-Westfalen\", \"category\": \"Nordrhein-Westfalen\" }, { \"id\": 397, \"question\": \"Die Landeshauptstadt von Nordrhein-Westfalen heißt …\", \"options\": [\"Köln.\", \"Bonn.\", \"Düsseldorf.\", \"Dortmund.\"], \"answer\": \"Düsseldorf.\", \"explanation\": \"Düsseldorf ist die Landeshauptstadt von Nordrhein-Westfalen und ein bedeutendes wirtschaftliches sowie kulturelles Zentrum. In Deutschland sind die Landeshauptstädte oft auch politische und administrative Zentren ihrer Bundesländer.\", \"state\": \"NW\", \"type\": \"text\", \"setName\": \"Nordrhein-Westfalen\", \"category\": \"Nordrhein-Westfalen\" }, { \"id\": 398, \"question\": \"Welches Bundesland ist Nordrhein-Westfalen?\", \"options\": [\"1\", \"2\", \"3\", \"4\"], \"answer\": \"3\", \"explanation\": \"Nordrhein-Westfalen ist eines der südwestlichen Bundesländer in Deutschland. Es hat eine große Bevölkerungszahl und spielt eine zentrale Rolle in der deutschen Wirtschaft und Kultur.\", \"state\": \"NW\", \"type\": \"image\", \"setName\": \"Nordrhein-Westfalen\", \"category\": \"Nordrhein-Westfalen\" }, { \"id\": 399, \"question\": \"Wie nennt man die Regierungschefin/den Regierungschef in Nordrhein-Westfalen?\", \"options\": [ \"Erste Ministerin/Erster Minister\", \"Premierministerin/Premierminister\", \"Bürgermeisterin/Bürgermeister\", \"Ministerpräsidentin/Ministerpräsident\" ], \"answer\": \"Ministerpräsidentin/Ministerpräsident\", \"explanation\": \"Die Bezeichnung Ministerpräsidentin oder Ministerpräsident bezeichnet die Leiterin oder den Leiter der Landesregierung in Nordrhein-Westfalen. Diese Rolle ist entscheidend für die politische Führung des Bundeslandes und die Umsetzung der Gesetze.\", \"state\": \"NW\", \"type\": \"text\", \"setName\": \"Nordrhein-Westfalen\", \"category\": \"Nordrhein-Westfalen\" }, { \"id\": 400, \"question\": \"Welche Ministerin/welchen Minister hat Nordrhein-Westfalen nicht?\", \"options\": [ \"Justizministerin/Justizminister\", \"Außenministerin/Außenminister\", \"Finanzministerin/Finanzminister\", \"Innenministerin/Innenminister\" ], \"answer\": \"Außenministerin/Außenminister\", \"explanation\": \"In Nordrhein-Westfalen gibt es keinen Außenminister, da die Außenpolitik in Deutschland auf Bundesebene geregelt wird. Landesregierungen haben andere Ministerien, die sich auf regionale Angelegenheiten konzentrieren.\", \"state\": \"NW\", \"type\": \"text\", \"setName\": \"Nordrhein-Westfalen\", \"category\": \"Nordrhein-Westfalen\" }, { \"id\": 401, \"question\": \"Welches Wappen gehört zum Bundesland Rheinland-Pfalz?\", \"options\": [\"Bild 1\", \"Bild 2\", \"Bild 3\", \"Bild 4\"], \"answer\": \"Bild 1\", \"explanation\": \"Das Wappen eines Bundeslandes repräsentiert oft dessen Geschichte und Identität. Rheinland-Pfalz hat ein spezielles Wappen, das die kulturelle und historische Vielfalt der Region symbolisiert.\", \"state\": \"RP\", \"type\": \"image\", \"setName\": \"Rheinland-Pfalz\", \"category\": \"Rheinland-Pfalz\" }, { \"id\": 402, \"question\": \"Welches ist ein Landkreis in Rheinland-Pfalz?\", \"options\": [\"Westerwaldkreis\", \"Altötting\", \"Emsland\", \"Prignitz\"], \"answer\": \"Westerwaldkreis\", \"explanation\": \"Landkreise sind Verwaltungseinheiten in Deutschland, die verschiedene Städte und Gemeinden umfassen. Der Westerwaldkreis ist ein Landkreis in Rheinland-Pfalz, bekannt für seine naturnahe Lage.\", \"state\": \"RP\", \"type\": \"text\", \"setName\": \"Rheinland-Pfalz\", \"category\": \"Rheinland-Pfalz\" }, { \"id\": 403, \"question\": \"Für wie viele Jahre wird der Landtag in Rheinland-Pfalz gewählt?\", \"options\": [\"3\", \"4\", \"5\", \"6\"], \"answer\": \"5\", \"explanation\": \"Der Landtag ist das Parlament eines Bundeslandes in Deutschland. Die Wahlperiode für den Landtag in Rheinland-Pfalz beträgt fünf Jahre, was es den Bürgern ermöglicht, regelmäßig ihre Vertreter zu wählen.\", \"state\": \"RP\", \"type\": \"text\", \"setName\": \"Rheinland-Pfalz\", \"category\": \"Rheinland-Pfalz\" }, { \"id\": 404, \"question\": \"Ab welchem Alter darf man in Rheinland-Pfalz bei Kommunalwahlen wählen?\", \"options\": [\"14\", \"16\", \"18\", \"20\"], \"answer\": \"18\", \"explanation\": \"In Deutschland dürfen Bürger ab einem bestimmten Alter an Wahlen teilnehmen. In Rheinland-Pfalz ist das wahlberechtigte Alter für Kommunalwahlen auf 18 Jahre festgelegt.\", \"state\": \"RP\", \"type\": \"text\", \"setName\": \"Rheinland-Pfalz\", \"category\": \"Rheinland-Pfalz\" }, { \"id\": 405, \"question\": \"Welche Farben hat die Landesflagge von Rheinland-Pfalz?\", \"options\": [ \"weiß-rot\", \"schwarz-rot-gold\", \"schwarz-gelb\", \"grün-weiß-rot\" ], \"answer\": \"schwarz-rot-gold\", \"explanation\": \"Die Farben der Landesflagge spiegeln oft die kulturelle Identität und Geschichte eines Bundeslandes wider. Rheinland-Pfalz nutzt die Farben Schwarz-Rot-Gold, die auch die Nationalflagge Deutschlands darstellen.\", \"state\": \"RP\", \"type\": \"text\", \"setName\": \"Rheinland-Pfalz\", \"category\": \"Rheinland-Pfalz\" }, { \"id\": 406, \"question\": \"Wo können Sie sich in Rheinland-Pfalz über politische Themen informieren?\", \"options\": [ \"bei den Kirchen\", \"bei der Verbraucherzentrale\", \"beim Ordnungsamt der Gemeinde\", \"bei der Landeszentrale für politische Bildung\" ], \"answer\": \"bei der Landeszentrale für politische Bildung\", \"explanation\": \"Die Landeszentrale für politische Bildung ist eine Institution, die Bürger in politischen Fragen informiert und aufklärt. Solche Einrichtungen sind wichtig für die Förderung eines aktiven und informierten Bürgerschaftsengagements.\", \"state\": \"RP\", \"type\": \"text\", \"setName\": \"Rheinland-Pfalz\", \"category\": \"Rheinland-Pfalz\" }, { \"id\": 407, \"question\": \"Die Landeshauptstadt von Rheinland-Pfalz heißt …\", \"options\": [\"Mainz.\", \"Kaiserslautern.\", \"Ludwigshafen.\", \"Koblenz.\"], \"answer\": \"Mainz.\", \"explanation\": \"Die Landeshauptstadt einer Region spielt eine wichtige Rolle in der Verwaltung und Politik des Bundeslandes. Mainz ist nicht nur die Landeshauptstadt von Rheinland-Pfalz, sondern auch bekannt für seine historische Altstadt und kulturellen Sehenswürdigkeiten.\", \"state\": \"RP\", \"type\": \"text\", \"setName\": \"Rheinland-Pfalz\", \"category\": \"Rheinland-Pfalz\" }, { \"id\": 408, \"question\": \"Welches Bundesland ist Rheinland-Pfalz?\", \"options\": [\"1\", \"2\", \"3\", \"4\"], \"answer\": \"1\", \"explanation\": \"Rheinland-Pfalz ist ein Bundesland in Deutschland, das nach geografischen und historischen Gesichtspunkten definiert ist. Es ist wichtig, die Grenzen und die geografische Lage der Bundesländer zu kennen.\", \"state\": \"RP\", \"type\": \"image\", \"setName\": \"Rheinland-Pfalz\", \"category\": \"Rheinland-Pfalz\" }, { \"id\": 409, \"question\": \"Wie nennt man die Regierungschefin/den Regierungschef in Rheinland-Pfalz?\", \"options\": [ \"Erste Ministerin/Erster Minister\", \"Premierministerin/Premierminister\", \"Bürgermeisterin/Bürgermeister\", \"Ministerpräsidentin/Ministerpräsident\" ], \"answer\": \"Ministerpräsidentin/Ministerpräsident\", \"explanation\": \"Der Regierungschef eines Bundeslandes ist der Ministerpräsident oder die Ministerpräsidentin. Diese Person hat eine wichtige Rolle in der Landesregierung und vertritt das Land nach außen.\", \"state\": \"RP\", \"type\": \"text\", \"setName\": \"Rheinland-Pfalz\", \"category\": \"Rheinland-Pfalz\" }, { \"id\": 410, \"question\": \"Welche Ministerin/welchen Minister hat Rheinland-Pfalz nicht?\", \"options\": [ \"Justizministerin/Justizminister\", \"Außenministerin/Außenminister\", \"Finanzministerin/Finanzminister\", \"Innenministerin/Innenminister\" ], \"answer\": \"Außenministerin/Außenminister\", \"explanation\": \"In Deutschland haben viele Bundesländer keinen Außenminister, da Außenpolitik in der Verantwortung der Bundesregierung liegt. Politiker in den Ländern konzentrieren sich vielmehr auf lokale und regionale Angelegenheiten.\", \"state\": \"RP\", \"type\": \"text\", \"setName\": \"Rheinland-Pfalz\", \"category\": \"Rheinland-Pfalz\" }, { \"id\": 411, \"question\": \"Welches Wappen gehört zum Bundesland Saarland?\", \"options\": [\"Bild 1\", \"Bild 2\", \"Bild 3\", \"Bild 4\"], \"answer\": \"Bild 4\", \"explanation\": \"Das Wappen eines Bundeslandes ist ein wichtiges Symbol und repräsentiert dessen kulturelle Identität und Geschichte. Im Saarland zeigt das Wappen oft Elemente, die auf die regionale Geschichte und die Bedeutung des Saarlandes hinweisen.\", \"state\": \"SL\", \"type\": \"image\", \"setName\": \"Saarland\", \"category\": \"Saarland\" }, { \"id\": 412, \"question\": \"Welches ist ein Landkreis im Saarland?\", \"options\": [ \"Mecklenburgische Seenplatte\", \"Altötting\", \"Neunkirchen\", \"Rhein-Sieg-Kreis\" ], \"answer\": \"Neunkirchen\", \"explanation\": \"Landkreise sind grundlegende Verwaltungseinheiten in Deutschland und helfen bei der Organisation und Durchsetzung von Gesetzen sowie der Bereitstellung öffentlicher Dienstleistungen. Das Saarland besteht aus mehreren Landkreisen, darunter Neunkirchen, der eine wichtige Rolle in der regionalen Verwaltung spielt.\", \"state\": \"SL\", \"type\": \"text\", \"setName\": \"Saarland\", \"category\": \"Saarland\" }, { \"id\": 413, \"question\": \"Für wie viele Jahre wird der Landtag des Saarlandes gewählt?\", \"options\": [\"3\", \"4\", \"5\", \"6\"], \"answer\": \"5\", \"explanation\": \"Der Landtag ist das Parlament eines Bundeslandes und wird alle fünf Jahre gewählt. Diese Wahlperiode ermöglicht eine regelmäßige Überprüfung und Erneuerung der politischen Vertretung und ist ein fundamentaler Bestandteil der Demokratie in Deutschland.\", \"state\": \"SL\", \"type\": \"text\", \"setName\": \"Saarland\", \"category\": \"Saarland\" }, { \"id\": 414, \"question\": \"Ab welchem Alter darf man im Saarland bei Kommunalwahlen wählen?\", \"options\": [\"14\", \"16\", \"18\", \"20\"], \"answer\": \"18\", \"explanation\": \"Das Mindestalter für die Wählerschaft bei Kommunalwahlen in Deutschland ist 18 Jahre. Dies stellt sicher, dass die Wähler souverän an Entscheidungen über lokale Angelegenheiten teilnehmen können, was eine wichtige gesellschaftliche Verantwortung darstellt.\", \"state\": \"SL\", \"type\": \"text\", \"setName\": \"Saarland\", \"category\": \"Saarland\" }, { \"id\": 415, \"question\": \"Welche Farben hat die Landesflagge des Saarlandes?\", \"options\": [ \"weiß-blau\", \"schwarz-rot-gold\", \"schwarz-gelb\", \"grün-weiß-rot\" ], \"answer\": \"schwarz-rot-gold\", \"explanation\": \"Die Farben einer Landesflagge sind oft symbolisch und repräsentieren die Geschichte und Identität des Bundeslandes. Das Saarland, wie alle deutschen Bundesländer, hat eine Flagge, die im Allgemeinen die nationalen Farben Deutschland integriert, was den nationalen Zusammenhalt widerspiegelt.\", \"state\": \"SL\", \"type\": \"text\", \"setName\": \"Saarland\", \"category\": \"Saarland\" }, { \"id\": 416, \"question\": \"Wo können Sie sich im Saarland über politische Themen informieren?\", \"options\": [ \"bei den Kirchen\", \"bei der Landeszentrale für politische Bildung\", \"bei der Verbraucherzentrale\", \"beim Ordnungsamt der Gemeinde\" ], \"answer\": \"bei der Landeszentrale für politische Bildung\", \"explanation\": \"Die Landeszentrale für politische Bildung ist eine Einrichtung, die darauf abzielt, Bürger über politische Themen und Prozesse aufzuklären. Hier werden Materialien und Veranstaltungen angeboten, die das politische Bewusstsein fördern und die Bürger zur Teilnahme an der Demokratie anregen.\", \"state\": \"SL\", \"type\": \"text\", \"setName\": \"Saarland\", \"category\": \"Saarland\" }, { \"id\": 417, \"question\": \"Die Landeshauptstadt des Saarlandes heißt …\", \"options\": [\"Neunkirchen.\", \"Homburg.\", \"Saarbrücken.\", \"Völklingen.\"], \"answer\": \"Saarbrücken.\", \"explanation\": \"Saarbrücken ist nicht nur die Landeshauptstadt des Saarlandes, sondern auch ein wichtiges kulturelles und wirtschaftliches Zentrum der Region. Die Hauptstadt hat eine besondere Bedeutung für die politische Verwaltung und die zentrale Lage im Saarland.\", \"state\": \"SL\", \"type\": \"text\", \"setName\": \"Saarland\", \"category\": \"Saarland\" }, { \"id\": 418, \"question\": \"Welches Bundesland ist das Saarland?\", \"options\": [\"1\", \"2\", \"3\", \"4\"], \"answer\": \"2\", \"explanation\": \"Das Saarland ist eines der kleineren Bundesländer in Deutschland, das eine einzigartige Geschichte hat, besonders in Bezug auf seine Lage an der Grenze zu Frankreich. Diese geografische Position hat die kulturelle Identität des Saarlandes geprägt.\", \"state\": \"SL\", \"type\": \"image\", \"setName\": \"Saarland\", \"category\": \"Saarland\" }, { \"id\": 419, \"question\": \"Wie nennt man die Regierungschefin/den Regierungschef des Saarlandes?\", \"options\": [ \"Erste Ministerin/Erster Minister\", \"Premierministerin/Premierminister\", \"Bürgermeisterin/Bürgermeister\", \"Ministerpräsidentin/Ministerpräsident\" ], \"answer\": \"Ministerpräsidentin/Ministerpräsident\", \"explanation\": \"Der Begriff 'Ministerpräsident' bezeichnet den Regierungschef eines Bundeslandes in Deutschland. Diese Person hat die politische Verantwortung für die Landesregierung und spielt eine entscheidende Rolle in der Gesetzgebung und Verwaltung auf Landesebene.\", \"state\": \"SL\", \"type\": \"text\", \"setName\": \"Saarland\", \"category\": \"Saarland\" }, { \"id\": 420, \"question\": \"Welche Ministerin/welchen Minister hat das Saarland nicht?\", \"options\": [ \"Justizministerin/Justizminister\", \"Außenministerin/Außenminister\", \"Finanzministerin/Finanzminister\", \"Innenministerin/Innenminister\" ], \"answer\": \"Außenministerin/Außenminister\", \"explanation\": \"Im Gegensatz zu anderen Bundesländern hat das Saarland keinen Außenminister, da Außenangelegenheiten in Deutschland auf Bundesebene geregelt werden. Die Rolle der Landesministerien variiert je nach den spezifischen Anforderungen und Strukturen der jeweiligen Bundesländer.\", \"state\": \"SL\", \"type\": \"text\", \"setName\": \"Saarland\", \"category\": \"Saarland\" }, { \"id\": 421, \"question\": \"Welches Wappen gehört zum Freistaat Sachsen?\", \"options\": [\"Bild 1\", \"Bild 2\", \"Bild 3\", \"Bild 4\"], \"answer\": \"Bild 4\", \"explanation\": \"Das Wappen eines Bundeslandes ist ein wichtiger Teil seiner Identität und kulturellen Tradition. Es wird oft in offiziellen Dokumenten verwendet und repräsentiert die Geschichte und Werte des Landes.\", \"state\": \"SN\", \"type\": \"image\", \"setName\": \"Sachsen\", \"category\": \"Sachsen\" }, { \"id\": 422, \"question\": \"Welches ist ein Landkreis in Sachsen?\", \"options\": [\"Vogtlandkreis\", \"Altötting\", \"Uckermark\", \"Nordfriesland\"], \"answer\": \"Vogtlandkreis\", \"explanation\": \"Landkreise sind die Verwaltungseinheiten in Deutschland, die wichtige lokale Dienstleistungen bereitstellen und für die Organisation vieler sozialer und wirtschaftlicher Fragen zuständig sind. Sachsen hat viele Landkreise, die jeweils ihre eigene Geschichte und Kultur haben.\", \"state\": \"SN\", \"type\": \"text\", \"setName\": \"Sachsen\", \"category\": \"Sachsen\" }, { \"id\": 423, \"question\": \"Für wie viele Jahre wird der Landtag in Sachsen gewählt?\", \"options\": [\"3\", \"4\", \"5\", \"6\"], \"answer\": \"5\", \"explanation\": \"Die Wahlperiode für den Landtag ist ein wichtiger Aspekt der politischen Stabilität und Planung. Ein Landtag wird in der Regel für fünf Jahre gewählt, was es den Abgeordneten ermöglicht, langfristige Projekte zu planen und durchzuführen.\", \"state\": \"SN\", \"type\": \"text\", \"setName\": \"Sachsen\", \"category\": \"Sachsen\" }, { \"id\": 424, \"question\": \"Ab welchem Alter darf man in Sachsen bei Kommunalwahlen wählen?\", \"options\": [\"14\", \"16\", \"18\", \"20\"], \"answer\": \"18\", \"explanation\": \"Das Wahlalter ist ein zentrales Element der demokratischen Teilhabe. In Deutschland, einschließlich Sachsen, dürfen Bürger ab 18 Jahren wählen, was ihre volle rechtliche Bürgerlichkeit widerspiegelt.\", \"state\": \"SN\", \"type\": \"text\", \"setName\": \"Sachsen\", \"category\": \"Sachsen\" }, { \"id\": 425, \"question\": \"Welche Farben hat die Landesflagge von Sachsen?\", \"options\": [\"blau-weiß-rot\", \"weiß-grün\", \"grün-weiß-rot\", \"schwarz-gelb\"], \"answer\": \"weiß-grün\", \"explanation\": \"Die Farben der Landesflagge symbolisieren oft die historische und kulturelle Identität eines Landes. In Sachsen repräsentiert die Kombination aus Weiß und Grün die regionale Einheit und die Landschaft.\", \"state\": \"SN\", \"type\": \"text\", \"setName\": \"Sachsen\", \"category\": \"Sachsen\" }, { \"id\": 426, \"question\": \"Wo können Sie sich in Sachsen über politische Themen informieren?\", \"options\": [ \"bei der Landeszentrale für politische Bildung\", \"beim Ordnungsamt der Gemeinde\", \"bei den Kirchen\", \"bei der Verbraucherzentrale\" ], \"answer\": \"bei der Landeszentrale für politische Bildung\", \"explanation\": \"Die Landeszentrale für politische Bildung hat die Aufgabe, die Bürger über politische Themen aufzuklären und zur politischen Teilhabe zu motivieren. Sie bietet Informationen, Veranstaltungen und Materialien zu aktuellen politischen Fragen.\", \"state\": \"SN\", \"type\": \"text\", \"setName\": \"Sachsen\", \"category\": \"Sachsen\" }, { \"id\": 427, \"question\": \"Die Landeshauptstadt von Sachsen heißt …\", \"options\": [\"Leipzig.\", \"Dresden.\", \"Chemnitz.\", \"Zwickau.\"], \"answer\": \"Dresden.\", \"explanation\": \"Die Landeshauptstadt ist oft das politische und kulturelle Zentrum eines Bundeslandes. Dresden hat eine bedeutende Geschichte und ist bekannt für ihre Architektur, insbesondere die Frauenkirche und die Semperoper.\", \"state\": \"SN\", \"type\": \"text\", \"setName\": \"Sachsen\", \"category\": \"Sachsen\" }, { \"id\": 428, \"question\": \"Welches Bundesland ist Sachsen?\", \"options\": [\"1\", \"2\", \"3\", \"4\"], \"answer\": \"4\", \"explanation\": \"Bundesländer sind die wichtigsten politischen Einheiten in Deutschland und spielen eine entscheidende Rolle bei der Gesetzgebung und Verwaltung. Sachsen ist eines der 16 Bundesländer und hat eine einzigartige kulturelle Identität.\", \"state\": \"SN\", \"type\": \"image\", \"setName\": \"Sachsen\", \"category\": \"Sachsen\" }, { \"id\": 429, \"question\": \"Wie nennt man die Regierungschefin/den Regierungschef in Sachsen?\", \"options\": [ \"Erste Ministerin/Erster Minister\", \"Premierministerin/Premierminister\", \"Bürgermeisterin/Bürgermeister\", \"Ministerpräsidentin/Ministerpräsident\" ], \"answer\": \"Ministerpräsidentin/Ministerpräsident\", \"explanation\": \"Der Ministerpräsident ist der Regierungschef eines Bundeslandes und trägt die Verantwortung für die politische Führung und die Umsetzung von Gesetzen. In Sachsen ist der Ministerpräsident auch für die Landespolitik maßgeblich verantwortlich.\", \"state\": \"SN\", \"type\": \"text\", \"setName\": \"Sachsen\", \"category\": \"Sachsen\" }, { \"id\": 430, \"question\": \"Welche Ministerin/welchen Minister hat Sachsen nicht?\", \"options\": [ \"Justizministerin/Justizminister\", \"Außenministerin/Außenminister\", \"Finanzministerin/Finanzminister\", \"Innenministerin/Innenminister\" ], \"answer\": \"Außenministerin/Außenminister\", \"explanation\": \"In Deutschland sind die Bundesländer für die meisten innerstaatlichen Angelegenheiten zuständig, während die Außenpolitik auf Bundesebene geregelt wird. Daher hat Sachsen keinen Außenminister, sondern die Außenpolitik wird vom Bund verwaltet.\", \"state\": \"SN\", \"type\": \"text\", \"setName\": \"Sachsen\", \"category\": \"Sachsen\" }, { \"id\": 431, \"question\": \"Welches Wappen gehört zum Bundesland Sachsen-Anhalt?\", \"options\": [\"Bild 1\", \"Bild 2\", \"Bild 3\", \"Bild 4\"], \"answer\": \"Bild 4\", \"explanation\": \"Das Wappen eines Bundeslandes ist ein wichtiges Symbol seiner Identität und Geschichte. In Sachsen-Anhalt zeigt das Wappen das Zusammenspiel verschiedener historischer Einflüsse und regionaler Merkmale.\", \"state\": \"ST\", \"type\": \"image\", \"setName\": \"Sachsen-Anhalt\", \"category\": \"Sachsen-Anhalt\" }, { \"id\": 432, \"question\": \"Welches ist ein Landkreis in Sachsen-Anhalt?\", \"options\": [\"Ammerland\", \"Altötting\", \"Uckermark\", \"Börde\"], \"answer\": \"Börde\", \"explanation\": \"Landkreise sind Verwaltungseinheiten in Deutschland, die eine wichtige Rolle in der regionalen Selbstverwaltung spielen. Sachsen-Anhalt hat mehrere Landkreise, und die Börde ist einer von ihnen, bekannt für seine fruchtbaren Böden und landwirtschaftlichen Aktivitäten.\", \"state\": \"ST\", \"type\": \"text\", \"setName\": \"Sachsen-Anhalt\", \"category\": \"Sachsen-Anhalt\" }, { \"id\": 433, \"question\": \"Für wie viele Jahre wird der Landtag in Sachsen-Anhalt gewählt?\", \"options\": [\"3\", \"4\", \"5\", \"6\"], \"answer\": \"5\", \"explanation\": \"Der Landtag ist das Parlament eines Bundeslandes und wird in bestimmten Zeitabständen gewählt. In Sachsen-Anhalt beträgt die Wahlperiode für den Landtag fünf Jahre, was der Stabilität der parlamentarischen Arbeit dient.\", \"state\": \"ST\", \"type\": \"text\", \"setName\": \"Sachsen-Anhalt\", \"category\": \"Sachsen-Anhalt\" }, { \"id\": 434, \"question\": \"Ab welchem Alter darf man in Sachsen-Anhalt bei Kommunalwahlen wählen?\", \"options\": [\"14\", \"16\", \"18\", \"20\"], \"answer\": \"16\", \"explanation\": \"Das Wahlrecht ist ein grundlegendes Element der Demokratie und regelt, ab wann Bürgerinnen und Bürger an Wahlen teilnehmen dürfen. In Sachsen-Anhalt dürfen Jugendliche bereits ab 16 Jahren an Kommunalwahlen teilnehmen, was ihre politische Mitbestimmung stärkt.\", \"state\": \"ST\", \"type\": \"text\", \"setName\": \"Sachsen-Anhalt\", \"category\": \"Sachsen-Anhalt\" }, { \"id\": 435, \"question\": \"Welche Farben hat die Landesflagge von Sachsen-Anhalt?\", \"options\": [\"blau-weiß-rot\", \"gelb-schwarz\", \"grün-weiß-rot\", \"weiß-rot\"], \"answer\": \"gelb-schwarz\", \"explanation\": \"Die Landesflagge eines Bundeslandes symbolisiert seine Identität und Traditionen. Die Farben gelb und schwarz in der Flagge von Sachsen-Anhalt haben historische Wurzeln und repräsentieren die Landesgeschichte.\", \"state\": \"ST\", \"type\": \"text\", \"setName\": \"Sachsen-Anhalt\", \"category\": \"Sachsen-Anhalt\" }, { \"id\": 436, \"question\": \"Wo können Sie sich in Sachsen-Anhalt über politische Themen informieren?\", \"options\": [ \"bei den Kirchen\", \"bei der Landeszentrale für politische Bildung\", \"beim Ordnungsamt der Gemeinde\", \"bei der Verbraucherzentrale\" ], \"answer\": \"bei der Landeszentrale für politische Bildung\", \"explanation\": \"Die politische Bildung ist ein wichtiges Element der Demokratie, um Bürger über politische Prozesse und Themen zu informieren. Die Landeszentrale für politische Bildung in Sachsen-Anhalt bietet vielfältige Informationen und Materialien zu politischen Fragestellungen.\", \"state\": \"ST\", \"type\": \"text\", \"setName\": \"Sachsen-Anhalt\", \"category\": \"Sachsen-Anhalt\" }, { \"id\": 437, \"question\": \"Die Landeshauptstadt von Sachsen-Anhalt heißt …\", \"options\": [\"Halle.\", \"Dessau.\", \"Magdeburg.\", \"Wittenberg.\"], \"answer\": \"Magdeburg.\", \"explanation\": \"Die Landeshauptstadt ist das politische Zentrum eines Bundeslandes, wo die Regierungsorgane und Landesinstitutionen ansässig sind. Magdeburg, als Landeshauptstadt von Sachsen-Anhalt, hat eine reiche historische und kulturelle Bedeutung.\", \"state\": \"ST\", \"type\": \"text\", \"setName\": \"Sachsen-Anhalt\", \"category\": \"Sachsen-Anhalt\" }, { \"id\": 438, \"question\": \"Welches Bundesland ist Sachsen-Anhalt?\", \"options\": [\"1\", \"2\", \"3\", \"4\"], \"answer\": \"3\", \"explanation\": \"Bundesländer sind die Gliedstaaten der Bundesrepublik Deutschland, die jeweils eigene Regierungen und Verfassungen besitzen. Sachsen-Anhalt ist eines der 16 Bundesländer und nimmt eine zentrale Rolle in Deutschland ein.\", \"state\": \"ST\", \"type\": \"image\", \"setName\": \"Sachsen-Anhalt\", \"category\": \"Sachsen-Anhalt\" }, { \"id\": 439, \"question\": \"Wie nennt man die Regierungschefin/den Regierungschef in Sachsen-Anhalt?\", \"options\": [ \"Erste Ministerin/Erster Minister\", \"Premierministerin/Premierminister\", \"Bürgermeisterin/Bürgermeister\", \"Ministerpräsidentin/Ministerpräsident\" ], \"answer\": \"Ministerpräsidentin/Ministerpräsident\", \"explanation\": \"Die Regierungschefin oder der Regierungschef eines Bundeslandes wird als Ministerpräsident bezeichnet. In Sachsen-Anhalt ist dieser Posten entscheidend für die Leitung der Landesregierung und die Umsetzung der politischen Agenda.\", \"state\": \"ST\", \"type\": \"text\", \"setName\": \"Sachsen-Anhalt\", \"category\": \"Sachsen-Anhalt\" }, { \"id\": 440, \"question\": \"Welche Ministerin/welchen Minister hat Sachsen-Anhalt nicht?\", \"options\": [ \"Justizministerin/Justizminister\", \"Außenministerin/Außenminister\", \"Finanzministerin/Finanzminister\", \"Innenministerin/Innenminister\" ], \"answer\": \"Außenministerin/Außenminister\", \"explanation\": \"In Deutschland sind die Regierungen der Bundesländer für viele Bereiche zuständig, jedoch hat nicht jedes Bundesland eine Außenministerin oder einen Außenminister. Sachsen-Anhalt hat diese Funktion nicht, da die Außenpolitik auf Bundesebene geregelt wird.\", \"state\": \"ST\", \"type\": \"text\", \"setName\": \"Sachsen-Anhalt\", \"category\": \"Sachsen-Anhalt\" }, { \"id\": 441, \"question\": \"Welches Wappen gehört zum Bundesland Schleswig-Holstein?\", \"options\": [\"Bild 1\", \"Bild 2\", \"Bild 3\", \"Bild 4\"], \"answer\": \"Bild 3\", \"explanation\": \"Das Wappen eines Bundeslandes repräsentiert dessen Identität und Geschichte. In Schleswig-Holstein symbolisiert das Wappen die Verbindung von Land und Meer sowie die kulturellen Einflüsse der Region.\", \"state\": \"SH\", \"type\": \"image\", \"setName\": \"Schleswig-Holstein\", \"category\": \"Schleswig-Holstein\" }, { \"id\": 442, \"question\": \"Welches ist ein Landkreis in Schleswig-Holstein?\", \"options\": [ \"Ammerland\", \"Mecklenburgische Seenplatte\", \"Nordfriesland\", \"Rhein-Sieg-Kreis\" ], \"answer\": \"Nordfriesland\", \"explanation\": \"Kreise sind in Deutschland wichtige Verwaltungseinheiten, die für die regionale Selbstverwaltung zuständig sind. Nordfriesland ist einer der Landkreise in Schleswig-Holstein und zeichnet sich durch seine Küstenlage und vielfältige Landschaft aus.\", \"state\": \"SH\", \"type\": \"text\", \"setName\": \"Schleswig-Holstein\", \"category\": \"Schleswig-Holstein\" }, { \"id\": 443, \"question\": \"Für wie viele Jahre wird der Landtag in Schleswig-Holstein gewählt?\", \"options\": [\"3\", \"4\", \"5\", \"6\"], \"answer\": \"5\", \"explanation\": \"Der Landtag ist das Parlament eines Bundeslandes und wird in der Regel für eine feste Amtszeit gewählt. In Schleswig-Holstein beträgt die Wahlperiode fünf Jahre, was es den Bürgern ermöglicht, regelmäßig Einfluss auf die politische Landschaft zu nehmen.\", \"state\": \"SH\", \"type\": \"text\", \"setName\": \"Schleswig-Holstein\", \"category\": \"Schleswig-Holstein\" }, { \"id\": 444, \"question\": \"Ab welchem Alter darf man in Schleswig-Holstein bei Kommunalwahlen wählen?\", \"options\": [\"14\", \"16\", \"18\", \"20\"], \"answer\": \"16\", \"explanation\": \"In Deutschland haben Jugendliche ab einem bestimmten Alter das Recht, an Wahlen teilzunehmen. In Schleswig-Holstein dürfen bereits 16-Jährige an Kommunalwahlen teilnehmen, was zur politischen Teilhabe junger Menschen beiträgt.\", \"state\": \"SH\", \"type\": \"text\", \"setName\": \"Schleswig-Holstein\", \"category\": \"Schleswig-Holstein\" }, { \"id\": 445, \"question\": \"Welche Farben hat die Landesflagge von Schleswig-Holstein?\", \"options\": [\"weiß-blau\", \"blau-weiß-rot\", \"weiß-rot\", \"grün-weiß-rot\"], \"answer\": \"blau-weiß-rot\", \"explanation\": \"Die Farben einer Landesflagge haben oft historische und kulturelle Bedeutungen. Die Flagge von Schleswig-Holstein in blau, weiß und rot zeigt die Verbindung des Landes zur dänischen und deutschen Kultur und Geschichte.\", \"state\": \"SH\", \"type\": \"text\", \"setName\": \"Schleswig-Holstein\", \"category\": \"Schleswig-Holstein\" }, { \"id\": 446, \"question\": \"Wo können Sie sich in Schleswig-Holstein über politische Themen informieren?\", \"options\": [ \"bei der Verbraucherzentrale\", \"beim Ordnungsamt der Gemeinde\", \"beim / bei der Landesbeauftragten für politische Bildung\", \"bei den Kirchen\" ], \"answer\": \"beim / bei der Landesbeauftragten für politische Bildung\", \"explanation\": \"Politische Bildung ist ein wichtiger Bestandteil der Demokratie und hilft den Bürgern, informierte Entscheidungen zu treffen. Die Landesbeauftragte für politische Bildung in Schleswig-Holstein bietet Veranstaltungen, Materialien und Informationen zu politischen Themen an.\", \"state\": \"SH\", \"type\": \"text\", \"setName\": \"Schleswig-Holstein\", \"category\": \"Schleswig-Holstein\" }, { \"id\": 447, \"question\": \"Die Landeshauptstadt von Schleswig-Holstein heißt …\", \"options\": [\"Husum.\", \"Flensburg.\", \"Lübeck.\", \"Kiel.\"], \"answer\": \"Kiel.\", \"explanation\": \"Die Landeshauptstadt eines Bundeslandes hat oft eine zentrale Rolle in der Verwaltung und Kultur des Landes. Kiel ist nicht nur die Hauptstadt von Schleswig-Holstein, sondern auch ein wichtiger Hafen und Standort für maritime Industrie.\", \"state\": \"SH\", \"type\": \"text\", \"setName\": \"Schleswig-Holstein\", \"category\": \"Schleswig-Holstein\" }, { \"id\": 448, \"question\": \"Welches Bundesland ist Schleswig-Holstein?\", \"options\": [\"1\", \"2\", \"3\", \"4\"], \"answer\": \"1\", \"explanation\": \"Schleswig-Holstein ist eines der 16 Bundesländer Deutschlands und liegt im Norden des Landes. Es ist bekannt für seine Küstenlinien an der Nordsee und der Ostsee sowie für seine vielfältige Landschaft und Kultur.\", \"state\": \"SH\", \"type\": \"image\", \"setName\": \"Schleswig-Holstein\", \"category\": \"Schleswig-Holstein\" }, { \"id\": 449, \"question\": \"Wie nennt man die Regierungschefin/den Regierungschef in Schleswig-Holstein?\", \"options\": [ \"Erste Ministerin/Erster Minister\", \"Premierministerin/Premierminister\", \"Bürgermeisterin/Bürgermeister\", \"Ministerpräsidentin/Ministerpräsident\" ], \"answer\": \"Ministerpräsidentin/Ministerpräsident\", \"explanation\": \"Der Regierungschef eines Bundeslandes wird als Ministerpräsident oder Ministerpräsidentin bezeichnet. Diese Funktion ist entscheidend für die Führung der Landesregierung und die Vertretung des Bundeslandes.\", \"state\": \"SH\", \"type\": \"text\", \"setName\": \"Schleswig-Holstein\", \"category\": \"Schleswig-Holstein\" }, { \"id\": 450, \"question\": \"Welche Ministerin/welchen Minister hat Schleswig-Holstein nicht?\", \"options\": [ \"Justizministerin/Justizminister\", \"Außenministerin/Außenminister\", \"Finanzministerin/Finanzminister\", \"Innenministerin/Innenminister\" ], \"answer\": \"Außenministerin/Außenminister\", \"explanation\": \"Die Ministerien einer Landesregierung sind für verschiedene Bereiche zuständig, jedoch gibt es Unterschiede zwischen den Ländern. In Schleswig-Holstein gibt es keinen Außenminister, da die Außenpolitik von der Bundesregierung auf nationaler Ebene behandelt wird.\", \"state\": \"SH\", \"type\": \"text\", \"setName\": \"Schleswig-Holstein\", \"category\": \"Schleswig-Holstein\" }, { \"id\": 451, \"question\": \"Welches Wappen gehört zum Freistaat Thüringen?\", \"options\": [\"Bild 1\", \"Bild 2\", \"Bild 3\", \"Bild 4\"], \"answer\": \"Bild 4\", \"explanation\": \"Das Wappen eines Bundeslandes ist ein wichtiger Bestandteil der Identität und der Kultur. Es repräsentiert die Geschichte und die Werte des Landes und wird oft in offiziellen Dokumenten und Veranstaltungen verwendet.\", \"state\": \"TH\", \"type\": \"image\", \"setName\": \"Thüringen\", \"category\": \"Thüringen\" }, { \"id\": 452, \"question\": \"Welches ist ein Landkreis in Thüringen?\", \"options\": [\"Ammerland\", \"Altötting\", \"Nordfriesland\", \"Wartburgkreis\"], \"answer\": \"Wartburgkreis\", \"explanation\": \"Landkreise sind wichtige Verwaltungseinheiten in Deutschland, die verschiedene Gemeinden und Städte umfassen. Der Wartburgkreis ist bekannt für historische Stätten wie die Wartburg, die zum UNESCO-Weltkulturerbe gehört.\", \"state\": \"TH\", \"type\": \"text\", \"setName\": \"Thüringen\", \"category\": \"Thüringen\" }, { \"id\": 453, \"question\": \"Für wie viele Jahre wird der Landtag in Thüringen gewählt?\", \"options\": [\"3\", \"4\", \"5\", \"6\"], \"answer\": \"5\", \"explanation\": \"Die Wahlperiode für den Landtag in Thüringen beträgt fünf Jahre. Diese Regelung ermöglicht eine stabile politische Landschaft und gibt den Wählern die Möglichkeit, in regelmäßigen Abständen Einfluss auf die Landespolitik zu nehmen.\", \"state\": \"TH\", \"type\": \"text\", \"setName\": \"Thüringen\", \"category\": \"Thüringen\" }, { \"id\": 454, \"question\": \"Ab welchem Alter darf man in Thüringen bei Kommunalwahlen wählen?\", \"options\": [\"14\", \"16\", \"18\", \"20\"], \"answer\": \"16\", \"explanation\": \"In Thüringen dürfen Bürger bereits ab 16 Jahren an Kommunalwahlen teilnehmen. Diese Regelung fördert die politische Partizipation junger Menschen und ermutigt sie, sich aktiv in die Gesellschaft einzubringen.\", \"state\": \"TH\", \"type\": \"text\", \"setName\": \"Thüringen\", \"category\": \"Thüringen\" }, { \"id\": 455, \"question\": \"Welche Farben hat die Landesflagge von Thüringen?\", \"options\": [\"blau-weiß-rot\", \"weiß-rot\", \"grün-weiß-rot\", \"schwarz-gold\"], \"answer\": \"weiß-rot\", \"explanation\": \"Die Farben einer Landesflagge sind symbiotisch mit der kulturellen Identität und Geschichte des Bundeslandes verbunden. Die Flagge von Thüringen ist weiß-rot und symbolisiert bestimmte Werte und Traditionen dieses Bundeslandes.\", \"state\": \"TH\", \"type\": \"text\", \"setName\": \"Thüringen\", \"category\": \"Thüringen\" }, { \"id\": 456, \"question\": \"Wo können Sie sich in Thüringen über politische Themen informieren?\", \"options\": [ \"bei den Kirchen\", \"bei der Verbraucherzentrale\", \"bei der Landeszentrale für politische Bildung\", \"beim Ordnungsamt der Gemeinde\" ], \"answer\": \"bei der Landeszentrale für politische Bildung\", \"explanation\": \"Die Landeszentrale für politische Bildung bietet Informationen und Bildungsangebote zu politischen Themen an. Sie spielt eine entscheidende Rolle dabei, das Wissen der Bürger über politische Prozesse und Beteiligungsmöglichkeiten zu fördern.\", \"state\": \"TH\", \"type\": \"text\", \"setName\": \"Thüringen\", \"category\": \"Thüringen\" }, { \"id\": 457, \"question\": \"Die Landeshauptstadt von Thüringen heißt …\", \"options\": [\"Eisenach.\", \"Erfurt.\", \"Gera.\", \"Jena.\"], \"answer\": \"Erfurt.\", \"explanation\": \"Erfurt ist die Landeshauptstadt von Thüringen und spielt eine zentrale Rolle in der Politik und Kultur des Bundeslandes. Die Stadt hat eine reiche Geschichte, die bis ins Mittelalter zurückreicht, und ist bekannt für ihre gut erhaltene Altstadt.\", \"state\": \"TH\", \"type\": \"text\", \"setName\": \"Thüringen\", \"category\": \"Thüringen\" }, { \"id\": 458, \"question\": \"Welches Bundesland ist Thüringen?\", \"options\": [\"1\", \"2\", \"3\", \"4\"], \"answer\": \"2\", \"explanation\": \"Thüringen ist eines der 16 Bundesländer Deutschlands und liegt im Herzen des Landes. Als Freistaat hat es seine eigene Verfassung und Regierung, die für die regionalen Angelegenheiten zuständig ist.\", \"state\": \"TH\", \"type\": \"image\", \"setName\": \"Thüringen\", \"category\": \"Thüringen\" }, { \"id\": 459, \"question\": \"Wie nennt man die Regierungschefin/den Regierungschef in Thüringen?\", \"options\": [ \"Erste Ministerin/Erster Minister\", \"Premierministerin/Premierminister\", \"Bürgermeisterin/Bürgermeister\", \"Ministerpräsidentin/Ministerpräsident\" ], \"answer\": \"Ministerpräsidentin/Ministerpräsident\", \"explanation\": \"Der Ministerpräsident ist der Regierungschef eines Bundeslandes in Deutschland und verantwortet die exekutive Gewalt. In Thüringen leitet die Ministerpräsidentin oder der Ministerpräsident die Landesregierung und trifft wichtige politische Entscheidungen.\", \"state\": \"TH\", \"type\": \"text\", \"setName\": \"Thüringen\", \"category\": \"Thüringen\" }, { \"id\": 460, \"question\": \"Welche Ministerin/welchen Minister hat Thüringen nicht?\", \"options\": [ \"Justizministerin/Justizminister\", \"Außenministerin/Außenminister\", \"Finanzministerin/Finanzminister\", \"Innenministerin/Innenminister\" ], \"answer\": \"Außenministerin/Außenminister\", \"explanation\": \"In einigen Bundesländern, einschließlich Thüringen, existiert kein Außenministerium, da die Außenpolitik in Deutschland auf Bundesebene geregelt ist. Die Landesregierung kümmert sich überwiegend um innere Angelegenheiten und regionale Belange.\", \"state\": \"TH\", \"type\": \"text\", \"setName\": \"Thüringen\", \"category\": \"Thüringen\" } ]"